<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Miss PAN Learning Hub｜彭老師互動學習平台</title>
    <style>
        :root{
            --bg1:#eef2ff;--bg2:#fdf2f8;--bg3:#ecfeff;--ink:#0f172a;--muted:#64748b;
            --brand:#6366f1;--brand2:#06b6d4;--accent:#f97316;--good:#10b981;--danger:#ef4444;
            --card:rgba(255,255,255,.92);--line:#e2e8f0;--shadow:0 18px 45px rgba(15,23,42,.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, system-ui, 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        body { min-height:100vh; color:var(--ink); background:
            radial-gradient(circle at top left, rgba(99,102,241,.22), transparent 28%),
            radial-gradient(circle at 85% 10%, rgba(6,182,212,.18), transparent 30%),
            linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3)); padding: 20px; }
        .container { max-width: 1420px; margin: 0 auto; }
        .site-hero { position:relative; overflow:hidden; border-radius:34px; padding:28px; margin-bottom:24px; color:white; background:linear-gradient(135deg,#4f46e5,#06b6d4 65%,#22c55e); box-shadow:var(--shadow); }
        .site-hero:after{content:""; position:absolute; right:-70px; top:-80px; width:260px; height:260px; border-radius:50%; background:rgba(255,255,255,.18);} 
        .site-hero h1{font-size:clamp(28px,4vw,52px); letter-spacing:.5px; margin-bottom:8px;}
        .site-hero p{font-size:16px; opacity:.95; max-width:760px; line-height:1.7;}
        .hero-badges{display:flex; flex-wrap:wrap; gap:10px; margin-top:18px;}
        .hero-badge{background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.28); padding:8px 12px; border-radius:999px; font-weight:700; backdrop-filter:blur(6px);}
        .card { background: var(--card); border:1px solid rgba(255,255,255,.65); border-radius: 28px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px; backdrop-filter: blur(12px); }
        .btn { background: linear-gradient(135deg,var(--brand),#7c3aed); color: white; border: none; padding: 10px 18px; border-radius: 999px; font-weight: 800; cursor: pointer; font-size: 14px; box-shadow:0 8px 18px rgba(99,102,241,.25); transition:.18s transform,.18s filter; }
        .btn:hover{transform:translateY(-1px); filter:brightness(1.03);} .btn:active{transform:translateY(0);} 
        .btn-outline { background: white; border: 1px solid var(--brand); color: var(--brand); box-shadow:none; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-game{background:linear-gradient(135deg,#f97316,#ec4899);}
        .btn-flash{background:linear-gradient(135deg,#06b6d4,#2563eb);}
        .btn-match{background:linear-gradient(135deg,#10b981,#22c55e);}
        .flex { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
        .split-pane { display: grid; grid-template-columns: minmax(280px,.9fr) minmax(320px,1.25fr); gap: 24px; }
        .left-col, .right-col { min-width: 0; }
        input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 16px; margin-top: 6px; margin-bottom: 12px; background:#fff; font-size:14px; }
        input:focus,textarea:focus,select:focus{outline:3px solid rgba(99,102,241,.18); border-color:var(--brand)}
        .subject-tag { background: white; border:1px solid #e2e8f0; padding: 9px 16px; border-radius: 999px; cursor: pointer; display: inline-block; font-weight:800; box-shadow:0 5px 14px rgba(15,23,42,.04); }
        .subject-tag.active { background: linear-gradient(135deg,var(--brand),#06b6d4); color: white; border-color:transparent; }
        .note-item, .exercise-item { background: white; border-radius: 22px; padding: 16px; margin-bottom: 14px; border: 1px solid #e2e8f0; border-left: 6px solid var(--brand); word-break: break-word; box-shadow:0 8px 18px rgba(15,23,42,.045); }
        .exercise-item{position:relative; overflow:hidden;} .exercise-item:before{content:"";position:absolute;right:-28px;top:-28px;width:86px;height:86px;border-radius:50%;background:rgba(99,102,241,.10)}
        .record-item { background: #f8fafc; margin: 10px 0; padding: 14px; border-radius: 18px; border:1px solid #e2e8f0; }
        .q-card { background:#f8fafc; border:1px solid #e2e8f0; border-radius:18px; padding:14px; margin:12px 0; }
        .danger-btn { background:linear-gradient(135deg,#ef4444,#f97316); }
        .file-link { display: inline-block; margin-top: 8px; color: #4338ca; text-decoration: none; background: #eef2ff; padding: 7px 12px; border-radius: 999px; font-weight:700; }
        .student-topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
        .student-profile{display:flex;gap:14px;align-items:center;}
        .avatar{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#06b6d4);color:white;display:grid;place-items:center;font-size:24px;font-weight:900;box-shadow:0 12px 24px rgba(99,102,241,.25)}
        .stat-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px;margin:16px 0 22px;}
        .stat-card{border-radius:22px;padding:16px;background:linear-gradient(180deg,#fff,#f8fafc);border:1px solid #e2e8f0;box-shadow:0 8px 18px rgba(15,23,42,.04)}
        .stat-card b{display:block;font-size:26px}.stat-card span{color:var(--muted);font-weight:700;font-size:13px}
        .learning-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 18px;}
        .learning-tab{border:1px solid #e2e8f0;background:white;padding:9px 14px;border-radius:999px;font-weight:900;cursor:pointer;color:#334155;}
        .learning-tab.active{background:#0f172a;color:white;border-color:#0f172a;}
        .mode-grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
        .mode-card{border:none;text-align:left;background:white;border-radius:24px;padding:18px;box-shadow:0 10px 22px rgba(15,23,42,.06);cursor:pointer;min-height:124px;position:relative;overflow:hidden;}
        .mode-card:after{content:"";position:absolute;right:-20px;bottom:-20px;width:80px;height:80px;border-radius:50%;background:rgba(99,102,241,.1)}
        .mode-card .emoji{font-size:30px}.mode-card b{display:block;margin:7px 0 4px;font-size:17px}.mode-card span{color:var(--muted);font-size:13px;line-height:1.5;}
        .progress-bar{height:12px;border-radius:999px;background:#e2e8f0;overflow:hidden;margin-top:8px}.progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#06b6d4,#6366f1);border-radius:999px;}
        .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#f1f5f9;padding:6px 10px;color:#334155;font-size:12px;font-weight:800;margin:4px 6px 4px 0;}
        .answer-option{display:block;width:100%;text-align:left;background:#fff;border:2px solid #e2e8f0;border-radius:18px;padding:14px 16px;margin:10px 0;font-weight:800;cursor:pointer;transition:.15s;}
        .answer-option:hover{border-color:#6366f1;background:#eef2ff;transform:translateY(-1px)}
        .answer-option.correct{background:#ecfdf5;border-color:#10b981}.answer-option.wrong{background:#fef2f2;border-color:#ef4444}

        .sortable-answer{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:12px;margin:10px 0;}
        .sortable-list{display:flex;flex-wrap:wrap;gap:10px;align-items:center;min-height:58px;background:#f8fafc;border:2px dashed #cbd5e1;border-radius:16px;padding:10px;touch-action:none;}
        .sortable-item{display:inline-flex;align-items:center;gap:7px;background:#ffffff;border:2px solid #c7d2fe;color:#1e1b4b;border-radius:999px;padding:9px 12px;font-weight:900;cursor:grab;user-select:none;box-shadow:0 6px 14px rgba(15,23,42,.08);touch-action:none;}
        .sortable-item.dragging{opacity:.55;transform:scale(.98);cursor:grabbing;}
        .sortable-item .move-btn{border:0;background:#eef2ff;color:#4338ca;border-radius:999px;width:24px;height:24px;font-weight:950;cursor:pointer;}
        .sequence-event-list{margin:10px 0;background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:10px;line-height:1.75;color:#7c2d12;font-size:13px;}
        .sequence-event-list b{display:inline-flex;width:26px;color:#c2410c;}
        .sortable-hint{font-size:12px;color:#64748b;line-height:1.55;margin-top:8px;}
        .flashcard{min-height:260px;display:grid;place-items:center;text-align:center;border-radius:30px;background:linear-gradient(135deg,#ffffff,#eef2ff);border:1px solid #c7d2fe;padding:28px;font-size:24px;font-weight:900;cursor:pointer;box-shadow:inset 0 0 0 3px rgba(255,255,255,.6)}
        .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.match-card{background:white;border:2px solid #e2e8f0;border-radius:18px;padding:14px;cursor:pointer;font-weight:800;min-height:62px}.match-card.selected{border-color:#f97316;background:#fff7ed}.match-card.done{opacity:.45;text-decoration:line-through;background:#ecfdf5;border-color:#10b981}


        .note-preview-modal{width:94vw!important;max-width:1180px!important;height:88vh!important;max-height:88vh!important;overflow:hidden!important;padding:0!important;background:#f8fafc!important;}
        .note-preview-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;background:white;border-bottom:1px solid #e2e8f0;}
        .note-preview-body{height:calc(88vh - 68px);background:#111827;padding:12px;}
        .note-preview-body iframe{width:100%;height:100%;border:0;border-radius:18px;background:white;}

        .note-preview-body.annotatable{position:relative; overflow:hidden; background:#111827; padding:12px;}
        .note-preview-stage{position:relative; width:100%; height:100%; border-radius:18px; overflow:hidden; background:#fff;}
        .note-preview-stage iframe{position:absolute; inset:0; width:100%; height:100%; border:0; background:white; z-index:1;}
        .note-annotation-canvas{position:absolute; inset:0; width:100%; height:100%; z-index:2; touch-action:none; pointer-events:none;}
        .note-annotation-canvas.annotating{pointer-events:auto; cursor:crosshair;}
        .note-annot-toolbar{display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:10px 14px; background:#f8fafc; border-top:1px solid #e2e8f0; max-height:96px; overflow:auto;}
        .note-annot-tool{border:1px solid #cbd5e1; background:white; color:#334155; border-radius:999px; padding:7px 11px; font-size:12px; font-weight:900; cursor:pointer;}
        .note-annot-tool.active{background:#4338ca; color:white; border-color:#4338ca;}
        .note-annot-toolbar input[type="color"]{width:44px; height:34px; padding:2px; margin:0; border-radius:10px;}
        .note-annot-toolbar input[type="range"]{width:120px; margin:0;}
        .note-annot-hint{font-size:12px; color:#64748b; line-height:1.5; padding:0 14px 10px; background:#f8fafc;}

        .note-preview-stage{position:relative;width:100%;height:100%;transform-origin:0 0;transition:transform .08s linear;}
        .note-preview-stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;border-radius:18px;background:white;z-index:1;}
        .note-gesture-layer{position:absolute;inset:0;z-index:4;display:none;touch-action:none;cursor:grab;background:rgba(255,255,255,0.001);}
        .note-gesture-layer.active{display:block;}
        .note-sticker-layer{position:absolute;inset:0;z-index:3;pointer-events:none;}
        .note-sticker{position:absolute;transform:translate(-50%,-50%);font-size:34px;line-height:1;background:rgba(255,255,255,.76);border:2px solid rgba(99,102,241,.25);border-radius:16px;padding:4px 8px;box-shadow:0 8px 18px rgba(15,23,42,.12);pointer-events:auto;touch-action:none;cursor:move;user-select:none;}
        .note-sticker:hover{border-color:#ef4444;box-shadow:0 10px 24px rgba(239,68,68,.22);}
        .note-sticker:active{transform:translate(-50%,-50%) scale(.96);}
        .note-side-panel{position:absolute;right:20px;top:86px;bottom:126px;width:min(340px,86vw);z-index:8;background:rgba(255,255,255,.96);border:1px solid #e2e8f0;border-radius:22px;box-shadow:0 18px 45px rgba(15,23,42,.18);padding:14px;overflow:auto;display:none;}
        .note-side-panel.open{display:block;}
        .note-side-panel h4{margin-bottom:8px;}
        .note-list-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px;margin:8px 0;font-size:13px;line-height:1.55;}
        .note-zoom-status{font-size:12px;color:#64748b;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0;border-radius:999px;padding:5px 9px;}

        .note-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
        .workbench-modal{width:96vw!important;max-width:1280px!important;height:90vh!important;max-height:90vh!important;overflow:hidden!important;padding:0!important;background:#f8fafc!important;}
        .workbench-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;background:white;border-bottom:1px solid #e2e8f0;}
        .workbench-body{display:grid;grid-template-columns:minmax(360px,1.08fr) minmax(340px,.92fr);gap:0;height:calc(90vh - 72px);}
        .pdf-pane{background:#111827;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0;overflow:hidden;}
        .pdf-pane #exercisePdfAnnotator{flex:1;min-height:0;display:block;}
        .pdf-pane iframe{width:100%;height:100%;border:0;border-radius:18px;background:white;}
        .answer-pane{background:#fff;padding:18px;overflow:auto;border-left:1px solid #e2e8f0;}
        .answer-paper-title{position:sticky;top:-18px;background:#fff;padding:0 0 12px;z-index:3;border-bottom:1px solid #e2e8f0;margin-bottom:12px;}
        .answer-sheet-q{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:14px;margin:12px 0;}
        .answer-sheet-q .q-type{display:inline-block;background:#eef2ff;color:#4338ca;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;margin-bottom:8px;}
        @media (max-width: 900px){.workbench-modal{height:94vh!important;}.workbench-body{grid-template-columns:1fr;height:calc(94vh - 72px);}.pdf-pane{height:44vh}.answer-pane{border-left:0;border-top:1px solid #e2e8f0;}}

        .drawing-board-wrap { background:#ffffff; border:1px dashed #cbd5e1; border-radius:16px; padding:10px; margin-top:10px; }
        .drawing-board-wrap.expanded { position:fixed; inset:0; z-index:2500; background:#ffffff; border:0; border-radius:0; box-shadow:0 22px 70px rgba(15,23,42,.35); padding:0; display:grid; grid-template-rows:auto 1fr auto; height:100dvh; width:100vw; overflow:hidden; }
        .drawing-board-wrap.expanded .drawing-board-head { position:relative; z-index:4; font-size:16px; padding:12px 14px; margin:0; border-bottom:1px solid #e2e8f0; background:#ffffff; color:#0f172a; }
        .drawing-board-wrap.expanded .drawing-canvas-box { position:relative; z-index:2; flex:none; min-height:0; height:auto; border-radius:0; overflow:hidden; background:#ffffff; touch-action:none; }
        .drawing-board-wrap.expanded .drawing-canvas-box.show-grid { background-image:linear-gradient(#e2e8f0 1px, transparent 1px),linear-gradient(90deg,#e2e8f0 1px, transparent 1px); background-size:28px 28px; }
        .drawing-board-wrap.expanded .drawing-canvas { position:absolute; left:0; top:0; width:100%; height:100%; min-height:0; border:0; border-radius:0; background:transparent; transform-origin:0 0; image-rendering:auto; }
        .drawing-board-wrap.expanded .drawing-tools { position:relative; z-index:4; border-top:1px solid #e2e8f0; padding:10px 14px; margin:0; background:#ffffff; max-height:30vh; overflow:auto; align-items:center; }
        .drawing-expand-backdrop { display:none!important; pointer-events:none!important; }
        body.drawing-fullscreen-lock { overflow:hidden!important; touch-action:none; }
        .drawing-zoom-status { display:inline-flex; align-items:center; gap:4px; padding:5px 9px; border-radius:999px; background:#eef2ff; color:#4338ca; font-size:12px; font-weight:900; }
        .writing-pad-note { font-size:12px; color:#64748b; line-height:1.55; margin-top:6px; }
        .drawing-board-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; color:#475569; font-size:13px; font-weight:800; }
        .drawing-canvas-box { position:relative; border-radius:14px; overflow:hidden; background:#fff; touch-action:none; }
        .drawing-canvas-box.show-grid { background-image:linear-gradient(#e2e8f0 1px, transparent 1px),linear-gradient(90deg,#e2e8f0 1px, transparent 1px); background-size:24px 24px; }
        .drawing-canvas { width:100%; height:240px; border:1px solid #cbd5e1; border-radius:14px; background:transparent; touch-action:none; display:block; }
        .drawing-tools { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:8px; }
        .drawing-tools input[type="color"] { width:42px; height:34px; padding:2px; margin:0; border-radius:10px; }
        .drawing-tools input[type="range"] { width:110px; margin:0; }
        .draw-tool-btn { border:1px solid #cbd5e1; background:#f8fafc; color:#334155; border-radius:999px; padding:6px 10px; font-weight:900; cursor:pointer; font-size:12px; }
        .draw-tool-btn.active { background:#4338ca; border-color:#4338ca; color:white; }
        .draw-hint { font-size:12px; color:#64748b; line-height:1.6; width:100%; }
        .submitted-drawing { max-width:100%; border:1px solid #cbd5e1; border-radius:12px; background:white; margin-top:8px; }
        .vocab-set-card{background:linear-gradient(135deg,#fefce8,#ecfeff);border:1px solid #bae6fd;border-radius:22px;padding:14px;margin:12px 0;border-left:5px solid #06b6d4;}
        .vocab-input-hint{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:16px;padding:10px;margin:8px 0;color:#64748b;font-size:13px;line-height:1.6;}
        .quiz-option{display:block;width:100%;text-align:left;margin:8px 0;padding:12px 14px;border-radius:16px;border:2px solid #e2e8f0;background:white;font-weight:800;cursor:pointer;}
        .quiz-option.correct{background:#dcfce7;border-color:#22c55e;}
        .quiz-option.wrong{background:#fee2e2;border-color:#ef4444;}



        /* ===== Photo homework + test paper workspace ===== */
        .photo-homework-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:10px 0;}
        .photo-thumb{width:100%;max-height:220px;object-fit:contain;background:white;border:1px solid #cbd5e1;border-radius:14px;padding:4px;}
        .paper-card,.photo-card{background:#fff;border:1px solid #e2e8f0;border-left:6px solid #06b6d4;border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 8px 18px rgba(15,23,42,.045);}
        .paper-workspace-modal{position:fixed;inset:0;z-index:3600;background:#0f172a;display:grid;grid-template-rows:auto 1fr auto;color:#0f172a;}
        .paper-workspace-head,.paper-workspace-tools{background:#fff;display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #e2e8f0;position:relative;z-index:5;}
        .paper-workspace-tools{border-top:1px solid #e2e8f0;border-bottom:0;max-height:32vh;overflow:auto;}
        .paper-stage-wrap{position:relative;background:#111827;overflow:hidden;touch-action:none;}
        .paper-stage{position:absolute;left:0;top:0;width:100%;height:100%;transform-origin:0 0;background:#fff;}
        .paper-stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:white;z-index:1;}
        .paper-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:2;touch-action:none;}
        .paper-tool-btn{border:1px solid #cbd5e1;background:#f8fafc;color:#334155;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;cursor:pointer;}
        .paper-tool-btn.active{background:#4338ca;color:white;border-color:#4338ca;}
        .paper-tool-input{width:auto!important;margin:0!important;padding:4px!important;}
        .floating-ruler,.floating-protractor{position:absolute;z-index:4;left:80px;top:80px;user-select:none;touch-action:none;cursor:move;display:none;}
        .floating-ruler{width:520px;height:92px;background:linear-gradient(180deg,rgba(255,252,210,.92),rgba(255,244,150,.80));border:2px solid rgba(120,113,108,.88);border-radius:14px;box-shadow:0 12px 26px rgba(0,0,0,.22);overflow:visible;backdrop-filter:blur(3px);}
        .ruler-scale{position:absolute;left:18px;right:18px;top:12px;bottom:18px;border-bottom:2px solid rgba(30,41,59,.72);}
        .ruler-tick{position:absolute;bottom:0;width:1px;background:#111827;opacity:.88;}
        .ruler-tick.mm{height:10px;opacity:.55;}
        .ruler-tick.half{height:18px;width:1.5px;opacity:.72;}
        .ruler-tick.cm{height:34px;width:2px;opacity:.94;}
        .ruler-number{position:absolute;bottom:38px;transform:translateX(-50%);font-size:13px;font-weight:950;color:#111827;}
        .ruler-unit-label{position:absolute;right:20px;top:8px;background:rgba(15,23,42,.86);color:white;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:950;letter-spacing:.3px;}
        .ruler-mm-label{position:absolute;left:18px;top:8px;color:#334155;font-size:11px;font-weight:900;}
        .ruler-rotate-handle{position:absolute;right:-17px;top:-17px;width:38px;height:38px;border-radius:50%;background:#4338ca;color:white;display:grid;place-items:center;font-size:17px;font-weight:950;box-shadow:0 8px 18px rgba(67,56,202,.35);cursor:grab;touch-action:none;z-index:3;}
        .ruler-angle-label{position:absolute;left:12px;bottom:-28px;background:#0f172a;color:white;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:950;box-shadow:0 6px 14px rgba(15,23,42,.22);}
        .floating-protractor{width:410px;height:220px;background:transparent;border:0;box-shadow:none;overflow:visible;}
        .protractor-shell{position:absolute;left:0;top:0;width:410px;height:220px;filter:drop-shadow(0 12px 24px rgba(0,0,0,.24));}

                <button class="teacher-tab admin-action" data-action="uploadRich">互動練習 JSON</button>

<script>
    // ---------- 學科全部繁體 ----------
    const primarySubjects = ["中文","英文","數學","常識","人文","科學","音樂","體育","普通話"];
    const secondarySubjects = ["中文","英文","數學","公民","科學","化學","物理","生物","經濟","企會管","地理","歷史","中史"];
    const DEFAULT_GAS_UPLOAD_URL = "https://script.google.com/macros/s/AKfycbwnvaK5J0IzwJmIRcaVvbfEhPF-krZZWfkizRG74mG8vxP0Cd__L928Xu7W750Cgdhy/exec";
    let cloudSyncReady = false;
    let cloudSyncTimer = null;
    let lastCloudStatus = "尚未同步";

    // ---------- 學生清單 ----------
    const DEFAULT_STUDENTS = [
        { studentId: "S001", name: "Hannah", gradeType: "小學", subjects: [...primarySubjects] },
        { studentId: "S002", name: "Elvis", gradeType: "小學", subjects: [...primarySubjects] },
        { studentId: "S003", name: "Yannie", gradeType: "小學", subjects: [...primarySubjects] },
        { studentId: "S004", name: "Kobe", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S005", name: "Katie", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S006", name: "Kylie", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S007", name: "Anna", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S008", name: "噠熹", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S009", name: "沁兒", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S010", name: "Yannis", gradeType: "中學", subjects: [...secondarySubjects] }
    ];

    let db = {
        students: [],
        notes: [],        // { id, subject, title, driveLink, description, uploadDate, gameQuizId, targetStudentIds }
        exercises: [],    // { id, subject, type, title, config, createdAt, targetStudentIds }；interactive_mixed 支援選擇/是非/填充/問答/資料題/重組句子/時序排序
        vocabSets: [],    // { id, subject, title, sourceNoteId, cards:[{term, definition}], targetStudentIds, createdAt }
        culturePosts: [], // 中華文化小常識：{id,title,date,type,youtubeUrl,pdfLink,pdfDataUrl,text,targetStudentIds,createdAt}
        noteAnnotations: [], // { id, studentId, noteId, imageData, updatedAt } 學生筆記手寫/螢光筆批註
        photoHomework: [], // 學生拍照提交功課：{id,studentId,subject,title,note,images,annotatedImages,score,feedback,reviewed}
        testPapers: [], // 試卷區：{id,subject,title,driveLink,pdfDataUrl,targetStudentIds}
        testPaperSubmissions: [], // 試卷提交：{id,paperId,studentId,answerImage,score,feedback,reviewed}
        testPaperDrafts: [], // 試卷自動保存草稿：老師可即時查看
        submissions: [],  // { id, studentId, exerciseId, answers, score, feedback, correction, reviewed, submitDate }
        settings: { gasUploadUrl: DEFAULT_GAS_UPLOAD_URL } // Google Apps Script Web App URL，用於把學生朗讀錄音上傳到老師 Google Drive
    };

    function loadDB() {
        const saved = localStorage.getItem("teach_platform_db");
        let oldStudents = null;
        if(saved) {
            try {
                let parsed = JSON.parse(saved);
                if(parsed.students) oldStudents = parsed.students;
                if(parsed.notes) db.notes = parsed.notes;
                if(parsed.exercises) db.exercises = parsed.exercises;
                if(parsed.vocabSets) db.vocabSets = parsed.vocabSets;
                if(parsed.culturePosts) db.culturePosts = parsed.culturePosts;
                if(parsed.noteAnnotations) db.noteAnnotations = parsed.noteAnnotations;
                if(parsed.photoHomework) db.photoHomework = parsed.photoHomework;
                if(parsed.testPapers) db.testPapers = parsed.testPapers;
                if(parsed.testPaperSubmissions) db.testPaperSubmissions = parsed.testPaperSubmissions;
                if(parsed.testPaperDrafts) db.testPaperDrafts = parsed.testPaperDrafts;
                if(parsed.submissions) db.submissions = parsed.submissions;
                if(parsed.settings) db.settings = { ...db.settings, ...parsed.settings };
                // 如果舊版 localStorage 曾保存空網址，這裡自動恢復老師已提供的 Apps Script URL
                if(!db.settings.gasUploadUrl || !String(db.settings.gasUploadUrl).trim()) {
                    db.settings.gasUploadUrl = DEFAULT_GAS_UPLOAD_URL;
                }
            } catch(e) {}
        }
        // 合併學生資料
        const newStudents = [];
        for (let defaultStu of DEFAULT_STUDENTS) {
            let existing = oldStudents ? oldStudents.find(s => s.studentId === defaultStu.studentId) : null;
            if (existing) {
                newStudents.push({
                    ...defaultStu,
                    name: existing.name || defaultStu.name,
                    subjects: (existing.subjects && existing.subjects.length) ? existing.subjects : defaultStu.subjects
                });
            } else {
                newStudents.push({ ...defaultStu });
            }
        }
        db.students = newStudents;
        syncStorage();
    }

    function syncStorage() {
        localStorage.setItem("teach_platform_db", JSON.stringify(db));
        if(cloudSyncReady) scheduleCloudSave();
    }

    function normalizeDbShape(data) {
        if(!data || typeof data !== 'object') return null;
        data.students = Array.isArray(data.students) ? data.students : [];
        data.notes = Array.isArray(data.notes) ? data.notes : [];
        data.exercises = Array.isArray(data.exercises) ? data.exercises : [];
        data.vocabSets = Array.isArray(data.vocabSets) ? data.vocabSets : [];
        data.culturePosts = Array.isArray(data.culturePosts) ? data.culturePosts : [];
        data.noteAnnotations = Array.isArray(data.noteAnnotations) ? data.noteAnnotations : [];
        data.photoHomework = Array.isArray(data.photoHomework) ? data.photoHomework : [];
        data.testPapers = Array.isArray(data.testPapers) ? data.testPapers : [];
        data.testPaperSubmissions = Array.isArray(data.testPaperSubmissions) ? data.testPaperSubmissions : [];
        data.testPaperDrafts = Array.isArray(data.testPaperDrafts) ? data.testPaperDrafts : [];
        data.submissions = Array.isArray(data.submissions) ? data.submissions : [];
        data.settings = { gasUploadUrl: DEFAULT_GAS_UPLOAD_URL, ...(data.settings || {}) };
        if(!data.settings.gasUploadUrl || !String(data.settings.gasUploadUrl).trim()) data.settings.gasUploadUrl = DEFAULT_GAS_UPLOAD_URL;
        return data;
    }

    function mergeDefaultStudents(studentsFromCloud) {
        const result = [];
        for (let defaultStu of DEFAULT_STUDENTS) {
            let existing = Array.isArray(studentsFromCloud) ? studentsFromCloud.find(s => s.studentId === defaultStu.studentId) : null;
            result.push(existing ? {
                ...defaultStu,
                ...existing,
                subjects: (existing.subjects && existing.subjects.length) ? existing.subjects : defaultStu.subjects
            } : { ...defaultStu });
        }
        if(Array.isArray(studentsFromCloud)) {
            studentsFromCloud.forEach(s => { if(s && s.studentId && !result.find(x=>x.studentId===s.studentId)) result.push(s); });
        }
        return result;
    }

    async function cloudRequest(payload) {
        const url = (db.settings && db.settings.gasUploadUrl) ? db.settings.gasUploadUrl : DEFAULT_GAS_UPLOAD_URL;
        const res = await fetch(url, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        const json = await res.json();
        if(!json.ok) throw new Error(json.error || "雲端同步失敗");
        return json;
    }

    async function loadCloudDB() {
        try {
            const json = await cloudRequest({ action: "getDB" });
            if(json.db) {
                const cloudDb = normalizeDbShape(json.db);
                if(cloudDb) {
                    db.students = mergeDefaultStudents(cloudDb.students);
                    db.notes = cloudDb.notes;
                    db.exercises = cloudDb.exercises;
                    db.vocabSets = cloudDb.vocabSets || [];
                    db.culturePosts = cloudDb.culturePosts || [];
                    db.noteAnnotations = cloudDb.noteAnnotations || [];
                    db.photoHomework = cloudDb.photoHomework || [];
                    db.testPapers = cloudDb.testPapers || [];
                    db.testPaperSubmissions = cloudDb.testPaperSubmissions || [];
                    db.testPaperDrafts = cloudDb.testPaperDrafts || [];
                    db.submissions = cloudDb.submissions;
                    db.settings = { ...db.settings, ...cloudDb.settings };
                    localStorage.setItem("teach_platform_db", JSON.stringify(db));
                    lastCloudStatus = "已從 Google 後台載入資料";
                }
            } else {
                lastCloudStatus = "Google 後台暫無資料，已使用本機資料";
            }
            cloudSyncReady = true;
            refreshCurrentViewsAfterSync();
        } catch(err) {
            console.warn(err);
            cloudSyncReady = false;
            lastCloudStatus = "雲端同步失敗：" + err.message;
            showCloudWarning(err.message);
        }
    }

    function scheduleCloudSave() {
        clearTimeout(cloudSyncTimer);
        cloudSyncTimer = setTimeout(saveCloudDB, 600);
    }

    function roughSizeKB(obj) {
        try { return Math.round(JSON.stringify(obj).length / 1024); } catch(e) { return 0; }
    }
    function isDataUrl(v) { return typeof v === 'string' && v.startsWith('data:'); }
    function lightText(v, maxLen=5000) {
        if(typeof v !== 'string') return v;
        if(isDataUrl(v)) return '';
        return v.length > maxLen ? v.slice(0, maxLen) + '…' : v;
    }
    function stripHeavyValue(value, key='') {
        if(isDataUrl(value)) return '';
        if(typeof value === 'string' && value.length > 80000) return '';
        return value;
    }
    function buildCloudSafeDB() {
        const clone = JSON.parse(JSON.stringify(db || {}));
        clone.settings = { ...(clone.settings || {}), cloudSafeMode: true, driveAssetMode: true, cloudSafeNote: '大型圖片/PDF/筆跡合成圖先上傳到 Google Drive，雲端同步包只保存 Drive 連結，避免 The quota has been exceeded。' };
        if(Array.isArray(clone.notes)) clone.notes = clone.notes.map(n => ({ ...n, description: lightText(n.description || '', 4000) }));
        if(Array.isArray(clone.exercises)) clone.exercises = clone.exercises.map(ex => {
            const cfg = ex.config || {};
            return { ...ex, config: { ...cfg,
                sourcePdfDataUrl: '', pdfDataUrl: '',
                sourcePdfAsset: cfg.sourcePdfAsset || cfg.pdfAsset || null,
                pdfAsset: cfg.pdfAsset || cfg.sourcePdfAsset || null,
                sourcePdfDriveUrl: cfg.sourcePdfDriveUrl || cfg.pdfDriveUrl || (cfg.sourcePdfAsset && (cfg.sourcePdfAsset.fileUrl || cfg.sourcePdfAsset.url)) || '',
                sourcePdfDownloadUrl: cfg.sourcePdfDownloadUrl || cfg.pdfDriveDownloadUrl || (cfg.sourcePdfAsset && cfg.sourcePdfAsset.downloadUrl) || '',
                sourceDriveLink: cfg.sourceDriveLink || cfg.driveLink || cfg.pdfLink || cfg.sourcePdfDriveUrl || '',
                driveLink: cfg.driveLink || cfg.sourceDriveLink || cfg.pdfLink || cfg.sourcePdfDriveUrl || ''
            }};
        });

        if(Array.isArray(clone.testPapers)) clone.testPapers = clone.testPapers.map(p => ({ ...p, pdfDataUrl: '', localPdfTooLarge: !!p.pdfDataUrl, pdfDriveAsset: p.pdfDriveAsset || null, pdfDriveUrl: p.pdfDriveUrl || '', pdfDriveDownloadUrl: p.pdfDriveDownloadUrl || '' }));
        if(Array.isArray(clone.noteAnnotations)) clone.noteAnnotations = clone.noteAnnotations.map(a => ({ ...a, imageData: '', imageDataTooLarge: !!a.imageData, imageAsset: a.imageAsset || null, imageUrl: a.imageUrl || '' }));
        if(Array.isArray(clone.photoHomework)) clone.photoHomework = clone.photoHomework.map(h => ({ ...h, images: (h.images||[]).map(x=>isDataUrl(x)?'':x), annotatedImages: (h.annotatedImages||[]).map(x=>isDataUrl(x)?'':x), imageCount: (h.images||[]).length, annotatedCount: (h.annotatedImages||[]).length, imagesSavedAsDriveLinks: true }));
        if(Array.isArray(clone.testPaperDrafts)) clone.testPaperDrafts = clone.testPaperDrafts.map(d => ({ ...d, answerImage: '', mergedPages: (d.mergedPages||[]).map(x=>isDataUrl(x)?'':x), answerLayers: (d.answerLayers||[]).map(x=>isDataUrl(x)?'':x), answerImageUrl: d.answerImageUrl || '', mergedPageUrls: d.mergedPageUrls || [], answerLayerUrls: d.answerLayerUrls || [], answerImageAsset: d.answerImageAsset || null, mergedPageAssets: d.mergedPageAssets || [], answerLayerAssets: d.answerLayerAssets || [], pageCount: (d.mergedPages||d.mergedPageUrls||[]).length, draftImagesSavedAsDriveLinks: true }));
        if(Array.isArray(clone.testPaperSubmissions)) clone.testPaperSubmissions = clone.testPaperSubmissions.map(s => ({ ...s, answerImage: '', mergedPages: (s.mergedPages||[]).map(x=>isDataUrl(x)?'':x), answerLayers: (s.answerLayers||[]).map(x=>isDataUrl(x)?'':x), answerImageUrl: s.answerImageUrl || '', mergedPageUrls: s.mergedPageUrls || [], answerLayerUrls: s.answerLayerUrls || [], answerImageAsset: s.answerImageAsset || null, mergedPageAssets: s.mergedPageAssets || [], answerLayerAssets: s.answerLayerAssets || [], pageCount: (s.mergedPages||s.mergedPageUrls||[]).length, submissionImagesSavedAsDriveLinks: true }));
        function walk(obj) {
            if(!obj || typeof obj !== 'object') return obj;
            if(Array.isArray(obj)) return obj.map(walk);
            Object.keys(obj).forEach(k => {
                const v = obj[k];
                if(typeof v === 'string') obj[k] = stripHeavyValue(v, k);
                else if(v && typeof v === 'object') obj[k] = walk(v);
            });
            return obj;
        }
        return walk(clone);

        try {
            await uploadPendingLargeAssetsToDrive(msg => { lastCloudStatus = msg; });
            const payloadDb = buildCloudSafeDB();
            const sizeKB = roughSizeKB(payloadDb);
            const json = await cloudRequest({ action: "saveDB", db: payloadDb, updatedAt: new Date().toISOString(), cloudSafeMode: true, approxSizeKB: sizeKB });
            lastCloudStatus = `已同步到 Google 後台（瘦身模式，約 ${sizeKB} KB）：` + new Date().toLocaleString();
        } catch(err) {
            console.warn(err);
            lastCloudStatus = "保存到 Google 後台失敗：" + err.message;
            if(String(err.message || '').toLowerCase().includes('quota') || String(err.message || '').toLowerCase().includes('exceeded')) {

        }
    }

    function formatSubmittedAnswers(sub) {
        if(!sub) return '<span style="color:#64748b;">暫無提交答案</span>';
        let raw = sub.answers;
        if(raw === undefined || raw === null || raw === '') return '<span style="color:#64748b;">未填寫答案</span>';
        function renderAnswerItem(a, i) {
            if(a && typeof a === 'object') {
                let q = a.question ? `<div style="font-weight:900;color:#334155;">${i+1}. ${escapeHtml(a.question)}</div>` : `<div style="font-weight:900;color:#334155;">第 ${i+1} 題</div>`;

                let html = `<li style="margin-bottom:12px;">${q}<div><b>文字答案：</b>${textAns}</div>`;
                if(a.drawingData) html += `<div><b>繪圖答案：</b><br><img class="submitted-drawing" src="${a.drawingData}" alt="學生繪圖答案"></div>`;

                html += `</li>`;
                return html;
            }
            return `<li>${escapeHtml(a || '未作答')}</li>`;
        }
        try {
            let parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
            if(Array.isArray(parsed)) {
                return '<ol style="padding-left:22px;margin-top:6px;">' + parsed.map((a,i)=>renderAnswerItem(a,i)).join('') + '</ol>';
            }
            if(typeof parsed === 'object') {
                return '<div style="margin-top:6px;">' + Object.keys(parsed).map(k=>`<div><b>${escapeHtml(k)}：</b>${escapeHtml(parsed[k] || '未作答')}</div>`).join('') + '</div>';
            }
            return escapeHtml(parsed);
        } catch(e) {
            let text = String(raw);
            if(text.startsWith('朗讀音頻:') || text.startsWith('錄音檔:')) return escapeHtml(text);
            return escapeHtml(text);

        if(['data','source','資料','資料題'].includes(t)) return 'data';

        if(['sequence','timeline','event_order','eventorder','sequencing','order','sorting','時序','時序題','事件排序','排序題'].includes(t)) return 'sequence';

    function buildInteractiveQuestionsFromJson(raw) {

            const type = normalizeQuestionType(q.type);
            let items = q.items || q.phrases || q.words || q.options || q.letters || [];
            if(typeof items === 'string') items = items.split(/[|,，、]/).map(x=>x.trim()).filter(Boolean);
            if(!Array.isArray(items)) items = [];
            let answer = q.answer ?? q.correctOrder ?? q.order ?? '';
            if(Array.isArray(answer)) answer = answer.map(x=>String(x));
            return {
                type,
                text: q.text || q.question || `第 ${idx+1} 題`,
                options: Array.isArray(q.options) ? q.options : [],
                items,
                events: q.events || q.eventMap || q.descriptions || null,
                answer,
                passage: q.passage || q.source || q.data || '',
                marks: q.marks || ''
            };
        });
    }

    function resizeAnnotationCanvas(canvas, keepImage=true) {
        const rect = canvas.getBoundingClientRect();
        if(!rect.width || !rect.height) return;
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        let oldData = null;
        if(keepImage && canvas.width && canvas.height) {
            try { oldData = canvas.toDataURL('image/png'); } catch(e) {}
        }
        const cssW = Math.max(1, Math.round(rect.width / (canvas._noteZoomScale || 1)));
        const cssH = Math.max(1, Math.round(rect.height / (canvas._noteZoomScale || 1)));
        canvas.width = Math.round(cssW * dpr);
        canvas.height = Math.round(cssH * dpr);
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr,0,0,dpr,0,0);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if(oldData) {
            const img = new Image();
            img.onload = () => { ctx.clearRect(0,0,cssW,cssH); ctx.drawImage(img, 0, 0, cssW, cssH); };
            img.src = oldData;
        }
    }

        canvas._noteState = state;
        const currentStuId = currentStudent ? currentStudent.studentId : 'teacher';
        const savedState = getNoteAnnotation(currentStuId, note.id) || {bookmarks:[],stickers:[],zoomState:{scale:1,x:0,y:0}};

        function setCanvasInteraction() {
            canvas.classList.toggle('annotating', ['pen','highlighter','eraser'].includes(state.mode));

        }
        function getBookmarksForNote() { return (getNoteAnnotation(currentStuId, note.id) || {}).bookmarks || []; }
        function getStickersFromDom() {
            return Array.from(stickerLayer.querySelectorAll('.note-sticker')).map(el => ({ id: el.dataset.id, emoji: el.dataset.emoji, x: Number(el.dataset.x), y: Number(el.dataset.y) }));
        }
        function snapshot() {
            try {
                state.history.push({

                    stickers: getStickersFromDom(),
                    bookmarks: JSON.parse(JSON.stringify(getBookmarksForNote())),
                    zoomState: JSON.parse(JSON.stringify(state.zoom || {scale:1,x:0,y:0}))

        }

                stickers: Array.isArray(snap.stickers) ? snap.stickers : [],

        gesture.addEventListener('pointerdown', e => { e.preventDefault(); gesture.setPointerCapture(e.pointerId); state.pointers.set(e.pointerId, {clientX:e.clientX,clientY:e.clientY}); });

        function renderStickers() {

        if(exercise.type === 'interactive_mixed') return exercise.config.questions || [];

    function normalizeSortableAnswerValue(v, type) {
        if(Array.isArray(v)) return v.map(x => String(x).trim()).filter(Boolean);
        if(v === undefined || v === null) return [];
        let text = String(v).trim();
        if(!text) return [];
        if(type === 'sequence') return text.split(/[>→,，、|\n]+/).map(x=>x.trim()).filter(Boolean);
        return text.split(/[|,，、\n]+/).map(x=>x.trim()).filter(Boolean);
    }
    function sortableAnswerCompare(given, expected, type) {
        const g = normalizeSortableAnswerValue(given, type);
        const e = normalizeSortableAnswerValue(expected, type);
        if(!e.length) return null;
        if(type === 'sentence_order') {
            const clean = arr => arr.join(' ').replace(/[\s。！？.!?,，、；;:：]+/g,'').toLowerCase();
            return clean(g) === clean(e);
        }
        const clean = arr => arr.map(x=>String(x).replace(/[\.．、\s]/g,'').toUpperCase()).join('>');
        return clean(g) === clean(e);
    }
    function renderSortableQuestionHtml(q, idx, qt) {
        let items = q.items || q.options || [];
        if(!Array.isArray(items)) items = [];
        if(!items.length && Array.isArray(q.answer)) items = [...q.answer].sort(() => Math.random() - 0.5);
        const eventMap = q.events && typeof q.events === 'object' ? q.events : null;
        const eventHtml = (qt === 'sequence' && eventMap) ? `<div class="sequence-event-list"><b>資料：</b><br>${Object.keys(eventMap).sort().map(k=>`<div><b>${escapeHtml(k)}</b>${escapeHtml(eventMap[k])}</div>`).join('')}</div>` : '';
        const label = qt === 'sentence_order' ? '拖動詞組，重組成完整句子' : '拖動英文字母，排出正確時序';
        return `${eventHtml}<div class="sortable-answer" data-sortable-question="${idx}" data-sortable-type="${qt}"><div style="font-weight:900;margin-bottom:8px;">${label}</div><div class="sortable-list" id="sortList${idx}">${items.map((item,i)=>`<div class="sortable-item" draggable="true" data-value="${escapeHtml(item)}"><button type="button" class="move-btn move-left" aria-label="上移">←</button><span>${escapeHtml(item)}</span><button type="button" class="move-btn move-right" aria-label="下移">→</button></div>`).join('')}</div><input type="hidden" id="q${idx}" value="${escapeHtml(JSON.stringify(items))}"><div class="sortable-hint">可直接拖動排序；iPad 如拖動不穩，可用每個詞組旁的 ← → 微調。</div></div>`;
    }
    function updateSortableHidden(list) {
        if(!list) return;
        const wrap = list.closest('.sortable-answer');
        const qIdx = wrap ? wrap.dataset.sortableQuestion : '';
        const hidden = document.getElementById(`q${qIdx}`);
        const values = Array.from(list.querySelectorAll('.sortable-item')).map(el => el.dataset.value || el.innerText.trim()).filter(Boolean);
        if(hidden) hidden.value = JSON.stringify(values);
    }
    function initSortableQuestions(root) {
        (root || document).querySelectorAll('.sortable-list').forEach(list => {
            if(list.dataset.sortableReady === '1') return;
            list.dataset.sortableReady = '1';
            let dragEl = null;
            list.querySelectorAll('.sortable-item').forEach(item => {
                item.addEventListener('dragstart', e => { dragEl = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
                item.addEventListener('dragend', () => { item.classList.remove('dragging'); dragEl = null; updateSortableHidden(list); });
            });
            list.addEventListener('dragover', e => {
                e.preventDefault();
                const after = Array.from(list.querySelectorAll('.sortable-item:not(.dragging)')).find(el => e.clientX < el.getBoundingClientRect().left + el.getBoundingClientRect().width / 2 && e.clientY < el.getBoundingClientRect().bottom + 12);
                if(dragEl) list.insertBefore(dragEl, after || null);
            });
            let active = null;
            list.addEventListener('pointerdown', e => {
                const item = e.target.closest('.sortable-item');
                if(!item || e.target.classList.contains('move-btn')) return;
                active = { item, startX:e.clientX, startY:e.clientY };
            });
            list.addEventListener('pointerup', e => {
                if(!active) return;
                const item = active.item;
                const dx = e.clientX - active.startX;
                const dy = e.clientY - active.startY;
                if(Math.abs(dx) > 35 || Math.abs(dy) > 35) {
                    const siblings = Array.from(list.querySelectorAll('.sortable-item')).filter(x=>x!==item);
                    const target = siblings.find(el => {
                        const r = el.getBoundingClientRect();
                        return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
                    });
                    if(target) {
                        const itemRect = item.getBoundingClientRect();
                        const targetRect = target.getBoundingClientRect();
                        if(targetRect.left < itemRect.left || targetRect.top < itemRect.top) list.insertBefore(item, target);
                        else list.insertBefore(item, target.nextSibling);
                    }
                }
                active = null; updateSortableHidden(list);
            });
            list.addEventListener('click', e => {
                const btn = e.target.closest('.move-btn');
                if(!btn) return;
                const item = btn.closest('.sortable-item');
                if(btn.classList.contains('move-left') && item.previousElementSibling) list.insertBefore(item, item.previousElementSibling);
                if(btn.classList.contains('move-right') && item.nextElementSibling) list.insertBefore(item.nextElementSibling, item);
                updateSortableHidden(list);
            });
            updateSortableHidden(list);
        });
    }

    function renderAnswerSheetHtml(qs) {
        if(!Array.isArray(qs) || qs.length === 0) {
            qs = [{ type:'short', text:'第 1 題', marks:'' }];
        }
        return qs.map((q, idx) => {
            const qt = normalizeQuestionType(q.type);
            const qText = escapeHtml(q.text || `第 ${idx+1} 題`);
            const marks = q.marks ? `<span style="color:#64748b;font-size:13px;">（${escapeHtml(q.marks)}分）</span>` : '';
            const passage = q.passage ? `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;margin:10px 0;white-space:pre-wrap;line-height:1.7;">${escapeHtml(q.passage)}</div>` : '';
            let answerHtml = '';
            if(qt === 'choice') {
                const opts = Array.isArray(q.options) ? q.options : [];
                answerHtml = opts.length ? opts.map(opt => `<label class="answer-option"><input type="radio" name="q${idx}" value="${escapeHtml(opt)}"> <span>${escapeHtml(opt)}</span></label>`).join('') : `<textarea id="q${idx}" rows="3" placeholder="這題沒有選項，請直接輸入答案"></textarea>`;
            } else if(qt === 'truefalse') {
                answerHtml = `<div class="tf-options"><label class="answer-option"><input type="radio" name="q${idx}" value="是"> <span>是</span></label><label class="answer-option"><input type="radio" name="q${idx}" value="非"> <span>非</span></label></div>`;
            } else if(qt === 'sentence_order' || qt === 'sequence') {
                answerHtml = renderSortableQuestionHtml(q, idx, qt);
            } else if(qt === 'fill') {
                answerHtml = `<input type="text" id="q${idx}" placeholder="請輸入填充答案"><div class="writing-pad-note">需要手寫字詞、列式、畫輔助線或補充步驟時，可使用下方可展開畫板。</div>${renderDrawingBoardHtml(idx)}`;
            } else if(qt === 'short' || qt === 'data') {
                answerHtml = `<textarea id="q${idx}" rows="5" placeholder="請在這裏作答；如需要畫圖，可使用下方繪圖板。"></textarea>${renderDrawingBoardHtml(idx)}`;
            } else {
                answerHtml = `<textarea id="q${idx}" rows="4" placeholder="請在這裏作答"></textarea>`;
            }
            return `<div class="q-card answer-sheet-q" data-question-index="${idx}"><p><strong>${idx+1}. ${qText}</strong> ${marks}</p>${passage}${answerHtml}</div>`;
        }).join('');
    }


    function initDrawingBoards(root) {
        function setupCanvas(canvas) {
            if(canvas.dataset.enhancedDrawingReady === '1') {
                resizeDrawingCanvas(canvas, true);
                return;
            }
            canvas.dataset.enhancedDrawingReady = '1';

            const ctx = canvas.getContext('2d', { willReadFrequently:true });
            const state = {
                tool:'pen', color:'#111827', size:4,
                drawing:false, start:null, points:[], snapshot:null, history:[],
                pointers:new Map(), gesture:null, view:{scale:1,x:0,y:0},
                lastMoveAt:0, lastPoint:null, holdToShape:false, logicalW:0, logicalH:0,
                penDetected:false, activePointerType:null, ignoredTouchPointers:new Set()
            };
            canvas._drawState = state;

            function dpr() { return Math.max(1, window.devicePixelRatio || 1); }
            function boxForCanvas() { return root.querySelector(`[data-canvas-box="${canvas.id}"]`) || canvas.parentElement; }
            function cssSizeForCanvas() {
                const wrap = canvas.closest('.drawing-board-wrap');
                const box = boxForCanvas();
                const r = box ? box.getBoundingClientRect() : canvas.getBoundingClientRect();
                if(wrap && wrap.classList.contains('expanded')) return { w:Math.max(900, Math.round(r.width || window.innerWidth)), h:Math.max(620, Math.round(r.height || (window.innerHeight-180))) };
                return { w:Math.max(420, Math.round(r.width || canvas.clientWidth || 900)), h:Math.max(240, Math.round(r.height || 240)) };
            }
            function preserveImage() {
                try { return (canvas.width && canvas.height) ? canvas.toDataURL('image/png') : null; } catch(e) { return null; }
            }
            function redrawImage(data, w, h) {
                if(!data) return;
                const img = new Image();
                img.onload = () => { ctx.save(); ctx.setTransform(dpr(),0,0,dpr(),0,0); ctx.clearRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); ctx.restore(); };
                img.src = data;
            }
            function resizeDrawingCanvas(keep=true) {
                const old = keep ? preserveImage() : null;
                const size = cssSizeForCanvas();
                const ratio = dpr();
                state.logicalW = size.w; state.logicalH = size.h;
                canvas.width = Math.round(size.w * ratio);
                canvas.height = Math.round(size.h * ratio);
                canvas.style.width = size.w + 'px';
                canvas.style.height = size.h + 'px';
                ctx.setTransform(ratio,0,0,ratio,0,0);
                ctx.lineCap='round'; ctx.lineJoin='round';
                applyStyle();
                redrawImage(old, size.w, size.h);
                applyView();
            }
            canvas._resizeDrawingCanvas = resizeDrawingCanvas;

            function applyView() {
                const wrap = canvas.closest('.drawing-board-wrap');
                const expanded = wrap && wrap.classList.contains('expanded');
                if(!expanded) { state.view = {scale:1,x:0,y:0}; canvas.style.transform = 'translate(0px,0px) scale(1)'; return; }
                state.view.scale = Math.max(.6, Math.min(4, state.view.scale || 1));
                canvas.style.transform = `translate(${state.view.x||0}px, ${state.view.y||0}px) scale(${state.view.scale})`;
                const status = wrap.querySelector('.drawing-zoom-status');
                if(status) status.textContent = `縮放 ${Math.round(state.view.scale*100)}%`;
            }
            function stylusOnlyEnabled() {
                const t = root.querySelector(`.stylusOnlyToggle[data-canvas="${canvas.id}"]`);
                return !!(t && t.checked);
            }
            function updatePalmStatus() {
                const wrap = canvas.closest('.drawing-board-wrap');
                if(!wrap) return;
                let badge = wrap.querySelector('.stylus-palm-status');
                if(!badge) {
                    badge = document.createElement('span');
                    badge.className = 'stylus-palm-status drawing-zoom-status';
                    badge.style.background = '#ecfeff';
                    badge.style.color = '#0369a1';
                    badge.textContent = '防誤觸待偵測';
                    const head = wrap.querySelector('.drawing-board-head .flex') || wrap.querySelector('.drawing-board-head');
                    if(head) head.prepend(badge);
                }
                if(!stylusOnlyEnabled()) badge.textContent = '手指可書寫';
                else if(state.penDetected) badge.textContent = '觸控筆模式：單指禁寫';

            function saveHistory() {

            }
            function drawArrowHead(from, to) {

                ctx.beginPath();
                ctx.moveTo(to.x, to.y);
                ctx.lineTo(to.x - len * Math.cos(angle - Math.PI/6), to.y - len * Math.sin(angle - Math.PI/6));

                ctx.lineTo(to.x - len * Math.cos(angle + Math.PI/6), to.y - len * Math.sin(angle + Math.PI/6));

            function drawShape(from, to, tool) {
                applyStyle(); ctx.beginPath();

                    ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
                    if(tool === 'arrow') drawArrowHead(from, to);
                } else if(tool === 'rect') {
                    ctx.strokeRect(from.x, from.y, to.x - from.x, to.y - from.y);
                } else if(tool === 'circle') {
                    const cx=(from.x+to.x)/2, cy=(from.y+to.y)/2, rx=Math.abs(to.x-from.x)/2, ry=Math.abs(to.y-from.y)/2;
                    ctx.ellipse(cx, cy, Math.max(1,rx), Math.max(1,ry), 0, 0, Math.PI*2); ctx.stroke();
                }
            }
            function distanceToLine(p,a,b) {
                const A=p.x-a.x,B=p.y-a.y,C=b.x-a.x,D=b.y-a.y;
                const dot=A*C+B*D,lenSq=C*C+D*D||1;
                const t=Math.max(0,Math.min(1,dot/lenSq));
                const x=a.x+t*C,y=a.y+t*D;

            }
            function smartCleanStroke() {
                if(!state.holdToShape || !state.points || state.points.length < 5) return false;
                const pts=state.points, first=pts[0], last=pts[pts.length-1];
                const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
                const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
                const w=maxX-minX,h=maxY-minY,diag=Math.hypot(w,h);
                if(diag < 35) return false;
                const avgLineDist=pts.reduce((s,p)=>s+distanceToLine(p,first,last),0)/pts.length;
                const closed=Math.hypot(first.x-last.x,first.y-last.y) < Math.max(34,diag*.18);
                restore(state.snapshot); applyStyle(); ctx.globalCompositeOperation='source-over';
                if(avgLineDist < Math.max(7, diag*.04) && Math.hypot(first.x-last.x, first.y-last.y) > 60) { drawShape(first,last,'line'); return true; }
                if(closed && w>34 && h>34) {
                    const cx=(minX+maxX)/2, cy=(minY+maxY)/2, rx=w/2, ry=h/2;
                    const ellipseError=pts.reduce((sum,p)=>{ const v=Math.sqrt(((p.x-cx)/rx)**2 + ((p.y-cy)/ry)**2); return sum+Math.abs(v-1); },0)/pts.length;
                    const nearEdges=pts.filter(p=>Math.min(Math.abs(p.x-minX),Math.abs(p.x-maxX),Math.abs(p.y-minY),Math.abs(p.y-maxY)) < Math.max(10,diag*.055)).length/pts.length;

                }

            }
            function beginStroke(e) {

            }
            function endStroke(e) {
                if(!state.drawing) return;
                e.preventDefault();
                const held = Date.now() - state.lastMoveAt > 480;
                const smart = root.querySelector(`.smartShapeToggle[data-canvas="${canvas.id}"]`);
                state.holdToShape = !!(smart && smart.checked && held);
                state.drawing=false;
                if(state.tool === 'pen' && state.holdToShape) smartCleanStroke();
                ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
            }
            function dist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
            function mid(a,b){ return {clientX:(a.clientX+b.clientX)/2, clientY:(a.clientY+b.clientY)/2}; }
            function pointerDown(e) {

                    e.preventDefault(); return;
                }

                const expanded=wrap && wrap.classList.contains('expanded');

                    const pts=Array.from(state.pointers.values());
                    if(state.gesture) {
                        const m=mid(pts[0],pts[1]), d=dist(pts[0],pts[1]);

                        state.view.y = state.gesture.view.y + (m.clientY - state.gesture.mid.clientY);

                if(!(wrap && wrap.classList.contains('expanded'))) return;
                e.preventDefault();
                const factor = e.deltaY < 0 ? 1.08 : .92;
                state.view.scale *= factor;
                applyView();
            }, {passive:false});

            setTimeout(()=>{ resizeDrawingCanvas(false); updatePalmStatus(); }, 20);
        }

        root.querySelectorAll('.drawing-canvas').forEach(setupCanvas);

        root.querySelectorAll('.draw-tool-btn').forEach(btn => btn.addEventListener('click', () => {
            const canvas = root.querySelector(`#${btn.dataset.canvas}`); if(!canvas || !canvas._drawState) return;

            btn.classList.add('active');
        }));
        root.querySelectorAll('.drawColor').forEach(input => input.addEventListener('input', () => {
            const canvas = root.querySelector(`#${input.dataset.canvas}`); if(canvas && canvas._drawState) { canvas._drawState.color = input.value; canvas.getContext('2d').strokeStyle = input.value; }
        }));
        root.querySelectorAll('.drawSize').forEach(input => input.addEventListener('input', () => {
            const canvas = root.querySelector(`#${input.dataset.canvas}`); if(canvas && canvas._drawState) { canvas._drawState.size = Number(input.value || 4); canvas.getContext('2d').lineWidth = Number(input.value || 4); }
        }));
        root.querySelectorAll('.gridToggle').forEach(input => input.addEventListener('change', () => {
            const box = root.querySelector(`[data-canvas-box="${input.dataset.canvas}"]`); if(box) box.classList.toggle('show-grid', input.checked);
        }));
        root.querySelectorAll('.stylusOnlyToggle').forEach(input => input.addEventListener('change', () => {
            const canvas = root.querySelector(`#${input.dataset.canvas}`);
            if(canvas && canvas._drawState) {
                canvas._drawState.ignoredTouchPointers.clear();
                const badgeWrap = canvas.closest('.drawing-board-wrap');
                const badge = badgeWrap ? badgeWrap.querySelector('.stylus-palm-status') : null;
                if(badge) badge.textContent = input.checked ? (canvas._drawState.penDetected ? '觸控筆模式：單指禁寫' : '防誤觸待偵測') : '手指可書寫';
            }
        }));
        root.querySelectorAll('.expandDrawingBtn').forEach(btn => btn.addEventListener('click', () => {
            const wrap = root.querySelector(`[data-drawing-wrap="${btn.dataset.wrap}"]`);
            if(!wrap) return;
            const isExpanded = wrap.classList.toggle('expanded');
            btn.textContent = isExpanded ? '收起畫板' : '展開大畫板';
            document.body.classList.toggle('drawing-fullscreen-lock', isExpanded);
            if(isExpanded) {
                if(!wrap.querySelector('.drawing-zoom-status')) {
                    const status = document.createElement('span');
                    status.className = 'drawing-zoom-status';
                    status.textContent = '縮放 100%';
                    const head = wrap.querySelector('.drawing-board-head .flex') || wrap.querySelector('.drawing-board-head');
                    head.prepend(status);
                }
                const canvas = wrap.querySelector('canvas');
                if(canvas && canvas._drawState) {
                    canvas._drawState.view = {scale:1,x:0,y:0};
                    setTimeout(()=>canvas._resizeDrawingCanvas && canvas._resizeDrawingCanvas(true), 80);
                }
            } else {
                const canvas = wrap.querySelector('canvas');
                if(canvas && canvas._drawState) {
                    canvas._drawState.view = {scale:1,x:0,y:0};
                    setTimeout(()=>canvas._resizeDrawingCanvas && canvas._resizeDrawingCanvas(true), 60);
                }
                if(!document.querySelector('.drawing-board-wrap.expanded')) document.body.classList.remove('drawing-fullscreen-lock');
            }
        }));
        root.querySelectorAll('.undoDrawingBtn').forEach(btn => btn.addEventListener('click', () => {
            const canvas = root.querySelector(`#${btn.dataset.canvas}`);
            if(canvas && canvas._drawState && canvas._drawState.history.length) canvas.getContext('2d').putImageData(canvas._drawState.history.pop(),0,0);
        }));
        root.querySelectorAll('.clearDrawingBtn').forEach(btn => btn.addEventListener('click', () => {
            const canvas = root.querySelector(`#${btn.dataset.canvas}`);
            if(canvas) {
                const ctx = canvas.getContext('2d');
                if(canvas._drawState) canvas._drawState.history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }
        }));
    }

    function isCanvasBlank(canvas) {
        const ctx = canvas.getContext('2d');
        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        for(let i=3; i<pixels.length; i+=4) if(pixels[i] !== 0) return false;
        return true;
    }

    function collectAnswerSheetResponses(modalContent, qs) {
        let responses = [], autoTotal = 0, autoCorrect = 0;
        qs.forEach((q, idx) => {
            let qt = normalizeQuestionType(q.type), val = '';
            if(qt === 'choice' || qt === 'truefalse') {
                let selected = modalContent.querySelector(`input[name="q${idx}"]:checked`);
                val = selected ? selected.value : '';
            } else if(qt === 'sentence_order' || qt === 'sequence') {
                let input = modalContent.querySelector(`#q${idx}`);
                try { val = input && input.value ? JSON.parse(input.value) : []; } catch(e) { val = input ? input.value : ''; }
            } else {
                let input = modalContent.querySelector(`#q${idx}`);
                val = input ? input.value.trim() : '';
            }
            let ans = q.answer ?? '';
            let objective = (['choice','truefalse','fill'].includes(qt) && String(ans).trim() !== '') || (['sentence_order','sequence'].includes(qt) && normalizeSortableAnswerValue(ans, qt).length);
            let correct = null;
            if(objective) {
                autoTotal++;
                correct = ['sentence_order','sequence'].includes(qt) ? sortableAnswerCompare(val, ans, qt) : String(val).trim().toLowerCase() === String(ans).trim().toLowerCase();
                if(correct) autoCorrect++;
            }
            let item = { question:q.text, type:qt, answer:val, correctAnswer:ans, autoCorrect:correct };
            let canvas = modalContent.querySelector(`#draw${idx}`);
            if(canvas && !isCanvasBlank(canvas)) item.drawingData = canvas.toDataURL('image/png');
            responses.push(item);
        });
        return { responses, autoScore: autoTotal ? `客觀題自動對：${autoCorrect}/${autoTotal}；待老師確認` : null };
    }

    function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(String(reader.result).split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    }


    function getBestAudioMimeType() {
        const candidates = [
            'audio/mp4;codecs=mp4a.40.2',
            'audio/mp4',
            'audio/aac',
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/ogg;codecs=opus',
            'audio/ogg'
        ];
        if(typeof MediaRecorder === 'undefined' || !MediaRecorder.isTypeSupported) return '';
        return candidates.find(t => MediaRecorder.isTypeSupported(t)) || '';
    }
    function normalizeAudioMimeType(type) {
        return String(type || '').split(';')[0].trim().toLowerCase();
    }
    function audioExtFromMime(type) {
        const mime = normalizeAudioMimeType(type);
        if(mime.includes('mp4') || mime.includes('aac') || mime.includes('m4a')) return 'm4a';
        if(mime.includes('ogg')) return 'ogg';
        if(mime.includes('wav')) return 'wav';
        return 'webm';
    }
    function createAudioRecorder(stream) {
        const preferred = getBestAudioMimeType();
        try { return preferred ? new MediaRecorder(stream, { mimeType: preferred }) : new MediaRecorder(stream); }
        catch(e) { return new MediaRecorder(stream); }
    }
    function makeAudioBlob(chunks, recorder) {
        const type = (recorder && recorder.mimeType) ? recorder.mimeType : getBestAudioMimeType();
        return type ? new Blob(chunks, { type }) : new Blob(chunks);
    }
    function safeFilePart(str) {
        return String(str || '未命名').replace(/[\\/:*?"<>|\s]+/g, '_').slice(0, 80);

    // ---------- Large assets: upload PDF/images/merged pages to Google Drive, sync only links ----------
    function assetSrc(v) {
        if(!v) return '';
        if(typeof v === 'string') return v;
        return v.url || v.fileUrl || v.downloadUrl || v.previewUrl || v.driveUrl || v.dataUrl || '';
    }
    function assetFileId(v) {
        if(!v) return '';
        if(typeof v === 'object') return v.fileId || v.id || '';
        return '';
    }
    function dataUrlMimeType(dataUrl) {
        const m = String(dataUrl || '').match(/^data:([^;,]+)[;,]/);
        return m ? m[1] : 'application/octet-stream';
    }
    function dataUrlBase64Part(dataUrl) {
        return String(dataUrl || '').split(',')[1] || '';
    }
    function extFromMimeType(mime) {
        mime = String(mime || '').toLowerCase();
        if(mime.includes('pdf')) return 'pdf';
        if(mime.includes('png')) return 'png';
        if(mime.includes('jpeg') || mime.includes('jpg')) return 'jpg';
        if(mime.includes('webp')) return 'webp';
        if(mime.includes('mp4')) return 'm4a';
        if(mime.includes('mpeg')) return 'mp3';
        return 'bin';
    }
    function makeAssetRecord(result, fallbackName, mimeType, localDataUrl='') {
        const fileUrl = result.fileUrl || result.url || result.webViewLink || result.downloadUrl || '';
        const fileId = result.fileId || result.id || extractDriveFileId(fileUrl) || '';
        const downloadUrl = result.downloadUrl || (fileId ? `https://drive.google.com/uc?export=download&id=${fileId}` : fileUrl);
        return { fileId, fileUrl, url: fileUrl || downloadUrl, downloadUrl, mimeType, fileName: result.fileName || fallbackName, uploadedAt: new Date().toISOString(), dataUrl: localDataUrl || '' };
    }
    async function uploadDataUrlAssetToDrive(dataUrl, fileName, meta={}) {
        if(!dataUrl || !String(dataUrl).startsWith('data:')) return dataUrl;
        if(!db.settings.gasUploadUrl) throw new Error('尚未設定 Apps Script Web App URL，不能上傳大型檔案到 Google Drive。');
        const mimeType = meta.mimeType || dataUrlMimeType(dataUrl);
        const finalName = safeFilePart(fileName || ('asset_' + Date.now())) + '.' + extFromMimeType(mimeType);
        const basePayload = {
            action: 'uploadAsset',
            assetType: meta.assetType || 'large_asset',
            studentId: meta.studentId || (currentStudent && currentStudent.studentId) || 'TEACHER',
            studentName: meta.studentName || (currentStudent && currentStudent.name) || 'Miss PAN',
            subject: meta.subject || '',
            title: meta.title || meta.exerciseTitle || finalName,
            mimeType,
            fileName: finalName,
            data: dataUrlBase64Part(dataUrl)
        };
        async function post(payload){
            const res = await fetch(db.settings.gasUploadUrl, { method:'POST', mode:'cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
            const json = await res.json();
            if(!json.ok) throw new Error(json.error || '大型檔案上傳失敗');
            return json;
        }
        try {
            return makeAssetRecord(await post(basePayload), finalName, mimeType, dataUrl);
        } catch(firstErr) {
            // Backward compatible: older Apps Script versions may only support uploadRecording.
            const fallbackPayload = { ...basePayload, action:'uploadRecording', exerciseTitle: basePayload.title, exerciseId: meta.assetType || 'large_asset', transcript:'大型檔案跨裝置同步', score:'' };
            try { return makeAssetRecord(await post(fallbackPayload), finalName, mimeType, dataUrl); }
            catch(secondErr) { throw new Error(firstErr.message + '；兼容模式也失敗：' + secondErr.message); }
        }
    }
    async function fetchDriveAssetDataUrl(fileId, meta={}) {
        if(!fileId) throw new Error('缺少 Drive fileId，不能讀取跨裝置 PDF。');
        if(!db.settings || !db.settings.gasUploadUrl) throw new Error('尚未設定 Apps Script Web App URL，不能讀取 Drive PDF。');
        const res = await fetch(db.settings.gasUploadUrl, {
            method:'POST', mode:'cors', headers:{'Content-Type':'text/plain;charset=utf-8'},
            body: JSON.stringify({ action:'getAssetData', fileId, assetType: meta.assetType || 'pdf_proxy' })
        });
        const json = await res.json();
        if(!json.ok) throw new Error(json.error || '讀取 Drive PDF 失敗');
        const mimeType = json.mimeType || 'application/pdf';
        const data = json.data || '';
        if(!data) throw new Error('Drive PDF 回傳內容是空的');
        return `data:${mimeType};base64,${data}`;
    }
    async function resolvePdfJsSourceFromAsset(localDataUrl, asset, directLink, meta={}) {
        if(localDataUrl && String(localDataUrl).startsWith('data:')) return { data: dataUrlToUint8Array(localDataUrl) };
        const fid = assetFileId(asset) || extractDriveFileId(directLink || '');
        if(fid) {
            try {
                const dataUrl = await fetchDriveAssetDataUrl(fid, meta);
                if(asset && typeof asset === 'object') asset.dataUrl = dataUrl; // 本機暫存，下一次同機開啟更快；雲端同步仍會自動去除大型 dataUrl
                return { data: dataUrlToUint8Array(dataUrl) };
            } catch(proxyErr) {
                console.warn('Drive proxy PDF load failed, fallback to direct URL', proxyErr);
            }
        }
        const url = assetSrc(asset) || normalizeDriveDownloadUrl(directLink || '') || directLink || '';
        return url;
    }

        if(!value) return value;

            el.addEventListener('click', (e) => {
                document.querySelectorAll('.subject-tag').forEach(c=>c.classList.remove('active'));
                el.classList.add('active');
                currentSubject = el.getAttribute('data-sub');
                renderSubjectDetails(currentSubject);
            });
        });

            currentSubject = subjectsList[0];
            renderSubjectDetails(currentSubject);
