            if(firstTag) firstTag.classList.add('active');
        } else {
            document.getElementById("subjectContentArea").innerHTML = "<p>暫無學科，請聯繫老師添加。</p>";
        }
    }


    function extractQuestionsForStudy(exercise) {
        if(!exercise) return [];
        if(exercise.type === 'choice') {
            return (exercise.config.questions || []).map((q, i) => ({
                type:'choice', text:q.text || `第${i+1}題`, options:q.options || [], answer:(exercise.config.answers||[])[i] || ''
            })).filter(q => q.text);
        }
        if(exercise.type === 'game_quiz') return (exercise.config.questions || []).map(q => ({...q, type:'choice'}));
        if(exercise.type === 'interactive_mixed') return (exercise.config.questions || []).filter(q => ['choice','truefalse','fill'].includes(normalizeQuestionType(q.type)) && String(q.answer || '').trim());
        if(exercise.type === 'listening_cn' || exercise.type === 'listening_en') return (exercise.config.questionsList || []).map(q=>({type:'short', text:q.text, answer:''}));
        return [];
    }
    function getStudyExercisesForSubject(subject) {
        if(!currentStudent) return [];
        return db.exercises.filter(e => e.subject === subject && isPublishedToStudent(e, currentStudent.studentId) && extractQuestionsForStudy(e).length);
    }
    function getStudentStats(subject) {
        let notes = db.notes.filter(n => n.subject === subject && isPublishedToStudent(n, currentStudent.studentId));
        let allExercises = db.exercises.filter(e => e.subject === subject && isPublishedToStudent(e, currentStudent.studentId));
        let pending = allExercises.filter(ex => !latestSubmissionFor(currentStudent.studentId, ex.id));
        let completed = allExercises.filter(ex => latestSubmissionFor(currentStudent.studentId, ex.id));
        let reviewed = completed.filter(ex => (latestSubmissionFor(currentStudent.studentId, ex.id)||{}).reviewed);
        let percent = allExercises.length ? Math.round(completed.length / allExercises.length * 100) : 0;
        return {notes, allExercises, pending, completed, reviewed, percent};
    }
    function renderLearningDashboard(subject) {
        const st = getStudentStats(subject);
        return `<div class="stat-grid">
            <div class="stat-card"><b>${st.notes.length}</b><span>筆記 Notes</span></div>
            <div class="stat-card"><b>${st.pending.length}</b><span>待完成 To-do</span></div>
            <div class="stat-card"><b>${st.completed.length}</b><span>已完成 Done</span></div>
            <div class="stat-card"><b>${st.percent}%</b><span>完成進度 Progress</span><div class="progress-bar"><div class="progress-fill" style="width:${st.percent}%"></div></div></div>
        </div>
        <div class="mode-grid">
            <button class="mode-card" data-study-mode="kahoot"><div class="emoji">🎮</div><b>Kahoot 式挑戰</b><span>根據互動練習題限時答題，適合課前熱身。</span></button>
            <button class="mode-card" data-study-mode="vocabFlash"><div class="emoji">🃏</div><b>單詞閃卡</b><span>先選單詞集，再開始翻卡，不會混合所有未學單詞。</span></button>
            <button class="mode-card" data-study-mode="vocabMatch"><div class="emoji">🧩</div><b>單詞配對</b><span>勾選單詞集與配對組數，可無限次重玩。</span></button>
            <button class="mode-card" data-study-mode="vocabQuiz"><div class="emoji">📝</div><b>單詞測驗</b><span>勾選測驗範圍和題目數量，可無限次自測。</span></button>
        </div>`;
    }
    function bindLearningModeButtons(subject) {
        document.querySelectorAll('[data-study-mode]').forEach(btn=>{
            btn.addEventListener('click',()=>{
                const mode = btn.getAttribute('data-study-mode');
                if(mode === 'kahoot') {
                    const exercises = getStudyExercisesForSubject(subject);
                    if(!exercises.length) { alert('這個學科暫時沒有可轉成挑戰的客觀練習題。'); return; }
                    openKahootMode(exercises);
                    return;
                }
                const vocabSets = getVocabSetsForSubject(subject);
                if(!vocabSets.length) { alert('這個學科暫時沒有單詞學習集。請老師先在後台「建立單詞學習集」。'); return; }
                if(mode === 'vocabFlash') openVocabSetLauncher('flash', vocabSets);
                if(mode === 'vocabMatch') openVocabSetLauncher('match', vocabSets);
                if(mode === 'vocabQuiz') openVocabSetLauncher('quiz', vocabSets);
            });
        });
    }
    function makeStudyModal(title) {
        const modalDiv = document.createElement('div');
        modalDiv.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.72);display:flex;align-items:center;justify-content:center;z-index:3000;padding:14px;';
        const box=document.createElement('div');
        box.style.cssText='background:white;width:min(960px,96vw);max-height:90vh;overflow:auto;border-radius:32px;padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.25);';
        box.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;"><h2>${escapeHtml(title)}</h2><button class="btn btn-outline" id="studyCloseBtn">關閉</button></div><div id="studyModalBody"></div>`;
        modalDiv.appendChild(box); document.body.appendChild(modalDiv);
        box.querySelector('#studyCloseBtn').onclick=()=>modalDiv.remove();
        return {modalDiv, body:box.querySelector('#studyModalBody')};
    }
    function flattenStudyQuestions(exercises) {
        let arr=[];
        exercises.forEach(ex=>extractQuestionsForStudy(ex).forEach(q=>arr.push({...q, exerciseId:ex.id, exerciseTitle:ex.title})));
        return arr.sort(()=>Math.random()-.5);
    }
    function openKahootMode(exercises) {
        const qs = flattenStudyQuestions(exercises).filter(q=>['choice','truefalse','fill'].includes(normalizeQuestionType(q.type))).slice(0,20);
        if(!qs.length){ alert('暫時沒有客觀題可挑戰。'); return; }
        const {body}=makeStudyModal('🎮 Kahoot 式限時挑戰');
        let i=0, score=0, streak=0, seconds=20, timer=null;
        function render(){
            clearInterval(timer); seconds=20;
            const q=qs[i], type=normalizeQuestionType(q.type);
            let options=[];
            if(type==='choice') options=q.options||[];
            else if(type==='truefalse') options=['是','非'];
            body.innerHTML=`<div class="pill">第 ${i+1}/${qs.length} 題</div><div class="pill">分數 ${score}</div><div class="pill">連對 ${streak}</div>
            <div class="progress-bar"><div id="timeFill" class="progress-fill" style="width:100%"></div></div>
            <h2 style="margin:22px 0;line-height:1.5;">${escapeHtml(q.text||'')}</h2>
            <div id="challengeOptions"></div><div id="challengeFeedback" style="margin-top:14px;font-weight:900;"></div>`;
            const wrap=body.querySelector('#challengeOptions');
            if(type==='fill'){
                wrap.innerHTML=`<input id="fillChallengeAnswer" placeholder="輸入答案"><button class="btn btn-game" id="submitFillChallenge">提交</button>`;
                body.querySelector('#submitFillChallenge').onclick=()=>check(body.querySelector('#fillChallengeAnswer').value);
            } else {
                options.forEach(opt=>{ const b=document.createElement('button'); b.className='answer-option'; b.textContent=opt; b.onclick=()=>check(opt,b); wrap.appendChild(b); });
            }
            timer=setInterval(()=>{ seconds--; const f=body.querySelector('#timeFill'); if(f) f.style.width=Math.max(0,seconds/20*100)+'%'; if(seconds<=0){ clearInterval(timer); check(''); } },1000);
        }
        function check(val, btn){
            clearInterval(timer);
            const q=qs[i]; const ok=String(val).trim().toLowerCase()===String(q.answer||'').trim().toLowerCase();
            if(ok){ streak++; score += 100 + Math.min(50, seconds*2) + streak*10; if(btn) btn.classList.add('correct'); }
            else { streak=0; if(btn) btn.classList.add('wrong'); }
            body.querySelector('#challengeFeedback').innerHTML = ok ? '✅ 正確！' : `❌ 正確答案：${escapeHtml(q.answer||'')}`;
            setTimeout(()=>{ i++; if(i<qs.length) render(); else finish(); },900);
        }
        function finish(){
            addSubmission({ studentId:currentStudent.studentId, exerciseId:qs[0].exerciseId, answers:`Kahoot式挑戰完成：${score}分，共${qs.length}題`, score:`${score} pts`, feedback:'遊戲化練習自動記錄', correction:'', reviewed:true, submitDate:new Date().toISOString() });
            body.innerHTML=`<div style="text-align:center;padding:32px;"><div style="font-size:64px;">🏆</div><h2>挑戰完成！</h2><p style="font-size:28px;font-weight:900;color:#4f46e5;margin:16px 0;">${score} pts</p><button class="btn btn-game" id="playAgainBtn">再玩一次</button></div>`;
            body.querySelector('#playAgainBtn').onclick=()=>openKahootMode(exercises);
            renderSubjectDetails(currentSubject);
        }
        render();
    }
    function openFlashcardMode(exercises) {
        const qs=flattenStudyQuestions(exercises).filter(q=>String(q.answer||'').trim()).slice(0,40);
        if(!qs.length){alert('沒有可翻面的答案題。'); return;}
        const {body}=makeStudyModal('🃏 Quizlet 式閃卡');
        let i=0, flipped=false, known=0;
        function render(){
            const q=qs[i];
            body.innerHTML=`<div class="pill">${i+1}/${qs.length}</div><div class="pill">已掌握 ${known}</div>
            <div class="flashcard" id="flashCard">${escapeHtml(flipped ? (q.answer||'') : (q.text||''))}<div style="font-size:13px;color:#64748b;margin-top:12px;">${flipped?'答案':'點擊翻面'}</div></div>
            <div class="flex" style="justify-content:center;margin-top:18px;"><button class="btn btn-outline" id="prevFlash">上一張</button><button class="btn btn-flash" id="knowFlash">我會了</button><button class="btn" id="nextFlash">下一張</button></div>`;
            body.querySelector('#flashCard').onclick=()=>{flipped=!flipped; render();};
            body.querySelector('#prevFlash').onclick=()=>{i=Math.max(0,i-1);flipped=false;render();};
            body.querySelector('#nextFlash').onclick=()=>{i=(i+1)%qs.length;flipped=false;render();};
            body.querySelector('#knowFlash').onclick=()=>{known++; i=(i+1)%qs.length; flipped=false; render();};
        }
        render();
    }
    function openMatchMode(exercises) {
        let pairs=flattenStudyQuestions(exercises).filter(q=>String(q.answer||'').trim()).slice(0,8).map((q,idx)=>({id:idx,q:q.text,a:String(q.answer)}));
        if(pairs.length<2){alert('至少需要 2 題有答案的題目才能玩配對。'); return;}
        const {body}=makeStudyModal('🧩 配對遊戲');
        let cards=[...pairs.map(p=>({id:p.id,kind:'q',text:p.q})),...pairs.map(p=>({id:p.id,kind:'a',text:p.a}))].sort(()=>Math.random()-.5);
        let selected=[], done=new Set(), moves=0;
        function render(){
            body.innerHTML=`<div class="pill">步數 ${moves}</div><div class="pill">完成 ${done.size}/${pairs.length}</div><div class="match-grid" id="matchGrid"></div>`;
            const grid=body.querySelector('#matchGrid');
            cards.forEach((c,idx)=>{ const b=document.createElement('button'); b.className='match-card'; if(done.has(c.id)) b.classList.add('done'); if(selected.find(x=>x.idx===idx)) b.classList.add('selected'); b.innerHTML=escapeHtml(c.text); b.disabled=done.has(c.id); b.onclick=()=>pick(c,idx); grid.appendChild(b); });
            if(done.size===pairs.length){ body.innerHTML=`<div style="text-align:center;padding:30px"><div style="font-size:60px">🎉</div><h2>全部配對完成！</h2><p>共用了 ${moves} 步。</p></div>`; }
        }
        function pick(card,idx){
            if(selected.find(x=>x.idx===idx)) return; selected.push({card,idx});
            if(selected.length===2){ moves++; const [a,b]=selected; if(a.card.id===b.card.id && a.card.kind!==b.card.kind){ done.add(a.card.id); selected=[]; render(); } else { render(); setTimeout(()=>{selected=[];render();},650); } }
            else render();
        }
        render();
    }

    function parseVocabText(raw) {
        return String(raw || '').split(/\r?\n/).map(line => line.trim()).filter(Boolean).map(line => {
            let parts = line.split(/\s*(?:\t|::|：|:|－|-|—|=)\s*/);
            if(parts.length < 2) return null;
            let term = parts.shift().trim();
            let definition = parts.join(' - ').trim();
            return term && definition ? {term, definition} : null;
        }).filter(Boolean);
    }
    function addVocabSet(subject, title, cards, targetStudentIds = [], sourceNoteId = null) {
        if(!Array.isArray(cards) || !cards.length) return false;
        db.vocabSets = Array.isArray(db.vocabSets) ? db.vocabSets : [];
        db.vocabSets.push({ id: Date.now(), subject, title, sourceNoteId, cards, targetStudentIds, createdAt: new Date().toISOString() });
        syncStorage();
        return true;
    }
    function getVocabSetsForSubject(subject) {
        if(!currentStudent) return [];
        db.vocabSets = Array.isArray(db.vocabSets) ? db.vocabSets : [];
        return db.vocabSets.filter(v => v.subject === subject && isPublishedToStudent(v, currentStudent.studentId) && Array.isArray(v.cards) && v.cards.length);
    }
    function flattenVocabCards(vocabSets) {
        let cards=[];
        (vocabSets || []).forEach(set => (set.cards || []).forEach(c => {
            if(c && String(c.term || '').trim() && String(c.definition || '').trim()) cards.push({...c, setTitle:set.title, setId:set.id});
        }));
        return cards.sort(()=>Math.random()-.5);
    }
    function openVocabSetLauncher(mode, vocabSets) {
        vocabSets = Array.isArray(vocabSets) ? vocabSets : [];
        if(!vocabSets.length){ alert('這個學科暫時沒有單詞學習集。'); return; }
        const modeTitle = mode === 'flash' ? '🃏 選擇閃卡範圍' : (mode === 'match' ? '🧩 選擇配對範圍' : '📝 選擇測驗範圍');
        const {body} = makeStudyModal(modeTitle);
        const totalCards = vocabSets.reduce((sum,set)=>sum + ((set.cards||[]).length),0);
        let defaultCount = mode === 'flash' ? Math.min(40,totalCards) : (mode === 'match' ? Math.min(10,totalCards) : Math.min(20,totalCards));
        body.innerHTML = `<div class="record-item" style="background:#f8fafc;border-left:4px solid #06b6d4;">
            <b>請先勾選要學習的單詞集</b><br>
            <span style="color:#64748b;font-size:13px;">不會再把同一學科所有單詞自動混在一起；你可以每次只選 Unit 1、某份筆記或幾個指定學習集。</span>
        </div>
        <div id="vocabSetSelectArea" style="display:grid;gap:10px;margin:14px 0;">
            ${vocabSets.map((set,idx)=>`<label class="record-item" style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;background:white;">
                <input type="checkbox" class="vocabRangeSet" value="${set.id}" ${idx===0?'checked':''} style="width:auto;margin-top:4px;">
                <span><b>${escapeHtml(set.title)}</b><br><small>${escapeHtml(set.subject||'')}｜${(set.cards||[]).length} 張卡${set.createdAt?'｜'+new Date(set.createdAt).toLocaleDateString():''}</small></span>
            </label>`).join('')}
        </div>
        <div class="flex" style="align-items:flex-end;margin-top:10px;">
            <label style="min-width:220px;flex:1;">${mode==='match'?'配對組數':(mode==='quiz'?'測驗題數':'閃卡數量')}
                <input id="vocabQuestionCount" type="number" min="1" max="200" value="${defaultCount}" style="margin-top:6px;">
            </label>
            <button class="btn btn-outline btn-sm" id="selectAllVocabSets">全選</button>
            <button class="btn btn-outline btn-sm" id="clearVocabSets">清空</button>
            <button class="btn btn-flash" id="startSelectedVocabMode">開始</button>
        </div>
        <div id="vocabRangeSummary" style="font-size:13px;color:#64748b;margin-top:8px;"></div>`;
        function selectedSets(){
            const ids = Array.from(body.querySelectorAll('.vocabRangeSet:checked')).map(cb=>String(cb.value));
            return vocabSets.filter(set=>ids.includes(String(set.id)));
        }
        function updateSummary(){
            const sets = selectedSets();
            const cardCount = flattenVocabCards(sets).length;
            const summary = body.querySelector('#vocabRangeSummary');
            if(summary) summary.innerHTML = `已選 ${sets.length} 個學習集，共 ${cardCount} 張單詞卡。`;
            const countInput = body.querySelector('#vocabQuestionCount');
            if(countInput) countInput.max = Math.max(1, cardCount);
        }
        body.querySelectorAll('.vocabRangeSet').forEach(cb=>cb.addEventListener('change', updateSummary));
        body.querySelector('#selectAllVocabSets').onclick=()=>{ body.querySelectorAll('.vocabRangeSet').forEach(cb=>cb.checked=true); updateSummary(); };
        body.querySelector('#clearVocabSets').onclick=()=>{ body.querySelectorAll('.vocabRangeSet').forEach(cb=>cb.checked=false); updateSummary(); };
        body.querySelector('#startSelectedVocabMode').onclick=()=>{
            const sets = selectedSets();
            if(!sets.length){ alert('請至少選擇一個單詞學習集。'); return; }
            const count = Math.max(1, parseInt(body.querySelector('#vocabQuestionCount').value || defaultCount));
            if(mode === 'flash') openVocabFlashcardMode(sets, { count });
            if(mode === 'match') openVocabMatchMode(sets, { count });
            if(mode === 'quiz') openVocabQuizMode(sets, { count });
        };
        updateSummary();
    }

    function openVocabFlashcardMode(vocabSets, options = {}) {
        const limit = Math.max(1, parseInt(options.count || 80));
        const cards = flattenVocabCards(vocabSets).slice(0, limit);

    function openVocabMatchMode(vocabSets, options = {}) {

        let selected=[], done=new Set(), moves=0;
        function render(){

            if(selected.length===2){ moves++; const [a,b]=selected; if(a.card.id===b.card.id && a.card.kind!==b.card.kind){ done.add(a.card.id); selected=[]; render(); } else { render(); setTimeout(()=>{selected=[];render();},650); } }
            else render();

        render();

    function openVocabQuizMode(vocabSets, options = {}) {
        const limit = Math.max(1, parseInt(options.count || 20));
        const cards = flattenVocabCards(vocabSets).slice(0,limit);
        if(cards.length<2){ alert('至少需要 2 組單詞和定義才能生成測驗。'); return; }
        const {body}=makeStudyModal('📝 單詞測驗 Test');
        let i=0, score=0, answered=false;
        function render(){
            answered=false;
            const c=cards[i];
            const useMC = cards.length >= 4 && Math.random() > .35;
            let html=`<div class="pill">第 ${i+1}/${cards.length} 題</div><div class="pill">分數 ${score}</div><h2 style="margin:20px 0;">${escapeHtml(c.term)}</h2><p style="color:#64748b;font-weight:800;">請選出或寫出正確定義：</p><div id="vocabQuizArea"></div><div id="vocabQuizFeedback" style="font-weight:900;margin-top:12px;"></div>`;
            body.innerHTML=html;
            const area=body.querySelector('#vocabQuizArea');
            if(useMC){
                let opts=[c.definition, ...cards.filter(x=>x.definition!==c.definition).slice(0,12).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.definition)].sort(()=>Math.random()-.5);
                opts.forEach(opt=>{ const b=document.createElement('button'); b.className='quiz-option'; b.textContent=opt; b.onclick=()=>check(opt,b); area.appendChild(b); });
            } else {
                area.innerHTML=`<input id="vocabTypedAnswer" placeholder="輸入定義 / 解釋"><button class="btn btn-flash" id="submitVocabTyped">提交</button>`;
                body.querySelector('#submitVocabTyped').onclick=()=>check(body.querySelector('#vocabTypedAnswer').value);
            }
        }
        function check(val, btn){
            if(answered) return; answered=true;
            const c=cards[i];
            const ok=String(val||'').trim().toLowerCase()===String(c.definition||'').trim().toLowerCase();
            if(ok){score++; if(btn) btn.classList.add('correct'); body.querySelector('#vocabQuizFeedback').innerHTML='✅ 正確！';}
            else { if(btn) btn.classList.add('wrong'); body.querySelector('#vocabQuizFeedback').innerHTML=`❌ 正確答案：${escapeHtml(c.definition)}`; }
            setTimeout(()=>{ i++; if(i<cards.length) render(); else finish(); },1000);
        }
        function finish(){
            body.innerHTML=`<div style="text-align:center;padding:32px;"><div style="font-size:64px;">🏅</div><h2>單詞測驗完成！</h2><p style="font-size:28px;font-weight:900;color:#4f46e5;margin:16px 0;">${score}/${cards.length}</p><button class="btn btn-flash" id="vocabQuizAgain">再測一次</button></div>`;
            body.querySelector('#vocabQuizAgain').onclick=()=>openVocabQuizMode(vocabSets, { count: cards.length });
        }
        render();
    }

    function extractDriveFileId(url) {
        const s = String(url || '');
        let m = s.match(/\/file\/d\/([^/]+)/) || s.match(/[?&]id=([^&]+)/) || s.match(/\/document\/d\/([^/]+)/) || s.match(/\/presentation\/d\/([^/]+)/);
        return m ? m[1] : '';
    }
    async function ocrNoteToText(note) {
        if(!note || !note.driveLink) throw new Error('這份筆記沒有 Google Drive 連結。');
        const fileId = extractDriveFileId(note.driveLink);
        if(!fileId) throw new Error('無法從 Google Drive 連結讀取 fileId，請確認是標準分享連結。');
        const json = await cloudRequest({ action:'ocrDriveFile', fileId, fileUrl:note.driveLink, language:'zh-TW,en' });
        return json.text || '';
    }
    function suggestVocabPairsFromOcrText(text) {
        const lines = String(text || '').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
        const out = [];
        // 1) 優先保留本來已經是「詞 - 解釋」的行
        lines.forEach(line => {
            const parsed = parseVocabText(line);
            if(parsed.length) parsed.forEach(p=>out.push(p));
        });
        // 2) 從常見詞表格式中抓取：英文詞 + 中文/英文解釋
        if(out.length < 3) {
            lines.forEach(line => {
                let m = line.match(/^([A-Za-z][A-Za-z\s'’-]{1,40})\s+([\u4e00-\u9fff].{1,80})$/);
                if(m) out.push({term:m[1].trim(), definition:m[2].trim()});
            });
        }
        // 3) 去重與清理
        const seen = new Set();
        return out.filter(p=>{
            const key=(p.term+'|'+p.definition).toLowerCase();
            if(seen.has(key)) return false;
            seen.add(key);
            return p.term.length<=80 && p.definition.length<=160;
        }).slice(0,120).map(p=>`${p.term} - ${p.definition}`).join('\n');
    }

        const cfg = exercise.config || {};

            let choiceScore = '', choiceAnswers = [], recordUrl='', recorder=null, chunks=[];
            modalContent.querySelector('#checkComboBtn').onclick=()=>{ let score=0; choiceAnswers=[]; questions.forEach((q,i)=>{ const selected=modalContent.querySelector(`input[name="comboQ${i}"]:checked`); const val=selected?selected.value:''; choiceAnswers.push({question:q.text,answer:val,correctAnswer:q.answer}); if(val && String(val).trim()===String(q.answer||'').trim()) score++; }); choiceScore=`${score}/${questions.length}`; modalContent.querySelector('#comboResult').innerHTML=`得分：${choiceScore}`; };
            modalContent.querySelector('#comboStartRecord').onclick=async()=>{ try{ const stream=await navigator.mediaDevices.getUserMedia({audio:true}); recorder=createAudioRecorder(stream); chunks=[]; recorder.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data)}; recorder.onstop=async()=>{ const blob=makeAudioBlob(chunks,recorder); try{ const up=await uploadRecordingToDrive(blob, currentStudent.studentId, currentStudent.name, exercise.title); recordUrl=up.fileUrl||up.url||''; modalContent.querySelector('#comboRecordStatus').textContent='錄音已上傳。'; }catch(e){ modalContent.querySelector('#comboRecordStatus').textContent='錄音上傳失敗：'+e.message; } stream.getTracks().forEach(t=>t.stop()); }; recorder.start(); modalContent.querySelector('#comboRecordStatus').textContent='錄音中……'; comboStartRecord.disabled=true; comboStopRecord.disabled=false; }catch(e){alert('無法錄音：'+e.message)} };
            modalContent.querySelector('#comboStopRecord').onclick=()=>{ if(recorder&&recorder.state!=='inactive') recorder.stop(); comboStartRecord.disabled=false; comboStopRecord.disabled=true; };
            modalContent.querySelector('#submitComboBtn').onclick=()=>{ if(!choiceScore) modalContent.querySelector('#checkComboBtn').click(); addSubmission({studentId:currentStudent.studentId, exerciseId:exercise.id, answers:JSON.stringify({choiceAnswers, readingRange:cfg.readingRange||'', recordingUrl:recordUrl}, null, 2), score:choiceScore, feedback:'選擇題已自動批改；朗讀錄音待老師查看。', correction:'', reviewed:true, submitDate:new Date().toISOString()}); alert('已提交。'); closeModal(); renderSubjectDetails(currentSubject); };

        if(exercise.type === 'reading_aloud') {

            let demoUrl = exercise.config.demoAudioUrl || exercise.config.teacherDemoAudioUrl || "";
            let demoAudio = demoUrl ? `<div style="background:#eef2ff;border:1px solid #c7d2fe;border-radius:16px;padding:12px;margin:10px 0;"><b>👩‍🏫 老師示範朗讀</b><p style="font-size:13px;color:#64748b;margin:4px 0;">先聽老師示範，再開始錄音。</p><audio controls src="${escapeHtml(normalizeDriveAudioUrl(demoUrl))}" style="width:100%;"></audio><br><a class="file-link" target="_blank" href="${escapeHtml(demoUrl)}">開啟示範錄音</a></div>` : `<div style="background:#f8fafc;border-radius:14px;padding:10px;margin:10px 0;color:#64748b;font-size:13px;">此朗讀材料暫無老師示範錄音。</div>`;
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3>${demoAudio}<div style="background:#f8fafc;padding:14px;border-radius:16px;line-height:1.8;white-space:pre-wrap;">${escapeHtml(material)}</div>`;
            innerHtml += `<div style="margin-top:14px;"><button id="startRecordBtn" class="btn">🎙️ 開始錄音</button> <button id="stopRecordBtn" class="btn-outline btn" disabled>停止並上傳</button></div>`;
            innerHtml += `<div id="recordingStatus" style="margin-top:10px;">準備就緒</div><div id="scoreDisplay" style="margin-top:10px;"></div>`;
            modalContent.innerHTML = innerHtml;
            let mediaRecorder, audioChunks=[];
            let startBtn = modalContent.querySelector('#startRecordBtn');
            let stopBtn = modalContent.querySelector('#stopRecordBtn');
            let statusDiv = modalContent.querySelector('#recordingStatus');
            let scoreDiv = modalContent.querySelector('#scoreDisplay');
            startBtn.onclick = async ()=>{
                try {
                    let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = createAudioRecorder(stream);
                    audioChunks=[];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = async ()=>{
                        statusDiv.innerText = "正在上傳到老師 Google Drive...";
                        let audioBlob = makeAudioBlob(audioChunks, mediaRecorder);
                        let localAudioUrl = URL.createObjectURL(audioBlob);
                        let transcript = "";
                        let scoreVal = null;
                        try {
                            const result = await uploadRecordingToDrive(audioBlob, exercise, transcript, scoreVal);
                            addSubmission({
                                studentId:currentStudent.studentId,
                                exerciseId:exercise.id,
                                answers:`朗讀錄音已上傳至 Google Drive：${result.fileUrl}`,
                                score:scoreVal,
                                audioUrl:result.fileUrl,
                                driveFileId:result.fileId,
                                submitDate:new Date().toISOString()
                            });
                            scoreDiv.innerHTML = `✅ 已上傳：<a href="${escapeHtml(result.fileUrl)}" target="_blank" class="file-link">打開錄音</a>`;
                            alert("朗讀錄音已上傳到老師 Google Drive");
                            closeModal();
                        } catch(err) {
                            addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers:`本機暫存錄音：${err.message}`, score:null, audioUrl:localAudioUrl, submitDate:new Date().toISOString() });
                            scoreDiv.innerHTML = `⚠️ ${escapeHtml(err.message)}<br><audio controls src="${localAudioUrl}"></audio>`;
                            alert("未能上傳到 Google Drive，已暫存在本機記錄。請檢查 Apps Script 網址與權限。");
                        }
                        stream.getTracks().forEach(track=>track.stop());
                    };
                    mediaRecorder.start();
                    statusDiv.innerText = "錄音中...";
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                } catch(err) {
                    alert("無法使用麥克風，請檢查瀏覽器權限。" + err.message);
                }
            };
            stopBtn.onclick = ()=>{
                if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                statusDiv.innerText = "處理中...";
                stopBtn.disabled = true;
            };
            return;
        }
        // 預設
        modalContent.innerHTML = `<h3>${escapeHtml(exercise.title)}</h3><p>此練習類型需在後台完整設定。</p><button class="btn" onclick="this.closest('div').remove()">關閉</button>`;
    }

    async function makePdfAssetFromInputs(linkId,fileId,subject,title,assetType){

    function extractYoutubeEmbedUrl(url){
        url=String(url||'').trim(); if(!url) return '';
        let id=''; let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{6,})/);
        if(m) id=m[1]; else { try{ const u=new URL(url); id=u.searchParams.get('v')||''; }catch(e){} }
        return id?`https://www.youtube.com/embed/${id}`:url;
    }

            if(!file) { alert("請先選擇 .json 或 .txt 題目檔"); return; }

                    alert("題目檔 JSON 格式不正確：" + err.message);

            };

                if(pdfFile) {
                    pdfDataUrl = await new Promise((resolve,reject)=>{ const r=new FileReader(); r.onload=e=>resolve(e.target.result); r.onerror=reject; r.readAsDataURL(pdfFile); });

                alert("建立練習失敗：" + e.message);

                if(btn){ btn.disabled=false; btn.textContent='建立練習'; }
            }
        });
    }


    function deleteNoteCompletely(noteId) {
        let note = db.notes.find(n => n.id === noteId);
        if(!note) return false;
        if(note.gameQuizId) {
            db.exercises = db.exercises.filter(e => e.id !== note.gameQuizId);
            db.submissions = db.submissions.filter(s => s.exerciseId !== note.gameQuizId);
        }
        db.notes = db.notes.filter(n => n.id !== noteId);
        syncStorage();
        return true;
    }

    function compressImageFile(file, maxSize=1600, quality=.82){
        return new Promise((resolve,reject)=>{
            const img=new Image(); const reader=new FileReader();
            reader.onload=e=>{ img.onload=()=>{ const scale=Math.min(1, maxSize/Math.max(img.width,img.height)); const w=Math.round(img.width*scale), h=Math.round(img.height*scale); const c=document.createElement('canvas'); c.width=w; c.height=h; const x=c.getContext('2d'); x.fillStyle='#fff'; x.fillRect(0,0,w,h); x.drawImage(img,0,0,w,h); resolve(c.toDataURL('image/jpeg', quality)); }; img.onerror=reject; img.src=e.target.result; };
            reader.onerror=reject; reader.readAsDataURL(file);
        });
    }

    function toggleDisplay(el){el.style.display=(el.style.display==='block')?'none':'block';}
    function makeDraggable(el){let drag=false,dx=0,dy=0; el.addEventListener('pointerdown',e=>{ if(e.target.closest && (e.target.closest('.ruler-rotate-handle') || e.target.closest('.protractor-angle-handle'))) return; drag=true;dx=e.clientX-el.offsetLeft;dy=e.clientY-el.offsetTop;el.setPointerCapture(e.pointerId);}); el.addEventListener('pointermove',e=>{if(!drag)return;el.style.left=(e.clientX-dx)+'px';el.style.top=(e.clientY-dy)+'px';}); el.addEventListener('pointerup',()=>drag=false);}
    function makeRotatableRuler(el){
        if(!el) return; const handle=el.querySelector('.ruler-rotate-handle'), label=el.querySelector('.ruler-angle-label'); let rotating=false;
        function setAngle(deg){ const angle=((deg%360)+360)%360; el.dataset.angle=String(angle); el.style.transform=`rotate(${angle}deg)`; if(label) label.textContent=angle.toFixed(1)+'°'; }
        setAngle(Number(el.dataset.angle||0));
        if(!handle) return;
        handle.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();rotating=true;handle.setPointerCapture(e.pointerId);});
        handle.addEventListener('pointermove',e=>{ if(!rotating) return; e.preventDefault(); e.stopPropagation(); const r=el.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2; setAngle(Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI); });
        handle.addEventListener('pointerup',e=>{rotating=false; e.stopPropagation();});
        handle.addEventListener('pointercancel',()=>rotating=false);
    }

    function initMetricRuler(el){
        if(!el || el.dataset.metricReady==='1') return;
        el.dataset.metricReady='1';
        const scale=el.querySelector('.ruler-scale');
        if(!scale) return;
        scale.innerHTML='';
        const cmCount=15; // visual ruler: 15 cm, each cm split into 10 mm
        const usable=484;
        for(let mm=0; mm<=cmCount*10; mm++){
            const tick=document.createElement('div');
            tick.className='ruler-tick '+(mm%10===0?'cm':(mm%5===0?'half':'mm'));
            tick.style.left=(mm/(cmCount*10)*usable)+'px';
            scale.appendChild(tick);
            if(mm%10===0){
                const n=document.createElement('div');
                n.className='ruler-number';
                n.textContent=String(mm/10);
                n.style.left=(mm/(cmCount*10)*usable)+'px';
                scale.appendChild(n);
            }
        }
    }
    function initPreciseProtractor(el){
        if(!el || el.dataset.preciseReady==='1') return;
        el.dataset.preciseReady='1';
        const shell=el.querySelector('#paperProtractorShell') || el.querySelector('.protractor-shell');
        const line=el.querySelector('#protractorMeasureLine') || el.querySelector('.protractor-measure-line');
        const handle=el.querySelector('#protractorAngleHandle') || el.querySelector('.protractor-angle-handle');
        const readout=el.querySelector('#protractorReadout') || el.querySelector('.protractor-readout');
        const cx=205, cy=200, rOuter=178, rInner=58;
        function polar(angleDeg, r){
            const rad=(180-angleDeg)*Math.PI/180;
            return {x:cx + Math.cos(rad)*r, y:cy - Math.sin(rad)*r};
        }
        function arcPath(r, start, end){
            const s=polar(start,r), e=polar(end,r);
            return `M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${e.x} ${e.y}`;
        }
        let svg=`<svg viewBox="0 0 410 230" aria-label="量角器"><path d="${arcPath(rOuter,0,180)} L ${cx-rInner} ${cy} A ${rInner} ${rInner} 0 0 0 ${cx+rInner} ${cy} Z" fill="rgba(186,230,253,.72)" stroke="rgba(3,105,161,.92)" stroke-width="2.4"/><line x1="${cx-rOuter}" y1="${cy}" x2="${cx+rOuter}" y2="${cy}" stroke="rgba(3,105,161,.92)" stroke-width="3"/>`;
        for(let a=0;a<=180;a++){
            const major=a%10===0, mid=a%5===0;
            const len=major?19:(mid?13:7);
            const p1=polar(a,rOuter), p2=polar(a,rOuter-len);
            svg+=`<line x1="${p1.x.toFixed(2)}" y1="${p1.y.toFixed(2)}" x2="${p2.x.toFixed(2)}" y2="${p2.y.toFixed(2)}" stroke="rgba(15,23,42,${major?.75:mid?.55:.32})" stroke-width="${major?1.6:1}"/>`;
            if(major){
                const t=polar(a,rOuter-33);
                svg+=`<text x="${t.x.toFixed(2)}" y="${t.y.toFixed(2)}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="900" fill="#075985">${a}</text>`;
            }
        }
        [30,45,60,90,120,135,150].forEach(a=>{
            const p=polar(a,rOuter-8);
            svg+=`<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(2)}" y2="${p.y.toFixed(2)}" stroke="rgba(239,68,68,${a===90?.75:.35})" stroke-width="${a===90?2:1}" stroke-dasharray="${a===90?'':'5 5'}"/>`;
        });
        svg+=`<circle cx="${cx}" cy="${cy}" r="5" fill="#ef4444"/><text x="${cx}" y="${cy-74}" text-anchor="middle" font-size="12" font-weight="900" fill="#0369a1">0.1° 精準讀數</text></svg>`;
        if(shell) shell.innerHTML=svg;
        function setAngle(angle){
            angle=Math.max(0,Math.min(180,angle));
            const rotate=angle-90;
            if(line) line.style.transform=`rotate(${rotate}deg)`;
            if(handle){
                const p=polar(angle,158);
                handle.style.left=p.x+'px';
                handle.style.bottom=(220-p.y)+'px';
            }
            if(readout) readout.textContent='角度：'+angle.toFixed(1)+'°';
            el.dataset.angle=angle.toFixed(1);
        }
        let dragging=false;
        if(handle){
            handle.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();dragging=true;handle.setPointerCapture(e.pointerId);});
            handle.addEventListener('pointermove',e=>{
                if(!dragging) return;
                e.preventDefault();e.stopPropagation();
                const rect=el.getBoundingClientRect();
                const x=e.clientX-rect.left, y=e.clientY-rect.top;
                let a=180 - Math.atan2(cy-y, x-cx)*180/Math.PI;
                if(a<0) a+=360;
                if(a>180) a = a>270 ? 0 : 180;
                setAngle(Math.round(a*10)/10);
            });
            handle.addEventListener('pointerup',e=>{dragging=false;e.stopPropagation();});
            handle.addEventListener('pointercancel',()=>dragging=false);
        }
        setAngle(Number(el.dataset.angle||90));
    }
    function initCasioCalc(box){ const keys=['7','8','9','/','sin(','4','5','6','*','cos(','1','2','3','-','tan(','0','.','(',')','+','π','^','√(','C','=','DEL','ANS']; const grid=box.querySelector('#calcGrid'), disp=box.querySelector('#calcDisplay'); let expr='',ans='0'; grid.innerHTML=''; keys.forEach(k=>{const b=document.createElement('button');b.textContent=k;b.className=['/','*','-','+','=','^'].includes(k)?'op':(['sin(','cos(','tan(','√(','π'].includes(k)?'fn':(k==='C'||k==='DEL'?'danger':'')); b.onclick=()=>{ if(k==='C')expr=''; else if(k==='DEL')expr=expr.slice(0,-1); else if(k==='='){try{let js=expr.replace(/π/g,'Math.PI').replace(/√\(/g,'Math.sqrt(').replace(/sin\(/g,'Math.sin(').replace(/cos\(/g,'Math.cos(').replace(/tan\(/g,'Math.tan(').replace(/\^/g,'**'); ans=String(Function('return '+js)()); expr=ans;}catch(e){expr='Error';}} else if(k==='ANS')expr+=ans; else expr+=k; disp.textContent=expr||'0';}; grid.appendChild(b);});}

        let html = `<div><h4>Google Drive 上傳設定</h4>
        <p style="font-size:13px;color:#555;">此 Apps Script URL 現在同時負責：① 朗讀錄音上傳到老師 Google Drive；② 筆記、練習、發布對象、提交與批改資料跨裝置同步。</p>
        <div style="background:#fff7ed;border:1px solid #fb923c;color:#9a3412;border-radius:16px;padding:12px;margin:10px 0;font-size:13px;line-height:1.7;">
            <b>☁️ 大型檔案跨裝置：</b>此版會把 PDF、拍照功課、試卷合成圖、筆記手寫圖層上傳到 Google Drive，雲端資料庫只保存 Drive 連結，避免 The quota has been exceeded，並讓其他裝置也能查看大型圖片。
        </div>
        <input id="gasUploadUrl" placeholder="Apps Script Web App URL" value="${escapeHtml(db.settings.gasUploadUrl || DEFAULT_GAS_UPLOAD_URL)}">
        <button id="saveGasUrlBtn" class="btn">儲存上傳網址</button>
        <button id="restoreGasUrlBtn" class="btn btn-outline" style="margin-left:8px;">恢復預設上傳網址</button>
        <button id="manualLoadCloudBtn" class="btn btn-outline" style="margin-left:8px;">立即從雲端載入</button>
        <button id="manualSaveCloudBtn" class="btn btn-outline" style="margin-left:8px;">立即保存到雲端</button>
        <button id="migrateAssetsBtn" class="btn btn-outline" style="margin-left:8px;">上傳大型檔案到 Drive</button><button id="purgeHeavyDataBtn" class="btn danger-btn" style="margin-left:8px;">清理本機大型資料</button>
        <p style="font-size:13px;color:#64748b;margin-top:10px;">同步狀態：${escapeHtml(lastCloudStatus)}</p>
        <p style="font-size:13px;color:#64748b;margin-top:4px;">本機資料約：<b>${localSize} KB</b>；雲端瘦身包約：<b>${cloudSize} KB</b>。</p>
        <p style="font-size:13px;color:#64748b;margin-top:4px;">如果仍顯示 quota exceeded，代表舊雲端資料或本機大型資料已過大。請先清理大型資料，再保存到雲端。</p></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("saveGasUrlBtn")?.addEventListener('click',()=>{
            db.settings.gasUploadUrl = document.getElementById("gasUploadUrl").value.trim() || DEFAULT_GAS_UPLOAD_URL;
            document.getElementById("gasUploadUrl").value = db.settings.gasUploadUrl;
            syncStorage();
            alert("已儲存 Apps Script 上傳網址");
        });
        document.getElementById("restoreGasUrlBtn")?.addEventListener('click',()=>{
            db.settings.gasUploadUrl = DEFAULT_GAS_UPLOAD_URL;
            document.getElementById("gasUploadUrl").value = DEFAULT_GAS_UPLOAD_URL;
            syncStorage();
            alert("已恢復預設 Apps Script 上傳網址");
        });
        document.getElementById("manualLoadCloudBtn")?.addEventListener('click', async()=>{
            await loadCloudDB();
            alert(lastCloudStatus);
            showDriveSettingsUI();
        });
        document.getElementById("manualSaveCloudBtn")?.addEventListener('click', async()=>{
            cloudSyncReady = true;
            await saveCloudDB();
            alert(lastCloudStatus);
            showDriveSettingsUI();
        });
        document.getElementById("migrateAssetsBtn")?.addEventListener('click', async()=>{
            const btn=document.getElementById('migrateAssetsBtn');
            try{
                if(btn){btn.disabled=true; btn.textContent='正在上傳大型檔案……';}
                cloudSyncReady = true;
                const n=await uploadPendingLargeAssetsToDrive(msg=>{ lastCloudStatus=msg; });
                syncStorage();
                await saveCloudDB();
                alert(n ? `已上傳 ${n} 個大型檔案到 Google Drive，並保存 Drive 連結。` : '目前沒有需要上傳的大型檔案。');
            }catch(err){ alert('大型檔案上傳失敗：'+err.message); }
            finally{ if(btn){btn.disabled=false; btn.textContent='上傳大型檔案到 Drive';} showDriveSettingsUI(); }
        });
        document.getElementById("purgeHeavyDataBtn")?.addEventListener('click', async()=>{
            if(!purgeCloudHeavyLocalData(true)) return;
            cloudSyncReady = true;
            await saveCloudDB();
            alert('已清理大型資料，並嘗試重新保存到雲端。\n' + lastCloudStatus);
            showDriveSettingsUI();
        });
    }

    function createAloudMaterial() { renderTeacherWorkspace('reading'); }

    function init() {
        loadDB();
        loadCloudDB();
        document.getElementById("loginBtn").onclick = function() {
            let sid = document.getElementById("studentIdInput").value.trim();
            let stu = db.students.find(s => s.studentId === sid);
            if(stu) {
                currentStudent = stu;
                document.getElementById("studentDashboard").style.display = "block";
                document.getElementById("studentNameSpan").innerText = stu.name;
                const av=document.getElementById("studentAvatar"); if(av) av.innerText=(stu.name||"P").slice(0,1).toUpperCase();
                const cs=document.getElementById("cloudStatusText"); if(cs) cs.innerText=lastCloudStatus||"已同步";
                renderStudentSubjects();
            } else alert("學號不存在，請使用 S001 ~ S010");
        };
        const toggleBtn = document.getElementById("toggleAdminBtn");
        const adminPanel = document.getElementById("adminPanel");
        toggleBtn.onclick = function() {
            if(adminPanel.style.display === "none") {
                requireAdmin(() => {
                    adminPanel.style.display = "block";
                    renderTeacherWorkspace('manage');
                });
            } else {
                adminPanel.style.display = "none";
                adminAuthenticated = false;
            }
        };
        document.querySelectorAll('.admin-action').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                requireAdmin(() => {
                    const action = btn.getAttribute('data-action');
                    if(action === 'manageStudent') renderAdminStudents();
                    else if(action === 'uploadNote') showUploadNoteUI();
                    else if(action === 'manageNotes') manageNotesTitle();
                    else if(action === 'manageAllDocuments') manageAllDocuments();
                    else if(action === 'viewSubmissions') showSubmissions();
                    else if(action === 'learningAnalytics') showLearningAnalytics();
                    else if(action === 'vocabSets') showVocabSetBuilder();
                    else if(action === 'uploadChoice') uploadChoiceFile();
                    else if(action === 'uploadRich') uploadRichExercise();
                    else if(action === 'managePublishedExercises') managePublishedExercises();
                    else if(action === 'deletePendingByStudent') deletePendingExercisesByStudentUI();
                    else if(action === 'uploadListening') uploadListeningUI();
                    else if(action === 'createReading') createAloudMaterial();
                    else if(action === 'viewPhotoHomework') showPhotoHomeworkAdmin();
                    else if(action === 'uploadTestPaper') showUploadTestPaperUI();
                    else if(action === 'manageTestPapers') showManageTestPapersAdmin();
                    else if(action === 'viewTestPaperSubmissions') showTestPaperSubmissionsAdmin();
                    else if(action === 'viewLiveNoteAnnotations') showLiveNoteAnnotationsAdmin();
                    else if(action === 'viewLivePaperDrafts') showLivePaperDraftsAdmin();
                    else if(action === 'driveSettings') showDriveSettingsUI();
                });
            });
        });
    }
    init();
</script>
</body>
</html>
