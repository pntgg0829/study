<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Miss PAN 彭老師綜合教學平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        body { background: #f1f5f9; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 500; cursor: pointer; font-size: 14px; }
        .btn-outline { background: white; border: 1px solid #3b82f6; color: #3b82f6; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .flex { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
        .split-pane { display: flex; gap: 24px; flex-wrap: wrap; }
        .left-col, .right-col { flex: 1; min-width: 250px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 16px; margin-top: 6px; margin-bottom: 12px; }
        .subject-tag { background: #e2e8f0; padding: 6px 14px; border-radius: 40px; cursor: pointer; display: inline-block; }
        .subject-tag.active { background: #3b82f6; color: white; }
        .note-item, .exercise-item { background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #3b82f6; }
        .record-item { background: #f1f5f9; margin: 8px 0; padding: 12px; border-radius: 16px; }
        .handwrite-canvas { border: 1px solid #aaa; border-radius: 16px; background: white; width: 100%; height: 180px; }
        @media (max-width: 700px) { .split-pane { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- 學生端 -->
    <div id="studentView" class="card">
        <h2>📚 學生入口</h2>
        <div class="flex">
            <input type="text" id="studentIdInput" placeholder="請輸入學號 (例如 S001)" style="width:200px;">
            <button class="btn" id="loginBtn">登入 / 進入學習</button>
        </div>
        <div id="studentDashboard" style="margin-top: 20px; display:none;">
            <h3>歡迎，<span id="studentNameSpan"></span> 同學</h3>
            <div class="flex" id="subjectListArea" style="margin: 20px 0;"></div>
            <div id="subjectContentArea"></div>
        </div>
    </div>

    <!-- 教師後台 -->
    <div class="card">
        <button id="toggleAdminBtn" class="btn btn-outline">🔐 教師後台管理 (點擊展開)</button>
        <div id="adminPanel" style="display:none; margin-top:20px;">
            <h3>👩‍🏫 教師後台</h3>
            <div class="flex" style="justify-content:space-between; flex-wrap:wrap;">
                <button class="btn admin-action" data-action="manageStudent">📋 管理學生學科＆姓名</button>
                <button class="btn admin-action" data-action="uploadNote">📘 上傳筆記＋自動趣味遊戲</button>
                <button class="btn admin-action" data-action="manageNotes">✏️ 修改筆記標題</button>
                <button class="btn admin-action" data-action="viewSubmissions">📊 查看所有提交記錄</button>
                <button class="btn admin-action" data-action="uploadChoice">📄 上傳選擇題文件(CSV)</button>
                <button class="btn admin-action" data-action="uploadRich">🖼️ 上傳含圖片練習文檔</button>
                <button class="btn admin-action" data-action="uploadListening">🎧 上傳聽力(中文/英文)</button>
                <button class="btn admin-action" data-action="createReading">🗣️ 新增朗讀材料</button>
            </div>
            <div id="adminDynamicArea" style="margin-top: 24px;"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 學科全部繁體 ----------
    const primarySubjects = ["中文","英文","數學","常識","人文","科學","音樂","體育","普通話"];
    const secondarySubjects = ["中文","英文","數學","公民","科學","化學","物理","生物","經濟","企會管","地理","歷史","中史"];

    // ---------- 學生資料 (姓名與學號完全正確) ----------
    let db = {
        students: [
            { studentId: "S001", name: "Hannah", gradeType: "小學", subjects: [...primarySubjects] },
            { studentId: "S002", name: "Elvis", gradeType: "小學", subjects: [...primarySubjects] },
            { studentId: "S003", name: "Yannie", gradeType: "小學", subjects: [...primarySubjects] },
            { studentId: "S004", name: "Kobe", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S005", name: "Katie", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S006", name: "Kylie", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S007", name: "Anna", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S008", name: "噠熹", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S009", name: "沁兒", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S010", name: "Yannis", gradeType: "中學", subjects: [...secondarySubjects] }
        ],
        notes: [],
        exercises: [],
        submissions: []
    };

    function loadDB() {
        const saved = localStorage.getItem("teach_platform_db");
        if(saved) {
            try {
                let parsed = JSON.parse(saved);
                // 合併資料，保留既有學生但確保新結構
                if(parsed.students) db.students = parsed.students;
                if(parsed.notes) db.notes = parsed.notes;
                if(parsed.exercises) db.exercises = parsed.exercises;
                if(parsed.submissions) db.submissions = parsed.submissions;
            } catch(e) {}
        }
        // 確保每個學生的學科是完整的（若為空則補預設）
        db.students.forEach(s => {
            if(!s.subjects || s.subjects.length===0) {
                s.subjects = (s.gradeType === "小學") ? [...primarySubjects] : [...secondarySubjects];
            }
        });
        syncStorage();
    }
    function syncStorage() { localStorage.setItem("teach_platform_db", JSON.stringify(db)); }

    // 輔助函數：更新學生姓名
    function updateStudentName(studentId, newName) {
        let student = db.students.find(s => s.studentId === studentId);
        if(student) { student.name = newName; syncStorage(); return true; }
        return false;
    }

    // 筆記與練習函數 (保持原有功能)
    function addNote(subject, title, content, autoGenGame = false) {
        let noteId = Date.now();
        let note = { id: noteId, subject, title, content, uploadDate: new Date().toISOString(), gameQuizId: null };
        db.notes.push(note);
        if(autoGenGame) {
            let gameTitle = `【趣味測驗】${title}`;
            let plainText = content.replace(/<[^>]*>/g, '').substring(0, 300);
            let sentences = plainText.split(/[。！？]/).filter(s => s.trim().length > 10);
            let questions = [];
            for(let i=0; i<Math.min(sentences.length,3); i++) {
                let sent = sentences[i];
                let keyword = sent.length>8 ? sent.substring(0,8) : sent;
                questions.push({ text: `根據筆記：「${keyword}...」，正確選項？`, options: ["正確", "錯誤", "部分正確", "文中未提及"], answer: "正確" });
            }
            if(questions.length===0) questions.push({text:"筆記重點為何？", options:["學習重點","範例","補充"], answer:"學習重點"});
            let gameExercise = {
                id: Date.now()+1,
                subject: subject,
                type: "game_quiz",
                title: gameTitle,
                config: { questions: questions, answers: questions.map(q=>q.answer), noteId: noteId },
                createdAt: new Date().toISOString()
            };
            db.exercises.push(gameExercise);
            note.gameQuizId = gameExercise.id;
            let idx = db.notes.findIndex(n=>n.id===noteId);
            if(idx!==-1) db.notes[idx].gameQuizId = gameExercise.id;
        }
        syncStorage();
    }
    function addExercise(exerciseObj) { exerciseObj.id = Date.now(); db.exercises.push(exerciseObj); syncStorage(); }
    function addSubmission(sub) { sub.id = Date.now(); db.submissions.push(sub); syncStorage(); }
    function updateNoteTitle(noteId, newTitle) { let note = db.notes.find(n=>n.id === noteId); if(note) { note.title = newTitle; syncStorage(); return true; } return false; }

    let currentStudent = null;
    let currentSubject = null;
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function renderStudentSubjects() {
        if(!currentStudent) return;
        let subjectsList = currentStudent.subjects || [];
        const container = document.getElementById("subjectListArea");
        if(!container) return;
        container.innerHTML = subjectsList.map(sub => `<span class="subject-tag" data-sub="${sub}">${sub}</span>`).join(' ');
        document.querySelectorAll('.subject-tag').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.subject-tag').forEach(c=>c.classList.remove('active'));
                el.classList.add('active');
                currentSubject = el.getAttribute('data-sub');
                renderSubjectDetails(currentSubject);
            });
        });
        if(subjectsList.length) {
            currentSubject = subjectsList[0];
            renderSubjectDetails(currentSubject);
            let firstTag = document.querySelector('.subject-tag');
            if(firstTag) firstTag.classList.add('active');
        } else {
            document.getElementById("subjectContentArea").innerHTML = "<p>暫無學科，請聯繫老師添加。</p>";
        }
    }

    function renderSubjectDetails(subject) {
        const container = document.getElementById("subjectContentArea");
        let notes = db.notes.filter(n => n.subject === subject);
        let exercises = db.exercises.filter(e => e.subject === subject);
        let html = `<div class="split-pane"><div class="left-col"><h4>📒 筆記區</h4>`;
        if(notes.length===0) html+= `<p>暫無筆記</p>`;
        notes.forEach(n => {
            html+= `<div class="note-item"><strong>${escapeHtml(n.title)}</strong><div style="font-size:14px; margin-top:8px;">${n.content}</div><small>${new Date(n.uploadDate).toLocaleString()}</small>`;
            if(n.gameQuizId) {
                let quiz = db.exercises.find(e=>e.id === n.gameQuizId);
                if(quiz) html+= `<div style="background:#fef9c3; border-radius:16px; padding:8px; margin-top:8px;">🎮 內建趣味小測驗：<button class="btn-sm" data-exid="${quiz.id}">開始遊戲測驗</button></div>`;
            }
            html+= `</div>`;
        });
        html+= `</div><div class="right-col"><h4>✏️ 練習區</h4>`;
        if(exercises.length===0) html+= `<p>暫無練習</p>`;
        exercises.forEach(ex => {
            let typeName = "";
            if(ex.type==='choice') typeName='選擇題';
            else if(ex.type==='fill') typeName='填充題';
            else if(ex.type==='long') typeName='長問答';
            else if(ex.type==='reading') typeName='閱讀理解';
            else if(ex.type==='data') typeName='資料題';
            else if(ex.type==='listening_cn') typeName='中文聆聽';
            else if(ex.type==='listening_en') typeName='英文聆聽';
            else if(ex.type==='reading_aloud') typeName='朗讀練習';
            else if(ex.type==='game_quiz') typeName='趣味小遊戲';
            else if(ex.type==='rich_image') typeName='含圖片練習';
            html+= `<div class="exercise-item"><strong>📌 ${escapeHtml(ex.title)}</strong> (${typeName}) 
                    <button class="btn btn-sm" data-exid="${ex.id}" style="margin-left:10px;">開始練習</button></div>`;
        });
        html+= `</div></div>`;
        container.innerHTML = html;
        document.querySelectorAll('[data-exid]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let exId = parseInt(btn.getAttribute('data-exid'));
                let exercise = db.exercises.find(e=>e.id === exId);
                if(exercise) openExerciseModal(exercise);
            });
        });
    }

    function openExerciseModal(exercise) {
        const modalDiv = document.createElement('div');
        modalDiv.style.position = 'fixed'; modalDiv.style.top='0'; modalDiv.style.left='0'; modalDiv.style.width='100%'; modalDiv.style.height='100%';
        modalDiv.style.backgroundColor='rgba(0,0,0,0.5)'; modalDiv.style.display='flex'; modalDiv.style.alignItems='center'; modalDiv.style.justifyContent='center'; modalDiv.style.zIndex='1000';
        const modalContent = document.createElement('div');
        modalContent.style.backgroundColor='white'; modalContent.style.width='90%'; modalContent.style.maxWidth='900px'; modalContent.style.maxHeight='85vh'; modalContent.style.overflow='auto';
        modalContent.style.borderRadius='28px'; modalContent.style.padding='24px';
        modalDiv.appendChild(modalContent);
        document.body.appendChild(modalDiv);
        function closeModal() { modalDiv.remove(); }

        if(exercise.type === 'game_quiz') {
            let qs = exercise.config.questions || [];
            let answers = exercise.config.answers || [];
            let innerHtml = `<h3>🎮 ${escapeHtml(exercise.title)}</h3><form id="gameForm">`;
            qs.forEach((q, idx) => {
                innerHtml += `<div style="margin-bottom:20px;"><p><strong>${idx+1}. ${q.text}</strong></p>`;
                (q.options || []).forEach(opt => { innerHtml += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label><br>`; });
                innerHtml += `</div>`;
            });
            innerHtml += `<button type="submit" class="btn">提交答案</button></form>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#gameForm').addEventListener('submit', (e) => {
                e.preventDefault();
                let score = 0;
                qs.forEach((_,i) => { let selected = document.querySelector(`input[name="q${i}"]:checked`); if(selected && selected.value === answers[i]) score++; });
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: "遊戲測驗", score:score, submitDate:new Date().toISOString() });
                alert(`得分: ${score}/${qs.length}`);
                closeModal();
            });
            return;
        }
        if(exercise.type === 'rich_image') {
            modalContent.innerHTML = `<h3>${escapeHtml(exercise.title)}</h3><div>${exercise.config.htmlContent || ""}</div><button id="closeRichBtn" class="btn" style="margin-top:20px;">關閉</button>`;
            modalContent.querySelector('#closeRichBtn').addEventListener('click', closeModal);
            return;
        }
        modalContent.innerHTML = `<h3>${escapeHtml(exercise.title)}</h3><p>此練習類型需在後台完整設定，目前僅展示。</p><button class="btn" onclick="this.closest('div').remove()">關閉</button>`;
    }

    // ---------- 教師後台 (包含修改學生姓名) ----------
    let adminAuthenticated = false;
    function requireAdmin(callback) {
        if(adminAuthenticated) { callback(); return; }
        let pwd = prompt("請輸入教師後台密碼:");
        if(pwd === "309418") { adminAuthenticated = true; callback(); }
        else { alert("密碼錯誤"); }
    }

    function renderAdminStudents() {
        let html = `<h4>管理學生學科＆姓名</h4>`;
        db.students.forEach(stu => {
            let allSub = (stu.gradeType === '小學' ? primarySubjects : secondarySubjects);
            html += `<div style="border:1px solid #ddd;margin:12px;padding:12px;border-radius:20px;">
                        <div class="flex" style="justify-content:space-between;">
                            <b>學號：${stu.studentId}</b>
                            <div>姓名：<input type="text" id="name_${stu.studentId}" value="${escapeHtml(stu.name)}" style="width:150px; margin:0;">
                            <button class="btn-sm updateNameBtn" data-sid="${stu.studentId}">修改姓名</button></div>
                        </div>
                        <div>當前學科：${stu.subjects.join(', ')}</div>
                        <div class="flex" style="margin-top:10px;">`;
            allSub.forEach(sub => {
                let checked = stu.subjects.includes(sub) ? 'checked' : '';
                html += `<label><input type="checkbox" class="subCheck" data-sid="${stu.studentId}" value="${sub}" ${checked}> ${sub}</label> `;
            });
            html += `</div><button class="btn-sm updateSubBtn" data-sid="${stu.studentId}" style="margin-top:10px;">儲存學科修改</button></div>`;
        });
        document.getElementById("adminDynamicArea").innerHTML = html;
        // 修改姓名事件
        document.querySelectorAll('.updateNameBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                let sid = btn.getAttribute('data-sid');
                let newName = document.getElementById(`name_${sid}`).value.trim();
                if(newName) {
                    if(updateStudentName(sid, newName)) {
                        alert("學生姓名已更新");
                        if(currentStudent && currentStudent.studentId === sid) {
                            currentStudent.name = newName;
                            document.getElementById("studentNameSpan").innerText = newName;
                        }
                        renderAdminStudents(); // 重新整理列表
                    } else alert("更新失敗");
                } else alert("姓名不可空白");
            });
        });
        // 修改學科
        document.querySelectorAll('.updateSubBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                let sid = btn.getAttribute('data-sid');
                let student = db.students.find(s=>s.studentId===sid);
                if(student) {
                    let selected = Array.from(document.querySelectorAll(`.subCheck[data-sid="${sid}"]:checked`)).map(cb=>cb.value);
                    student.subjects = selected;
                    syncStorage();
                    alert("學科已更新");
                    if(currentStudent && currentStudent.studentId===sid) renderStudentSubjects();
                    renderAdminStudents(); // 刷新
                }
            });
        });
    }

    function showUploadNoteUI() {
        let html = `<div><h4>上傳筆記</h4><input id="noteSubject" placeholder="學科"><input id="noteTitle" placeholder="標題"><textarea id="noteContent" placeholder="筆記內容"></textarea>
        <label><input type="checkbox" id="autoGameCheckbox"> 自動生成趣味遊戲</label><br><button id="saveNoteBtn" class="btn">上傳筆記</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("saveNoteBtn")?.addEventListener('click',()=>{
            let sub = document.getElementById("noteSubject").value, title = document.getElementById("noteTitle").value, cont = document.getElementById("noteContent").value;
            let auto = document.getElementById("autoGameCheckbox").checked;
            if(sub && title) { addNote(sub, title, cont, auto); alert("上傳成功"); } else alert("請填寫完整");
        });
    }
    function manageNotesTitle() {
        let html = `<h4>修改筆記標題</h4><div id="notesListForEdit"></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        let container = document.getElementById("notesListForEdit");
        db.notes.forEach(note => {
            let div = document.createElement("div");
            div.className = "record-item";
            div.innerHTML = `<strong>【${note.subject}】</strong> 原標題: ${escapeHtml(note.title)} <input type="text" id="newTitle_${note.id}" value="${escapeHtml(note.title)}"><button class="btn-sm" data-id="${note.id}">儲存</button>`;
            container.appendChild(div);
            div.querySelector('button').addEventListener('click', () => {
                let newTitle = document.getElementById(`newTitle_${note.id}`).value;
                if(newTitle.trim()) { updateNoteTitle(note.id, newTitle); alert("標題已更新"); manageNotesTitle(); }
            });
        });
    }
    function showSubmissions() {
        let recs = [...db.submissions].reverse();
        let html = `<h4>提交記錄</h4>`;
        recs.forEach(r => {
            let stu = db.students.find(s=>s.studentId===r.studentId) || {name:r.studentId};
            let ex = db.exercises.find(e=>e.id===r.exerciseId) || {title:"未知"};
            html += `<div class="record-item"><b>${stu.name}</b> - ${ex.title}<br>答案:${(r.answers||'').substring(0,100)}<br>得分:${r.score??'待批閱'} ${r.audioUrl?`<br><audio controls src="${r.audioUrl}"></audio>`:''}</div>`;
        });
        document.getElementById("adminDynamicArea").innerHTML = html;
    }
    function uploadChoiceFile() {
        let html = `<div><h4>上傳選擇題CSV</h4><input type="file" id="choiceCsvFile" accept=".csv,.txt"><button id="parseChoiceBtn" class="btn">解析生成</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("parseChoiceBtn")?.addEventListener('click',()=>{
            let file = document.getElementById("choiceCsvFile").files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(e){
                let lines = e.target.result.split("\n");
                let questions=[], answers=[];
                for(let line of lines){
                    let parts = line.split(",");
                    if(parts.length>=6){
                        questions.push({text:parts[0], options:parts.slice(1,5)});
                        answers.push(parts[5].trim());
                    }
                }
                addExercise({ subject:"通用", title:"批量選擇題-"+Date.now(), type:"choice", config:{questions, answers} });
                alert("已生成");
            };
            reader.readAsText(file);
        });
    }
    function uploadRichExercise() {
        let html = `<div><h4>上傳含圖片練習</h4><input id="richSubject" placeholder="學科"><input id="richTitle" placeholder="標題">
        <textarea id="richHtmlContent" rows="8" placeholder="貼上HTML內容，可包含圖片"></textarea><button id="createRichBtn" class="btn">建立</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("createRichBtn")?.addEventListener('click',()=>{
            let subject = document.getElementById("richSubject").value;
            let title = document.getElementById("richTitle").value;
            let htmlContent = document.getElementById("richHtmlContent").value;
            if(subject && title && htmlContent) { addExercise({ subject, title, type:"rich_image", config:{ htmlContent } }); alert("已建立"); }
            else alert("請填寫完整");
        });
    }
    function uploadListeningUI() {
        let html = `<div><h4>上傳聽力</h4><select id="listenLang"><option value="listening_cn">中文聆聽</option><option value="listening_en">英文聆聽</option></select>
        <input id="listenSubject" placeholder="學科 (中文/英文)" value="中文"><input id="listenTitle" placeholder="標題"><input type="file" id="audioFile" accept="audio/*">
        <textarea id="listenQuestions" placeholder='題目JSON [{"text":"問題1"}]'></textarea><button id="createListenBtn" class="btn">建立</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("createListenBtn")?.addEventListener('click',()=>{
            let type = document.getElementById("listenLang").value, title = document.getElementById("listenTitle").value, subject = document.getElementById("listenSubject").value.trim();
            if(subject!=="中文" && subject!=="英文") { alert("學科須為中文或英文"); return; }
            let file = document.getElementById("audioFile").files[0];
            let qJson = document.getElementById("listenQuestions").value;
            if(file && title){
                let url = URL.createObjectURL(file);
                let questionsList = JSON.parse(qJson);
                addExercise({ subject, title, type, config:{audioUrl:url, questionsList} });
                alert("聽力練習已建立");
            } else alert("請完整填寫");
        });
    }
    function createAloudMaterial() {
        let html = `<div><h4>朗讀材料</h4><select id="aloudLang"><option value="中文">中文朗讀</option><option value="英文">英文朗讀</option></select>
        <input id="aloudTitle" placeholder="標題"><textarea id="aloudText" placeholder="朗讀原文"></textarea><button id="saveAloudBtn" class="btn">儲存</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("saveAloudBtn")?.addEventListener('click',()=>{
            let sub = document.getElementById("aloudLang").value, title = document.getElementById("aloudTitle").value, text = document.getElementById("aloudText").value;
            if(sub && title && text) addExercise({ subject:sub, title, type:"reading_aloud", config:{readingText:text} });
            alert("朗讀練習已建立");
        });
    }

    // 初始化登入與後台
    function init() {
        loadDB();
        const loginBtn = document.getElementById("loginBtn");
        const studentIdInput = document.getElementById("studentIdInput");
        loginBtn.onclick = function() {
            let sid = studentIdInput.value.trim();
            let stu = db.students.find(s => s.studentId === sid);
            if(stu) {
                currentStudent = stu;
                document.getElementById("studentDashboard").style.display = "block";
                document.getElementById("studentNameSpan").innerText = stu.name;
                renderStudentSubjects();
            } else {
                alert("學號不存在，請確認學號 (S001~S010)");
            }
        };
        const toggleBtn = document.getElementById("toggleAdminBtn");
        const adminPanel = document.getElementById("adminPanel");
        toggleBtn.onclick = function() {
            if(adminPanel.style.display === "none") {
                requireAdmin(() => {
                    adminPanel.style.display = "block";
                    renderAdminStudents();
                });
            } else {
                adminPanel.style.display = "none";
                adminAuthenticated = false;
            }
        };
        document.querySelectorAll('.admin-action').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                requireAdmin(() => {
                    const action = btn.getAttribute('data-action');
                    if(action === 'manageStudent') renderAdminStudents();
                    else if(action === 'uploadNote') showUploadNoteUI();
                    else if(action === 'manageNotes') manageNotesTitle();
                    else if(action === 'viewSubmissions') showSubmissions();
                    else if(action === 'uploadChoice') uploadChoiceFile();
                    else if(action === 'uploadRich') uploadRichExercise();
                    else if(action === 'uploadListening') uploadListeningUI();
                    else if(action === 'createReading') createAloudMaterial();
                });
            });
        });
    }
    init();
</script>
</body>
</html>
