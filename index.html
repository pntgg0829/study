<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Miss PAN 彭老師綜合教學平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Noto Sans', 'Microsoft JhengHei', sans-serif;
        }
        body {
            background: #f1f5f9;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 24px;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .btn-outline {
            background: white;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }
        .btn-outline:hover {
            background: #eef2ff;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .split-pane {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .left-col {
            flex: 1;
            min-width: 250px;
        }
        .right-col {
            flex: 1;
            min-width: 250px;
        }
        textarea, input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            margin-top: 6px;
            margin-bottom: 12px;
        }
        .subject-tag {
            background: #e2e8f0;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            display: inline-block;
        }
        .subject-tag.active {
            background: #3b82f6;
            color: white;
        }
        .note-item, .exercise-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #3b82f6;
        }
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .handwrite-canvas {
            border: 1px solid #aaa;
            border-radius: 16px;
            background: white;
            cursor: crosshair;
            width: 100%;
            height: 180px;
        }
        .admin-section {
            margin-top: 30px;
            border-top: 2px solid #ddd;
            padding-top: 20px;
        }
        .record-item {
            background: #f1f5f9;
            margin: 8px 0;
            padding: 12px;
            border-radius: 16px;
        }
        .game-quiz {
            background: #fef9c3;
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
        }
        .edit-title-btn {
            background: #facc15;
            margin-left: 12px;
            padding: 2px 10px;
            font-size: 12px;
        }
        @media (max-width: 700px) {
            .split-pane { flex-direction: column; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- 學生端 -->
    <div id="studentView" class="card" style="display:block;">
        <h2>📚 學生入口</h2>
        <div class="flex">
            <input type="text" id="studentIdInput" placeholder="請輸入學號 (例如 S001)" style="width:200px;">
            <button class="btn" id="loginBtn">登入 / 進入學習</button>
        </div>
        <div id="studentDashboard" style="margin-top: 20px; display:none;">
            <h3>歡迎，<span id="studentNameSpan"></span> 同學</h3>
            <div class="flex" id="subjectListArea" style="margin: 20px 0;"></div>
            <div id="subjectContentArea"></div>
        </div>
    </div>

    <!-- 教師後台 (需密碼) -->
    <div class="card" style="margin-top:20px;">
        <button id="toggleAdminBtn" class="btn btn-outline">🔐 教師後台管理 (點擊展開)</button>
        <div id="adminPanel" style="display:none; margin-top:20px;">
            <h3>👩‍🏫 教師後台</h3>
            <div class="flex" style="justify-content:space-between; flex-wrap:wrap;">
                <button class="btn" id="manageStudentBtn">📋 管理學生學科</button>
                <button class="btn" id="uploadNoteBtn">📘 上傳筆記＋自動趣味遊戲</button>
                <button class="btn" id="manageNotesBtn">✏️ 修改筆記標題</button>
                <button class="btn" id="viewSubmissionsBtn">📊 查看所有提交記錄＆錄音</button>
                <button class="btn" id="uploadChoiceFileBtn">📄 上傳選擇題文件(CSV)</button>
                <button class="btn" id="uploadRichExerciseBtn">🖼️ 上傳含圖片練習文檔</button>
                <button class="btn" id="uploadListeningBtn">🎧 上傳聽力(中文/英文)</button>
                <button class="btn" id="createReadingAloudBtn">🗣️ 新增朗讀材料</button>
            </div>
            <div id="adminDynamicArea" style="margin-top: 24px;"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 資料庫 ----------
    let db = {
        students: [
            // 小學生
            { studentId: "S001", name: "Hannah", gradeType: "小學", subjects: [...primarySubjects] },
            { studentId: "S002", name: "Elvis", gradeType: "小學", subjects: [...primarySubjects] },
            { studentId: "S003", name: "Yannie", gradeType: "小學", subjects: [...primarySubjects] },
            // 中學生
            { studentId: "S004", name: "Kobe", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S005", name: "Katie", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S006", name: "Kylie", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S007", name: "Anna", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S008", name: "噠熹", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S009", name: "沁兒", gradeType: "中學", subjects: [...secondarySubjects] },
            { studentId: "S010", name: "Yannis", gradeType: "中學", subjects: [...secondarySubjects] }
        ],
        notes: [],        // { id, subject, title, content, gameQuizId, uploadDate }
        exercises: [],    // { id, subject, type, title, config, createdAt }
        submissions: [],
    };
    const primarySubjects = ["中文","英文","數學","常識","人文","科學","音樂","體育","普通話"];
    const secondarySubjects = ["中文","英文","數學","公民","科學","化學","物理","生物","經濟","企會管","地理","歷史","中史"];

    function loadDB() {
        const saved = localStorage.getItem("teach_platform_db");
        if(saved) {
            try{
                let parsed = JSON.parse(saved);
                db = {...db, ...parsed};
                if(!db.submissions) db.submissions=[];
                if(!db.exercises) db.exercises=[];
                if(!db.notes) db.notes=[];
                if(!db.students) db.students=[];
            }catch(e){}
        }
        // 確保預設學生完整學科
        db.students.forEach(s => {
            if(s.gradeType === "小學" && (!s.subjects || s.subjects.length===0)) s.subjects = [...primarySubjects];
            if(s.gradeType === "中學" && (!s.subjects || s.subjects.length===0)) s.subjects = [...secondarySubjects];
        });
        syncStorage();
    }
    function syncStorage() {
        localStorage.setItem("teach_platform_db", JSON.stringify(db));
    }

    // 新增筆記 (可選自動生成遊戲)
    function addNote(subject, title, content, autoGenGame = false, gameQuestions = []) {
        let noteId = Date.now();
        let note = { id: noteId, subject, title, content, uploadDate: new Date().toISOString(), gameQuizId: null };
        db.notes.push(note);
        if(autoGenGame) {
            let gameTitle = `【趣味測驗】${title}`;
            let questions = [];
            if(gameQuestions.length > 0) questions = gameQuestions;
            else {
                let plainText = content.replace(/<[^>]*>/g, '').substring(0, 300);
                let sentences = plainText.split(/[。！？]/).filter(s => s.trim().length > 10);
                for(let i=0; i<Math.min(sentences.length,3); i++) {
                    let sent = sentences[i];
                    let keyword = sent.length>8 ? sent.substring(0,8) : sent;
                    questions.push({ text: `根據筆記：「${keyword}...」，正確選項？`, options: ["正確", "錯誤", "部分正確", "文中未提及"], answer: "正確" });
                }
                if(questions.length===0) questions.push({text:"筆記重點為何？", options:["學習重點","範例","補充"], answer:"學習重點"});
            }
            let gameExercise = {
                id: Date.now()+1,
                subject: subject,
                type: "game_quiz",
                title: gameTitle,
                config: { questions: questions, answers: questions.map(q=>q.answer), noteId: noteId },
                createdAt: new Date().toISOString()
            };
            db.exercises.push(gameExercise);
            note.gameQuizId = gameExercise.id;
            let idx = db.notes.findIndex(n=>n.id===noteId);
            if(idx!==-1) db.notes[idx].gameQuizId = gameExercise.id;
        }
        syncStorage();
    }
    function addExercise(exerciseObj) {
        exerciseObj.id = Date.now();
        db.exercises.push(exerciseObj);
        syncStorage();
    }
    function addSubmission(sub) {
        sub.id = Date.now();
        db.submissions.push(sub);
        syncStorage();
    }
    function updateNoteTitle(noteId, newTitle) {
        let note = db.notes.find(n=>n.id === noteId);
        if(note) { note.title = newTitle; syncStorage(); return true; }
        return false;
    }

    // ------ 學生端邏輯 (與之前類似，支援圖片渲染) ------
    let currentStudent = null;
    let currentSubject = null;

    function renderStudentSubjects() {
        if(!currentStudent) return;
        let subjectsList = currentStudent.subjects || [];
        const container = document.getElementById("subjectListArea");
        container.innerHTML = subjectsList.map(sub => `<span class="subject-tag" data-sub="${sub}">${sub}</span>`).join(' ');
        document.querySelectorAll('.subject-tag').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.subject-tag').forEach(c=>c.classList.remove('active'));
                el.classList.add('active');
                currentSubject = el.getAttribute('data-sub');
                renderSubjectDetails(currentSubject);
            });
        });
        if(subjectsList.length) {
            currentSubject = subjectsList[0];
            renderSubjectDetails(currentSubject);
            document.querySelector('.subject-tag')?.classList.add('active');
        } else {
            document.getElementById("subjectContentArea").innerHTML = "<p>暫無學科，請聯繫老師添加。</p>";
        }
    }

    function renderSubjectDetails(subject) {
        const container = document.getElementById("subjectContentArea");
        let notes = db.notes.filter(n => n.subject === subject);
        let exercises = db.exercises.filter(e => e.subject === subject);
        let html = `<div class="split-pane"><div class="left-col"><h4>📒 筆記區</h4>`;
        if(notes.length===0) html+= `<p>暫無筆記</p>`;
        notes.forEach(n => {
            html+= `<div class="note-item"><strong>${escapeHtml(n.title)}</strong><div style="font-size:14px; margin-top:8px;">${n.content}</div><small>${new Date(n.uploadDate).toLocaleString()}</small>`;
            if(n.gameQuizId) {
                let quiz = db.exercises.find(e=>e.id === n.gameQuizId);
                if(quiz) html+= `<div class="game-quiz">🎮 內建趣味小測驗：<button class="btn-sm" data-exid="${quiz.id}">開始遊戲測驗</button></div>`;
            }
            html+= `</div>`;
        });
        html+= `</div><div class="right-col"><h4>✏️ 練習區</h4>`;
        if(exercises.length===0) html+= `<p>暫無練習</p>`;
        exercises.forEach(ex => {
            let typeName = "";
            if(ex.type==='choice') typeName='選擇題';
            else if(ex.type==='fill') typeName='填充題';
            else if(ex.type==='long') typeName='長問答';
            else if(ex.type==='reading') typeName='閱讀理解';
            else if(ex.type==='data') typeName='資料題';
            else if(ex.type==='listening_cn') typeName='中文聆聽';
            else if(ex.type==='listening_en') typeName='英文聆聽';
            else if(ex.type==='reading_aloud') typeName='朗讀練習';
            else if(ex.type==='game_quiz') typeName='趣味小遊戲';
            else if(ex.type==='rich_image') typeName='含圖片練習';
            html+= `<div class="exercise-item"><strong>📌 ${escapeHtml(ex.title)}</strong> (${typeName}) 
                    <button class="btn btn-sm" data-exid="${ex.id}" style="margin-left:10px;">開始練習</button></div>`;
        });
        html+= `</div></div>`;
        container.innerHTML = html;
        document.querySelectorAll('[data-exid]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let exId = parseInt(btn.getAttribute('data-exid'));
                let exercise = db.exercises.find(e=>e.id === exId);
                if(exercise) openExerciseModal(exercise);
            });
        });
    }

    // 通用練習彈窗（支援圖片/HTML）
    function openExerciseModal(exercise) {
        const modalDiv = document.createElement('div');
        modalDiv.style.position = 'fixed'; modalDiv.style.top='0'; modalDiv.style.left='0'; modalDiv.style.width='100%'; modalDiv.style.height='100%';
        modalDiv.style.backgroundColor='rgba(0,0,0,0.5)'; modalDiv.style.display='flex'; modalDiv.style.alignItems='center'; modalDiv.style.justifyContent='center'; modalDiv.style.zIndex='1000';
        const modalContent = document.createElement('div');
        modalContent.style.backgroundColor='white'; modalContent.style.width='90%'; modalContent.style.maxWidth='900px'; modalContent.style.maxHeight='85vh'; modalContent.style.overflow='auto';
        modalContent.style.borderRadius='28px'; modalContent.style.padding='24px';
        modalDiv.appendChild(modalContent);
        document.body.appendChild(modalDiv);
        function closeModal() { modalDiv.remove(); }

        // 遊戲測驗
        if(exercise.type === 'game_quiz') {
            let qs = exercise.config.questions || [];
            let answers = exercise.config.answers || [];
            let innerHtml = `<h3>🎮 ${escapeHtml(exercise.title)}</h3><form id="gameForm">`;
            qs.forEach((q, idx) => {
                innerHtml += `<div style="margin-bottom:20px;"><p><strong>${idx+1}. ${q.text}</strong></p>`;
                (q.options || []).forEach(opt => {
                    innerHtml += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label><br>`;
                });
                innerHtml += `</div>`;
            });
            innerHtml += `<button type="submit" class="btn">提交答案 查看分數</button></form>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#gameForm').addEventListener('submit', (e) => {
                e.preventDefault();
                let score = 0;
                qs.forEach((_,i) => {
                    let selected = document.querySelector(`input[name="q${i}"]:checked`);
                    if(selected && selected.value === answers[i]) score++;
                });
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: "遊戲測驗", score:score, submitDate:new Date().toISOString() });
                alert(`得分: ${score}/${qs.length}`);
                closeModal();
            });
            return;
        }
        // 含圖片練習 (rich_image) 直接顯示HTML內容
        if(exercise.type === 'rich_image') {
            let htmlContent = exercise.config.htmlContent || "<p>無內容</p>";
            modalContent.innerHTML = `<h3>${escapeHtml(exercise.title)}</h3><div>${htmlContent}</div><button id="closeRichBtn" class="btn" style="margin-top:20px;">關閉</button>`;
            modalContent.querySelector('#closeRichBtn').addEventListener('click', closeModal);
            return;
        }
        // 選擇題
        if(exercise.type === 'choice') {
            let qs = exercise.config.questions || [];
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3><form id="choiceForm">`;
            qs.forEach((q, idx) => {
                innerHtml += `<div style="margin-bottom:20px;"><p><strong>${idx+1}. ${q.text}</strong></p>`;
                q.options.forEach(opt => {
                    innerHtml += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label><br>`;
                });
                innerHtml += `</div>`;
            });
            innerHtml += `<button type="submit" class="btn">提交答案並評分</button></form>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#choiceForm').addEventListener('submit', (e) => {
                e.preventDefault();
                let score = 0, total = exercise.config.questions.length;
                for(let i=0;i<total;i++) {
                    let selected = document.querySelector(`input[name="q${i}"]:checked`);
                    if(selected && selected.value === exercise.config.answers[i]) score++;
                }
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: "選擇題答案", score:score, submitDate:new Date().toISOString() });
                alert(`得分: ${score}/${total}`);
                closeModal();
            });
        }
        else if (exercise.type === 'fill') {
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3><div><p>${exercise.config.questionText}</p>`;
            innerHtml += `<div><label><input type="radio" name="fillMode" value="typing" checked> 打字提交</label> <label><input type="radio" name="fillMode" value="handwrite"> 手寫體</label></div>`;
            innerHtml += `<div id="fillInputArea"><textarea id="fillTyping" rows="3" placeholder="請輸入答案..."></textarea></div>`;
            innerHtml += `<canvas id="handCanvas" class="handwrite-canvas" style="display:none;"></canvas><div><button id="clearCanvasBtn" style="display:none;">清空手寫</button></div>`;
            innerHtml += `<button id="submitFillBtn" class="btn">提交答案</button></div>`;
            modalContent.innerHTML = innerHtml;
            // 手寫邏輯略 (同之前)
            let canvas = modalContent.querySelector('#handCanvas');
            let ctx = canvas?.getContext('2d');
            let drawing = false;
            function initCanvas() { if(!canvas) return; canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; ctx.fillStyle='white'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.strokeStyle='black'; ctx.lineWidth=2; }
            const radioTyping = modalContent.querySelector('input[value="typing"]');
            const radioHand = modalContent.querySelector('input[value="handwrite"]');
            const typingArea = modalContent.querySelector('#fillTyping');
            const handCanvasDiv = modalContent.querySelector('#handCanvas');
            const clearBtn = modalContent.querySelector('#clearCanvasBtn');
            function switchMode() {
                if(radioTyping.checked) { typingArea.style.display = 'block'; handCanvasDiv.style.display = 'none'; clearBtn.style.display = 'none'; }
                else { typingArea.style.display = 'none'; handCanvasDiv.style.display = 'block'; clearBtn.style.display = 'inline-block'; setTimeout(()=>{ if(canvas) initCanvas(); }, 50); }
            }
            radioTyping.addEventListener('change',switchMode);
            radioHand.addEventListener('change',switchMode);
            if(clearBtn) clearBtn.addEventListener('click',()=>{ if(ctx){ctx.fillStyle='white'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='black';} });
            switchMode();
            modalContent.querySelector('#submitFillBtn').addEventListener('click',()=>{
                let answerText = radioTyping.checked ? typingArea.value : "[手寫圖片] " + canvas.toDataURL().substring(0,80);
                let autoScore = (exercise.config.correctAnswer && answerText.includes(exercise.config.correctAnswer)) ? 100 : 0;
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: answerText, score:autoScore, submitDate:new Date().toISOString() });
                alert(`填充題已提交，自動評分: ${autoScore}/100`);
                closeModal();
            });
        }
        else if (exercise.type === 'long') {
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3><p>${exercise.config.question}</p><textarea id="longAnswer" rows="5" placeholder="請輸入長問答..."></textarea><button id="submitLong" class="btn">提交答案</button>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#submitLong').addEventListener('click',()=>{
                let ans = modalContent.querySelector('#longAnswer').value;
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: ans, score:null, submitDate:new Date().toISOString() });
                alert("答案已提交，等待老師批閱。");
                closeModal();
            });
        }
        else if (exercise.type === 'reading' || exercise.type === 'data') {
            let leftText = exercise.config.leftText;
            let rightQuestions = exercise.config.questionsHtml;
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3><div class="split-pane"><div class="left-col"><strong>${exercise.type==='reading'?'📖 文章':'📊 資料'}</strong><div>${leftText}</div></div>`;
            innerHtml += `<div class="right-col"><strong>📝 題目</strong><div id="readingQuestions">${rightQuestions}</div><button id="submitReadingBtn" class="btn">提交答案</button></div></div>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#submitReadingBtn').addEventListener('click',()=>{
                let answers = {};
                document.querySelectorAll('.reading-answer').forEach(inp=>{ answers[inp.name] = inp.value; });
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: JSON.stringify(answers), score:null, submitDate:new Date().toISOString() });
                alert("答案已提交");
                closeModal();
            });
        }
        else if (exercise.type === 'listening_cn' || exercise.type === 'listening_en') {
            let audioUrl = exercise.config.audioUrl;
            let questions = exercise.config.questionsList || [];
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3><audio controls src="${audioUrl}" style="width:100%;"></audio><div>`;
            questions.forEach((q,idx)=>{
                innerHtml+=`<p>${idx+1}. ${q.text}</p><input type="text" id="listenAns${idx}" placeholder="你的答案"><br>`;
            });
            innerHtml+=`<button id="submitListen" class="btn">提交聽力答案</button></div>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#submitListen').addEventListener('click',()=>{
                let ans=[];
                questions.forEach((_,idx)=>ans.push(modalContent.querySelector(`#listenAns${idx}`).value));
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers:JSON.stringify(ans), score:null, submitDate:new Date().toISOString() });
                alert("聽力答案已提交");
                closeModal();
            });
        }
        else if (exercise.type === 'reading_aloud') {
            let material = exercise.config.readingText;
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3><div style="background:#f0f0f0;padding:12px;">${material}</div>`;
            innerHtml += `<button id="startRecordBtn" class="btn">🎙️ 開始錄音</button> <button id="stopRecordBtn" class="btn-outline btn" disabled>停止並提交</button>`;
            innerHtml += `<div id="recordingStatus">準備就緒</div><div id="scoreDisplay"></div>`;
            modalContent.innerHTML = innerHtml;
            let mediaRecorder, audioChunks=[];
            let startBtn = modalContent.querySelector('#startRecordBtn');
            let stopBtn = modalContent.querySelector('#stopRecordBtn');
            let statusDiv = modalContent.querySelector('#recordingStatus');
            let scoreDiv = modalContent.querySelector('#scoreDisplay');
            startBtn.onclick = async ()=>{
                let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks=[];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = async ()=>{
                    let audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    let audioUrl = URL.createObjectURL(audioBlob);
                    if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                        let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        let recognition = new SpeechRecognition();
                        recognition.lang = exercise.subject==='英文' ? 'en-US' : 'zh-CN';
                        recognition.onresult = (event) => {
                            let transcript = event.results[0][0].transcript;
                            let similarity = computeSimilarity(transcript, material);
                            let scoreVal = Math.min(100, Math.floor(similarity*100));
                            scoreDiv.innerHTML = `🎤 辨識文字: "${transcript}" <br> 自動評分: ${scoreVal}/100`;
                            addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: `朗讀音頻:${audioUrl} 辨識:${transcript}`, score:scoreVal, audioUrl, submitDate:new Date().toISOString() });
                            alert(`朗讀提交，評分 ${scoreVal}/100`);
                            closeModal();
                        };
                        recognition.start();
                    } else {
                        addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: `錄音檔:${audioUrl}`, score:null, audioUrl, submitDate:new Date().toISOString() });
                        alert("朗讀錄音已提交");
                        closeModal();
                    }
                    stream.getTracks().forEach(track=>track.stop());
                };
                mediaRecorder.start();
                statusDiv.innerText = "錄音中...";
                startBtn.disabled = true;
                stopBtn.disabled = false;
            };
            stopBtn.onclick = ()=>{
                if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                statusDiv.innerText = "處理中...";
                stopBtn.disabled = true;
            };
        }
        function computeSimilarity(str1, str2){
            let s1=str1.replace(/\s/g,''), s2=str2.replace(/\s/g,'');
            let len = Math.max(s1.length, s2.length);
            if(len===0) return 0;
            let same=0; for(let i=0;i<Math.min(s1.length, s2.length);i++) if(s1[i]===s2[i]) same++;
            return same/len;
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // ---------- 教師後台UI (密碼驗證) ----------
    let adminAuthenticated = false;
    function checkAdminPassword(callback) {
        if(adminAuthenticated) { callback(); return; }
        let pwd = prompt("請輸入教師後台密碼:");
        if(pwd === "309418") { adminAuthenticated = true; callback(); }
        else { alert("密碼錯誤"); }
    }
    // 各功能包裝密碼
    function requireAdmin(func) {
        return () => { checkAdminPassword(func); };
    }
    function renderAdminStudents() { /* 同前略，但呼叫此函數前已驗證 */ 
        let html = `<h4>管理學生學科</h4>`;
        db.students.forEach(stu=>{
            let allSub = (stu.gradeType === '小學'?primarySubjects:secondarySubjects);
            html+=`<div style="border:1px solid #ddd;margin:12px;padding:12px;"><b>${stu.name} (${stu.studentId})</b> 當前學科: ${stu.subjects.join(', ')}<br>`;
            html+=`<div class="flex">`;
            allSub.forEach(sub=>{
                let checked = stu.subjects.includes(sub)?'checked':'';
                html+=`<label><input type="checkbox" class="subCheck" data-sid="${stu.studentId}" value="${sub}" ${checked}> ${sub}</label> `;
            });
            html+=`</div><button class="btn-sm updateSubBtn" data-sid="${stu.studentId}">儲存學科修改</button></div>`;
        });
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.querySelectorAll('.updateSubBtn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                let sid = btn.getAttribute('data-sid');
                let student = db.students.find(s=>s.studentId===sid);
                if(student){
                    let selected = Array.from(document.querySelectorAll(`.subCheck[data-sid="${sid}"]:checked`)).map(cb=>cb.value);
                    student.subjects = selected;
                    syncStorage();
                    alert("學科已更新！");
                    if(currentStudent && currentStudent.studentId===sid) renderStudentSubjects();
                }
            });
        });
    }
    function showUploadNoteUI() { /* 上傳筆記介面 */ 
        let html=`<div><h4>上傳筆記 (自動整理＋趣味遊戲)</h4><input id="noteSubject" placeholder="學科名"><input id="noteTitle" placeholder="標題"><textarea id="noteContent" placeholder="筆記內容 (支援文字或圖片HTML)"></textarea>
        <label><input type="checkbox" id="autoGameCheckbox"> 自動生成趣味小遊戲</label><br>
        <button id="saveNoteBtn" class="btn">上傳筆記</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("saveNoteBtn")?.addEventListener('click',()=>{
            let sub=document.getElementById("noteSubject").value, title=document.getElementById("noteTitle").value, cont=document.getElementById("noteContent").value;
            let autoGame = document.getElementById("autoGameCheckbox").checked;
            if(sub && title) { addNote(sub,title,cont,autoGame,[]); alert("筆記上傳成功"+(autoGame?"，已產生趣味測驗":"")); } else alert("請填寫完整");
        });
    }
    function manageNotesTitle() {
        let html = `<h4>修改筆記標題</h4><div id="notesListForEdit"></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        let container = document.getElementById("notesListForEdit");
        db.notes.forEach(note => {
            let div = document.createElement("div");
            div.className = "record-item";
            div.innerHTML = `<strong>【${note.subject}】</strong> 原標題: ${escapeHtml(note.title)} <input type="text" id="newTitle_${note.id}" placeholder="新標題" value="${escapeHtml(note.title)}"><button class="btn-sm" data-id="${note.id}">儲存修改</button>`;
            container.appendChild(div);
            let btn = div.querySelector(`button`);
            btn.addEventListener('click', () => {
                let newTitle = document.getElementById(`newTitle_${note.id}`).value;
                if(newTitle.trim()) { updateNoteTitle(note.id, newTitle); alert("標題已更新"); manageNotesTitle(); }
            });
        });
    }
    function showSubmissions() { let recs = [...db.submissions].reverse(); let html = `<h4>所有提交記錄</h4>`; recs.forEach(r=>{ let stu = db.students.find(s=>s.studentId===r.studentId) || {name:r.studentId}; let ex = db.exercises.find(e=>e.id===r.exerciseId) || {title:"未知"}; html+=`<div class="record-item"><b>${stu.name}</b> - ${ex.title}<br>答案:${r.answers?.substring(0,100)}<br>得分:${r.score??'待批閱'} ${r.audioUrl?`<br><audio controls src="${r.audioUrl}"></audio>`:''}</div>`; }); document.getElementById("adminDynamicArea").innerHTML = html; }
    function uploadChoiceFile() { /* CSV上傳 */ 
        let html=`<div><h4>上傳選擇題CSV</h4><input type="file" id="choiceCsvFile" accept=".csv,.txt"><button id="parseChoiceBtn" class="btn">解析生成</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("parseChoiceBtn")?.addEventListener('click',()=>{
            let file = document.getElementById("choiceCsvFile").files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(e){
                let lines = e.target.result.split("\n");
                let questions=[], answers=[];
                for(let line of lines){
                    let parts = line.split(",");
                    if(parts.length>=6){
                        let qText=parts[0], opts=parts.slice(1,5), ans=parts[5].trim();
                        questions.push({text:qText, options:opts});
                        answers.push(ans);
                    }
                }
                addExercise({ subject:"通用", title:"批量選擇題-"+Date.now(), type:"choice", config:{questions, answers}, createdAt:new Date().toISOString() });
                alert("已生成選擇題練習");
            };
            reader.readAsText(file);
        });
    }
    function uploadRichExercise() {
        let html=`<div><h4>上傳含圖片練習 (支援HTML/圖片)</h4><p>請輸入練習標題、選擇學科，並貼上包含圖片( img標籤或base64)的HTML內容：</p>
        <input id="richSubject" placeholder="學科 (中文/英文/數學等)"><input id="richTitle" placeholder="練習名稱">
        <textarea id="richHtmlContent" rows="10" placeholder="請輸入HTML內容，例如: &lt;img src='https://...'&gt;&lt;p&gt;題目...&lt;/p&gt;"></textarea>
        <button id="createRichBtn" class="btn">建立含圖片練習</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("createRichBtn")?.addEventListener('click',()=>{
            let subject = document.getElementById("richSubject").value;
            let title = document.getElementById("richTitle").value;
            let htmlContent = document.getElementById("richHtmlContent").value;
            if(subject && title && htmlContent) {
                addExercise({ subject, title, type:"rich_image", config:{ htmlContent }, createdAt:new Date().toISOString() });
                alert("含圖片練習已建立，學生端可看到完整內容");
            } else alert("請填寫完整");
        });
    }
    function uploadListeningUI() { /* 同前，保持歸類中文/英文 */ 
        let html=`<div><h4>上傳聽力 (中文/英文學科)</h4><select id="listenLang"><option value="listening_cn">中文聆聽</option><option value="listening_en">英文聆聽</option></select>
        <input id="listenSubject" placeholder="學科 (中文 或 英文)" value="中文"><input id="listenTitle" placeholder="標題"><input type="file" id="audioFile" accept="audio/*"><textarea id="listenQuestions" placeholder="題目JSON [{\"text\":\"問題1\"}]"></textarea><button id="createListenBtn" class="btn">建立</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("createListenBtn")?.addEventListener('click',()=>{
            let type=document.getElementById("listenLang").value; let title=document.getElementById("listenTitle").value; let subject = document.getElementById("listenSubject").value.trim();
            if(subject!=="中文" && subject!=="英文") { alert("學科必須是中文或英文"); return; }
            let file=document.getElementById("audioFile").files[0];
            let qJson=document.getElementById("listenQuestions").value;
            if(file && title){
                let url = URL.createObjectURL(file);
                let questionsList = JSON.parse(qJson);
                addExercise({ subject, title, type, config:{audioUrl:url, questionsList}, createdAt:new Date().toISOString() });
                alert("聽力練習已建立");
            }else alert("請填寫完整");
        });
    }
    function createAloudMaterial() {
        let html=`<div><h4>朗讀材料 (中文/英文)</h4><select id="aloudLang"><option value="中文">中文朗讀</option><option value="英文">英文朗讀</option></select>
        <input id="aloudTitle" placeholder="標題"><textarea id="aloudText" placeholder="朗讀原文"></textarea><button id="saveAloudBtn" class="btn">儲存</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("saveAloudBtn")?.addEventListener('click',()=>{
            let sub = document.getElementById("aloudLang").value; let title = document.getElementById("aloudTitle").value; let text = document.getElementById("aloudText").value;
            if(sub && title && text) addExercise({ subject:sub, title, type:"reading_aloud", config:{readingText:text}, createdAt:new Date().toISOString() });
            alert("朗讀練習已建立");
        });
    }

    function init(){
        loadDB();
        document.getElementById("loginBtn").onclick = ()=>{
            let sid = document.getElementById("studentIdInput").value.trim();
            let stu = db.students.find(s=>s.studentId===sid);
            if(stu){
                currentStudent = stu;
                document.getElementById("studentDashboard").style.display = "block";
                document.getElementById("studentNameSpan").innerText = stu.name;
                renderStudentSubjects();
            } else alert("學號不存在，請聯繫老師。");
        };
        let adminVisible=false;
        document.getElementById("toggleAdminBtn").onclick = ()=>{
            if(!adminVisible) {
                checkAdminPassword(()=>{
                    adminVisible=true;
                    document.getElementById("adminPanel").style.display = "block";
                    renderAdminStudents();
                });
            } else {
                adminVisible=false;
                document.getElementById("adminPanel").style.display = "none";
            }
        };
        document.getElementById("manageStudentBtn").onclick = requireAdmin(renderAdminStudents);
        document.getElementById("uploadNoteBtn").onclick = requireAdmin(showUploadNoteUI);
        document.getElementById("manageNotesBtn").onclick = requireAdmin(manageNotesTitle);
        document.getElementById("viewSubmissionsBtn").onclick = requireAdmin(showSubmissions);
        document.getElementById("uploadChoiceFileBtn").onclick = requireAdmin(uploadChoiceFile);
        document.getElementById("uploadRichExerciseBtn").onclick = requireAdmin(uploadRichExercise);
        document.getElementById("uploadListeningBtn").onclick = requireAdmin(uploadListeningUI);
        document.getElementById("createReadingAloudBtn").onclick = requireAdmin(createAloudMaterial);
    }
    init();
</script>
