<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Miss PAN 彭老師綜合教學平台 (Google Drive 版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        body { background: #f1f5f9; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 500; cursor: pointer; font-size: 14px; }
        .btn-outline { background: white; border: 1px solid #3b82f6; color: #3b82f6; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .flex { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
        .split-pane { display: flex; gap: 24px; flex-wrap: wrap; }
        .left-col, .right-col { flex: 1; min-width: 250px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 16px; margin-top: 6px; margin-bottom: 12px; }
        .subject-tag { background: #e2e8f0; padding: 6px 14px; border-radius: 40px; cursor: pointer; display: inline-block; }
        .subject-tag.active { background: #3b82f6; color: white; }
        .note-item, .exercise-item { background: #f8fafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #3b82f6; word-break: break-word; }
        .record-item { background: #f1f5f9; margin: 8px 0; padding: 12px; border-radius: 16px; }
        .file-link { display: inline-block; margin-top: 8px; color: #3b82f6; text-decoration: none; background: #eef2ff; padding: 6px 12px; border-radius: 20px; }
        @media (max-width: 700px) { .split-pane { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- 學生端 -->
    <div id="studentView" class="card">
        <h2>📚 學生入口</h2>
        <div class="flex">
            <input type="text" id="studentIdInput" placeholder="請輸入學號 (例如 S001)" style="width:200px;">
            <button class="btn" id="loginBtn">登入 / 進入學習</button>
        </div>
        <div id="studentDashboard" style="margin-top: 20px; display:none;">
            <h3>歡迎，<span id="studentNameSpan"></span> 同學</h3>
            <div class="flex" id="subjectListArea" style="margin: 20px 0;"></div>
            <div id="subjectContentArea"></div>
        </div>
    </div>

    <!-- 教師後台 -->
    <div class="card">
        <button id="toggleAdminBtn" class="btn btn-outline">🔐 教師後台管理 (點擊展開)</button>
        <div id="adminPanel" style="display:none; margin-top:20px;">
            <h3>👩‍🏫 教師後台</h3>
            <div class="flex" style="justify-content:space-between; flex-wrap:wrap;">
                <button class="btn admin-action" data-action="manageStudent">📋 管理學生學科＆姓名</button>
                <button class="btn admin-action" data-action="uploadNote">📘 上傳筆記 (Google Drive 連結)</button>
                <button class="btn admin-action" data-action="manageNotes">✏️ 修改筆記標題</button>
                <button class="btn admin-action" data-action="viewSubmissions">📊 查看所有提交記錄</button>
                <button class="btn admin-action" data-action="uploadChoice">📄 上傳選擇題文件(CSV)</button>
                <button class="btn admin-action" data-action="uploadRich">🖼️ 上傳練習 (Google Drive 連結)</button>
                <button class="btn admin-action" data-action="uploadListening">🎧 上傳聽力(中文/英文)</button>
                <button class="btn admin-action" data-action="createReading">🗣️ 新增朗讀材料</button>
                <button class="btn admin-action" data-action="driveSettings">⚙️ Google Drive 上傳設定</button>
            </div>
            <div id="adminDynamicArea" style="margin-top: 24px;"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 學科全部繁體 ----------
    const primarySubjects = ["中文","英文","數學","常識","人文","科學","音樂","體育","普通話"];
    const secondarySubjects = ["中文","英文","數學","公民","科學","化學","物理","生物","經濟","企會管","地理","歷史","中史"];

    // ---------- 學生清單 ----------
    const DEFAULT_STUDENTS = [
        { studentId: "S001", name: "Hannah", gradeType: "小學", subjects: [...primarySubjects] },
        { studentId: "S002", name: "Elvis", gradeType: "小學", subjects: [...primarySubjects] },
        { studentId: "S003", name: "Yannie", gradeType: "小學", subjects: [...primarySubjects] },
        { studentId: "S004", name: "Kobe", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S005", name: "Katie", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S006", name: "Kylie", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S007", name: "Anna", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S008", name: "噠熹", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S009", name: "沁兒", gradeType: "中學", subjects: [...secondarySubjects] },
        { studentId: "S010", name: "Yannis", gradeType: "中學", subjects: [...secondarySubjects] }
    ];

    let db = {
        students: [],
        notes: [],        // { id, subject, title, driveLink, description, uploadDate, gameQuizId, targetStudentIds }
        exercises: [],    // { id, subject, type, title, config, createdAt, targetStudentIds }
        submissions: [],  // { id, studentId, exerciseId, answers, score, feedback, correction, reviewed, submitDate }
        settings: { gasUploadUrl: "https://script.google.com/macros/s/AKfycbxcsryRyL5NgcLOnF9LB5CVXbVsIqeHy2Rjc5xrc21bdyTWsyPkHH6TX0Q9fvXuy8DP/exec" } // Google Apps Script Web App URL，用於把學生朗讀錄音上傳到老師 Google Drive
    };

    function loadDB() {
        const saved = localStorage.getItem("teach_platform_db");
        let oldStudents = null;
        if(saved) {
            try {
                let parsed = JSON.parse(saved);
                if(parsed.students) oldStudents = parsed.students;
                if(parsed.notes) db.notes = parsed.notes;
                if(parsed.exercises) db.exercises = parsed.exercises;
                if(parsed.submissions) db.submissions = parsed.submissions;
                if(parsed.settings) db.settings = { ...db.settings, ...parsed.settings };
            } catch(e) {}
        }
        // 合併學生資料
        const newStudents = [];
        for (let defaultStu of DEFAULT_STUDENTS) {
            let existing = oldStudents ? oldStudents.find(s => s.studentId === defaultStu.studentId) : null;
            if (existing) {
                newStudents.push({
                    ...defaultStu,
                    name: existing.name || defaultStu.name,
                    subjects: (existing.subjects && existing.subjects.length) ? existing.subjects : defaultStu.subjects
                });
            } else {
                newStudents.push({ ...defaultStu });
            }
        }
        db.students = newStudents;
        syncStorage();
    }

    function syncStorage() { localStorage.setItem("teach_platform_db", JSON.stringify(db)); }

    // 新增筆記 (Google Drive 連結)
    function addNote(subject, title, driveLink, description = "", autoGenGame = false, targetStudentIds = []) {
        let noteId = Date.now();
        let note = { id: noteId, subject, title, driveLink, description, uploadDate: new Date().toISOString(), gameQuizId: null, targetStudentIds };
        db.notes.push(note);
        if(autoGenGame) {
            let gameTitle = `【趣味測驗】${title}`;
            let questions = [];
            if(description.trim()) {
                // 根據描述產生簡單題目
                let sentences = description.split(/[。！？]/).filter(s => s.trim().length > 5);
                for(let i=0; i<Math.min(sentences.length,2); i++) {
                    questions.push({ text: `根據筆記說明：「${sentences[i].substring(0,30)}...」，下列何者正確？`, options: ["正確", "錯誤"], answer: "正確" });
                }
            }
            if(questions.length===0) questions.push({ text: "此筆記的重點為何？", options: ["學習內容", "測驗練習"], answer: "學習內容" });
            let gameExercise = {
                id: Date.now()+1,
                subject: subject,
                type: "game_quiz",
                title: gameTitle,
                config: { questions: questions, answers: questions.map(q=>q.answer), noteId: noteId },
                createdAt: new Date().toISOString(),
                targetStudentIds: [...targetStudentIds]
            };
            db.exercises.push(gameExercise);
            note.gameQuizId = gameExercise.id;
            let idx = db.notes.findIndex(n=>n.id===noteId);
            if(idx!==-1) db.notes[idx].gameQuizId = gameExercise.id;
        }
        syncStorage();
    }

    // 新增練習 (Google Drive 連結)
    function addExerciseFromDrive(subject, title, driveLink, description = "", targetStudentIds = []) {
        let exercise = {
            id: Date.now(),
            subject: subject,
            type: "drive_file",
            title: title,
            config: { driveLink: driveLink, description: description },
            createdAt: new Date().toISOString(),
            targetStudentIds
        };
        db.exercises.push(exercise);
        syncStorage();
    }

    function addExercise(exerciseObj) { exerciseObj.id = Date.now(); if(!exerciseObj.targetStudentIds) exerciseObj.targetStudentIds = []; db.exercises.push(exerciseObj); syncStorage(); }
    function addSubmission(sub) { sub.id = Date.now(); if(typeof sub.reviewed === 'undefined') sub.reviewed = false; db.submissions.push(sub); syncStorage(); }
    function updateSubmissionReview(submissionId, score, feedback, correction) {
        let sub = db.submissions.find(r => r.id === submissionId);
        if(!sub) return false;
        sub.score = score === '' ? null : score;
        sub.feedback = feedback || '';
        sub.correction = correction || '';
        sub.reviewed = true;
        sub.reviewedAt = new Date().toISOString();
        syncStorage();
        return true;
    }
    function updateNoteTitle(noteId, newTitle) { let note = db.notes.find(n=>n.id === noteId); if(note) { note.title = newTitle; syncStorage(); return true; } return false; }
    function updateStudentName(studentId, newName) { let student = db.students.find(s => s.studentId === studentId); if(student) { student.name = newName; syncStorage(); return true; } return false; }
    function updateStudentSubjects(studentId, newSubjects) { let student = db.students.find(s => s.studentId === studentId); if(student) { student.subjects = newSubjects; syncStorage(); return true; } return false; }

    let currentStudent = null;
    let currentSubject = null;
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function studentPickerHtml(prefix, subjectValue = "") {
        let rows = db.students.map(stu => {
            let subjectHint = subjectValue && !(stu.subjects || []).includes(subjectValue) ? ' style="opacity:.45" title="該學生目前沒有此學科"' : '';
            return `<label${subjectHint} style="display:inline-flex;align-items:center;gap:4px;margin:4px 10px 4px 0;"><input type="checkbox" class="${prefix}TargetStudent" value="${stu.studentId}"> ${escapeHtml(stu.name)} (${stu.studentId})</label>`;
        }).join('');
        return `<div style="background:#f8fafc;border:1px dashed #cbd5e1;border-radius:16px;padding:12px;margin:8px 0 12px;">
            <b>發布給哪些學生？</b>
            <div style="font-size:13px;color:#64748b;margin:4px 0 8px;">不勾選任何學生 = 發布給所有擁有該學科的學生。</div>
            <div><label><input type="checkbox" id="${prefix}SelectAllTargets"> 全選學生</label></div>
            <div>${rows}</div>
        </div>`;
    }
    function bindTargetSelectAll(prefix) {
        let box = document.getElementById(`${prefix}SelectAllTargets`);
        if(!box) return;
        box.addEventListener('change', () => {
            document.querySelectorAll(`.${prefix}TargetStudent`).forEach(cb => cb.checked = box.checked);
        });
    }
    function getSelectedTargetStudentIds(prefix) {
        return Array.from(document.querySelectorAll(`.${prefix}TargetStudent:checked`)).map(cb => cb.value);
    }
    function isPublishedToStudent(item, studentId) {
        return !item.targetStudentIds || item.targetStudentIds.length === 0 || item.targetStudentIds.includes(studentId);
    }
    function latestSubmissionFor(studentId, exerciseId) {
        return [...db.submissions].reverse().find(r => r.studentId === studentId && r.exerciseId === exerciseId);
    }
    function typeLabel(type) {
        if(type==='choice') return '選擇題';
        if(type==='fill') return '填充題';
        if(type==='long') return '長問答';
        if(type==='reading') return '閱讀理解';
        if(type==='data') return '資料題';
        if(type==='listening_cn') return '中文聆聽';
        if(type==='listening_en') return '英文聆聽';
        if(type==='reading_aloud') return '朗讀練習';
        if(type==='game_quiz') return '趣味小遊戲';
        if(type==='drive_file') return '雲端練習檔案';
        return '練習';
    }

    // 將 Google Drive 分享連結轉成較適合 <audio> 播放/下載的直連格式
    function normalizeDriveAudioUrl(url) {
        if(!url) return "";
        let id = "";
        let match1 = url.match(/\/file\/d\/([^/]+)/);
        let match2 = url.match(/[?&]id=([^&]+)/);
        if(match1) id = match1[1];
        else if(match2) id = match2[1];
        return id ? `https://drive.google.com/uc?export=download&id=${id}` : url;
    }

    function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(String(reader.result).split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    }

    async function uploadRecordingToDrive(audioBlob, exercise, transcript, scoreVal) {
        if(!db.settings.gasUploadUrl) {
            throw new Error("尚未在教師後台設定 Apps Script 上傳網址，錄音只能暫存在本機瀏覽器，不能跨裝置調取。");
        }
        const base64 = await blobToBase64(audioBlob);
        const payload = {
            action: "uploadRecording",
            studentId: currentStudent.studentId,
            studentName: currentStudent.name,
            subject: exercise.subject,
            exerciseTitle: exercise.title,
            exerciseId: exercise.id,
            transcript: transcript || "",
            score: scoreVal ?? "",
            mimeType: audioBlob.type || "audio/webm",
            fileName: `${currentStudent.studentId}_${currentStudent.name}_${exercise.title}_${Date.now()}.webm`,
            data: base64
        };
        const res = await fetch(db.settings.gasUploadUrl, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        const json = await res.json();
        if(!json.ok) throw new Error(json.error || "上傳失敗");
        return json;
    }

    function renderStudentSubjects() {
        if(!currentStudent) return;
        let subjectsList = currentStudent.subjects || [];
        const container = document.getElementById("subjectListArea");
        if(!container) return;
        container.innerHTML = subjectsList.map(sub => `<span class="subject-tag" data-sub="${sub}">${sub}</span>`).join(' ');
        document.querySelectorAll('.subject-tag').forEach(el => {
            el.addEventListener('click', (e) => {
                document.querySelectorAll('.subject-tag').forEach(c=>c.classList.remove('active'));
                el.classList.add('active');
                currentSubject = el.getAttribute('data-sub');
                renderSubjectDetails(currentSubject);
            });
        });
        if(subjectsList.length) {
            currentSubject = subjectsList[0];
            renderSubjectDetails(currentSubject);
            let firstTag = document.querySelector('.subject-tag');
            if(firstTag) firstTag.classList.add('active');
        } else {
            document.getElementById("subjectContentArea").innerHTML = "<p>暫無學科，請聯繫老師添加。</p>";
        }
    }

    function renderSubjectDetails(subject) {
        const container = document.getElementById("subjectContentArea");
        if(!currentStudent) return;
        let notes = db.notes.filter(n => n.subject === subject && isPublishedToStudent(n, currentStudent.studentId));
        let allExercises = db.exercises.filter(e => e.subject === subject && isPublishedToStudent(e, currentStudent.studentId));
        let pendingExercises = allExercises.filter(ex => !latestSubmissionFor(currentStudent.studentId, ex.id));
        let completedExercises = allExercises.map(ex => ({ ex, sub: latestSubmissionFor(currentStudent.studentId, ex.id) })).filter(x => x.sub);
        let html = `<div class="split-pane"><div class="left-col"><h4>📒 筆記區</h4>`;
        if(notes.length===0) html+= `<p>暫無筆記</p>`;
        notes.forEach(n => {
            html+= `<div class="note-item"><strong>${escapeHtml(n.title)}</strong>`;
            if(n.driveLink) {
                html+= `<div><a href="${escapeHtml(n.driveLink)}" target="_blank" class="file-link">📄 開啟筆記檔案 (Google Drive)</a></div>`;
            }
            if(n.description) html+= `<div style="font-size:14px; margin-top:8px;">📝 說明：${escapeHtml(n.description)}</div>`;
            html+= `<small>${new Date(n.uploadDate).toLocaleString()}</small>`;
            if(n.gameQuizId) {
                let quiz = db.exercises.find(e=>e.id === n.gameQuizId);
                if(quiz && !latestSubmissionFor(currentStudent.studentId, quiz.id)) html+= `<div style="background:#fef9c3; border-radius:16px; padding:8px; margin-top:8px;">🎮 內建趣味小測驗：<button class="btn-sm" data-exid="${quiz.id}">開始遊戲測驗</button></div>`;
            }
            html+= `</div>`;
        });
        html+= `</div><div class="right-col"><h4>✏️ 待完成練習</h4>`;
        if(pendingExercises.length===0) html+= `<p>暫無待完成練習</p>`;
        pendingExercises.forEach(ex => {
            html+= `<div class="exercise-item"><strong>📌 ${escapeHtml(ex.title)}</strong> (${typeLabel(ex.type)}) 
                    <button class="btn btn-sm" data-exid="${ex.id}" style="margin-left:10px;">開始練習</button></div>`;
        });
        html+= `<h4 style="margin-top:22px;">✅ 已完成／老師回饋</h4>`;
        if(completedExercises.length===0) html+= `<p>暫無已完成記錄</p>`;
        completedExercises.forEach(({ex, sub}) => {
            if(sub.reviewed) {
                html += `<div class="record-item" style="background:#ecfdf5;border-left:4px solid #10b981;">
                    <b>${escapeHtml(ex.title)}</b><br>
                    分數：${sub.score ?? '未填分'}<br>
                    ${sub.feedback ? `老師評語：${escapeHtml(sub.feedback)}<br>` : ''}
                    ${sub.correction ? `需要改正：${escapeHtml(sub.correction)}<br>` : ''}
                    <small>${sub.reviewedAt ? '批改時間：'+new Date(sub.reviewedAt).toLocaleString() : ''}</small>
                </div>`;
            } else {
                html += `<div class="record-item" style="background:#fff7ed;border-left:4px solid #f97316;">
                    <b>${escapeHtml(ex.title)}</b><br>已提交，等待老師批改。
                </div>`;
            }
        });
        html+= `</div></div>`;
        container.innerHTML = html;
        document.querySelectorAll('[data-exid]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let exId = parseInt(btn.getAttribute('data-exid'));
                let exercise = db.exercises.find(e=>e.id === exId);
                if(exercise) openExerciseModal(exercise);
            });
        });
    }

    function openExerciseModal(exercise) {
        const modalDiv = document.createElement('div');
        modalDiv.style.position = 'fixed'; modalDiv.style.top='0'; modalDiv.style.left='0'; modalDiv.style.width='100%'; modalDiv.style.height='100%';
        modalDiv.style.backgroundColor='rgba(0,0,0,0.5)'; modalDiv.style.display='flex'; modalDiv.style.alignItems='center'; modalDiv.style.justifyContent='center'; modalDiv.style.zIndex='1000';
        const modalContent = document.createElement('div');
        modalContent.style.backgroundColor='white'; modalContent.style.width='90%'; modalContent.style.maxWidth='900px'; modalContent.style.maxHeight='85vh'; modalContent.style.overflow='auto';
        modalContent.style.borderRadius='28px'; modalContent.style.padding='24px';
        modalDiv.appendChild(modalContent);
        document.body.appendChild(modalDiv);
        function closeModal() { modalDiv.remove(); }

        if(exercise.type === 'game_quiz') {
            let qs = exercise.config.questions || [];
            let answers = exercise.config.answers || [];
            let innerHtml = `<h3>🎮 ${escapeHtml(exercise.title)}</h3><form id="gameForm">`;
            qs.forEach((q, idx) => {
                innerHtml += `<div style="margin-bottom:20px;"><p><strong>${idx+1}. ${q.text}</strong></p>`;
                (q.options || []).forEach(opt => { innerHtml += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label><br>`; });
                innerHtml += `</div>`;
            });
            innerHtml += `<button type="submit" class="btn">提交答案</button></form>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#gameForm').addEventListener('submit', (e) => {
                e.preventDefault();
                let score = 0;
                qs.forEach((_,i) => { let selected = document.querySelector(`input[name="q${i}"]:checked`); if(selected && selected.value === answers[i]) score++; });
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: "遊戲測驗", score:`${score}/${qs.length}`, feedback:'自動批改', correction:'', reviewed:true, submitDate:new Date().toISOString() });
                alert(`得分: ${score}/${qs.length}`);
                closeModal();
                renderSubjectDetails(currentSubject);
            });
            return;
        }
        if(exercise.type === 'drive_file') {
            let link = exercise.config.driveLink || "#";
            let desc = exercise.config.description || "";
            modalContent.innerHTML = `<h3>${escapeHtml(exercise.title)}</h3>
                <p>${escapeHtml(desc)}</p>
                <p><a href="${escapeHtml(link)}" target="_blank" class="file-link" style="font-size:16px;">📂 開啟練習檔案 (Google Drive)</a></p>
                <textarea id="driveWorkNote" rows="3" placeholder="完成後可簡單寫：已完成／答案已寫在檔案中／需要老師查看的位置等"></textarea>
                <p style="margin-top:20px;"><button id="submitDriveWorkBtn" class="btn">✅ 我已完成，提交給老師批改</button> <button class="btn btn-outline" id="closeDriveModalBtn">關閉</button></p>`;
            modalContent.querySelector('#submitDriveWorkBtn').addEventListener('click',()=>{
                let note = modalContent.querySelector('#driveWorkNote').value.trim();
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers: note || '學生標記已完成', score:null, feedback:'', correction:'', reviewed:false, submitDate:new Date().toISOString() });
                alert('已提交，學生端將不再顯示在待完成練習，請等待老師批改。');
                closeModal();
                renderSubjectDetails(currentSubject);
            });
            modalContent.querySelector('#closeDriveModalBtn').addEventListener('click', closeModal);
            return;
        }
        // 其他類型（聽力、朗讀等）保持原有簡單處理
        if(exercise.type === 'listening_cn' || exercise.type === 'listening_en') {
            let rawAudioUrl = exercise.config.audioUrl || exercise.config.driveAudioLink || "";
            let audioUrl = normalizeDriveAudioUrl(rawAudioUrl);
            let questions = exercise.config.questionsList || [];
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3>
                <p style="font-size:13px;color:#64748b;">如播放器未能載入，請點擊下方「開啟音檔」播放。</p>
                <audio controls src="${escapeHtml(audioUrl)}" style="width:100%;"></audio>
                <p><a href="${escapeHtml(rawAudioUrl)}" target="_blank" class="file-link">🎧 開啟 Google Drive 音檔</a></p><div>`;
            questions.forEach((q,idx)=>{
                innerHtml+=`<p>${idx+1}. ${escapeHtml(q.text)}</p><input type="text" id="listenAns${idx}" placeholder="你的答案"><br>`;
            });
            innerHtml+=`<button id="submitListen" class="btn">提交聽力答案</button></div>`;
            modalContent.innerHTML = innerHtml;
            modalContent.querySelector('#submitListen').addEventListener('click',()=>{
                let ans=[];
                questions.forEach((_,idx)=>ans.push(modalContent.querySelector(`#listenAns${idx}`).value));
                addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers:JSON.stringify(ans), score:null, submitDate:new Date().toISOString() });
                alert("聽力答案已提交，請等待老師批改。");
                closeModal();
                renderSubjectDetails(currentSubject);
            });
            return;
        }
        if(exercise.type === 'reading_aloud') {
            let material = exercise.config.readingText;
            let innerHtml = `<h3>${escapeHtml(exercise.title)}</h3><div style="background:#f8fafc;padding:14px;border-radius:16px;line-height:1.8;white-space:pre-wrap;">${escapeHtml(material)}</div>`;
            innerHtml += `<div style="margin-top:14px;"><button id="startRecordBtn" class="btn">🎙️ 開始錄音</button> <button id="stopRecordBtn" class="btn-outline btn" disabled>停止並上傳</button></div>`;
            innerHtml += `<div id="recordingStatus" style="margin-top:10px;">準備就緒</div><div id="scoreDisplay" style="margin-top:10px;"></div>`;
            modalContent.innerHTML = innerHtml;
            let mediaRecorder, audioChunks=[];
            let startBtn = modalContent.querySelector('#startRecordBtn');
            let stopBtn = modalContent.querySelector('#stopRecordBtn');
            let statusDiv = modalContent.querySelector('#recordingStatus');
            let scoreDiv = modalContent.querySelector('#scoreDisplay');
            startBtn.onclick = async ()=>{
                try {
                    let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks=[];
                    mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                    mediaRecorder.onstop = async ()=>{
                        statusDiv.innerText = "正在上傳到老師 Google Drive...";
                        let audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        let localAudioUrl = URL.createObjectURL(audioBlob);
                        let transcript = "";
                        let scoreVal = null;
                        try {
                            const result = await uploadRecordingToDrive(audioBlob, exercise, transcript, scoreVal);
                            addSubmission({
                                studentId:currentStudent.studentId,
                                exerciseId:exercise.id,
                                answers:`朗讀錄音已上傳至 Google Drive：${result.fileUrl}`,
                                score:scoreVal,
                                audioUrl:result.fileUrl,
                                driveFileId:result.fileId,
                                submitDate:new Date().toISOString()
                            });
                            scoreDiv.innerHTML = `✅ 已上傳：<a href="${escapeHtml(result.fileUrl)}" target="_blank" class="file-link">打開錄音</a>`;
                            alert("朗讀錄音已上傳到老師 Google Drive");
                            closeModal();
                        } catch(err) {
                            addSubmission({ studentId:currentStudent.studentId, exerciseId:exercise.id, answers:`本機暫存錄音：${err.message}`, score:null, audioUrl:localAudioUrl, submitDate:new Date().toISOString() });
                            scoreDiv.innerHTML = `⚠️ ${escapeHtml(err.message)}<br><audio controls src="${localAudioUrl}"></audio>`;
                            alert("未能上傳到 Google Drive，已暫存在本機記錄。請檢查 Apps Script 網址與權限。");
                        }
                        stream.getTracks().forEach(track=>track.stop());
                    };
                    mediaRecorder.start();
                    statusDiv.innerText = "錄音中...";
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                } catch(err) {
                    alert("無法使用麥克風，請檢查瀏覽器權限。" + err.message);
                }
            };
            stopBtn.onclick = ()=>{
                if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                statusDiv.innerText = "處理中...";
                stopBtn.disabled = true;
            };
            return;
        }
        // 預設
        modalContent.innerHTML = `<h3>${escapeHtml(exercise.title)}</h3><p>此練習類型需在後台完整設定。</p><button class="btn" onclick="this.closest('div').remove()">關閉</button>`;
    }

    // ---------- 教師後台 (Google Drive 版本) ----------
    let adminAuthenticated = false;
    function requireAdmin(callback) {
        if(adminAuthenticated) { callback(); return; }
        let pwd = prompt("請輸入教師後台密碼:");
        if(pwd === "309418") { adminAuthenticated = true; callback(); }
        else { alert("密碼錯誤"); }
    }

    function renderAdminStudents() {
        let html = `<h4>管理學生學科＆姓名</h4>`;
        db.students.forEach(stu => {
            let allSub = (stu.gradeType === '小學' ? primarySubjects : secondarySubjects);
            html += `<div style="border:1px solid #ddd;margin:12px;padding:12px;border-radius:20px;">
                        <div class="flex" style="justify-content:space-between;">
                            <b>學號：${stu.studentId}</b>
                            <div>姓名：<input type="text" id="name_${stu.studentId}" value="${escapeHtml(stu.name)}" style="width:150px;">
                            <button class="btn-sm updateNameBtn" data-sid="${stu.studentId}">修改姓名</button></div>
                        </div>
                        <div>當前學科：${stu.subjects.join(', ')}</div>
                        <div class="flex" style="margin-top:10px;">`;
            allSub.forEach(sub => {
                let checked = stu.subjects.includes(sub) ? 'checked' : '';
                html += `<label><input type="checkbox" class="subCheck" data-sid="${stu.studentId}" value="${sub}" ${checked}> ${sub}</label> `;
            });
            html += `</div><button class="btn-sm updateSubBtn" data-sid="${stu.studentId}" style="margin-top:10px;">儲存學科修改</button></div>`;
        });
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.querySelectorAll('.updateNameBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                let sid = btn.getAttribute('data-sid');
                let newName = document.getElementById(`name_${sid}`).value.trim();
                if(newName) { updateStudentName(sid, newName); alert("姓名已更新"); renderAdminStudents(); if(currentStudent && currentStudent.studentId===sid) document.getElementById("studentNameSpan").innerText = newName; }
                else alert("不可空白");
            });
        });
        document.querySelectorAll('.updateSubBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                let sid = btn.getAttribute('data-sid');
                let selected = Array.from(document.querySelectorAll(`.subCheck[data-sid="${sid}"]:checked`)).map(cb=>cb.value);
                updateStudentSubjects(sid, selected); alert("學科已更新"); if(currentStudent && currentStudent.studentId===sid) renderStudentSubjects(); renderAdminStudents();
            });
        });
    }

    function showUploadNoteUI() {
        let html = `<div><h4>上傳筆記 (Google Drive 共用連結)</h4>
        <p style="font-size:13px; color:#555;">📌 請先在 Google Drive 將檔案設為「知道連結的人可檢視」，然後貼上分享連結。</p>
        <input id="noteSubject" placeholder="學科 (例如 中文)">
        <input id="noteTitle" placeholder="標題">
        <input id="noteDriveLink" placeholder="Google Drive 共用連結">
        <textarea id="noteDescription" rows="2" placeholder="補充說明 (選填)"></textarea>
        ${studentPickerHtml('note')}
        <label><input type="checkbox" id="autoGameCheckbox"> 自動生成趣味遊戲 (根據說明欄內容，會發布給同一批學生)</label><br>
        <button id="saveNoteBtn" class="btn">儲存筆記</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        bindTargetSelectAll('note');
        document.getElementById("saveNoteBtn")?.addEventListener('click', () => {
            let sub = document.getElementById("noteSubject").value.trim();
            let title = document.getElementById("noteTitle").value.trim();
            let link = document.getElementById("noteDriveLink").value.trim();
            let desc = document.getElementById("noteDescription").value.trim();
            let autoGame = document.getElementById("autoGameCheckbox").checked;
            let targets = getSelectedTargetStudentIds('note');
            if(!sub || !title || !link) { alert("請填寫學科、標題與 Google Drive 連結"); return; }
            addNote(sub, title, link, desc, autoGame, targets);
            alert("筆記已儲存並按指定學生發布！");

    function manageNotesTitle() {
        let html = `<h4>修改筆記標題</h4><div id="notesListForEdit"></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        let container = document.getElementById("notesListForEdit");
        db.notes.forEach(note => {
            let div = document.createElement("div");
            div.className = "record-item";
            div.innerHTML = `<strong>【${note.subject}】</strong> 原標題: ${escapeHtml(note.title)} <input type="text" id="newTitle_${note.id}" value="${escapeHtml(note.title)}"><button class="btn-sm" data-id="${note.id}">儲存</button>`;
            container.appendChild(div);
            div.querySelector('button').addEventListener('click', () => {
                let newTitle = document.getElementById(`newTitle_${note.id}`).value;
                if(newTitle.trim()) { updateNoteTitle(note.id, newTitle); alert("標題已更新"); manageNotesTitle(); }
            });
        });
    }

    function showSubmissions() {
        let recs = [...db.submissions].reverse();
        let html = `<h4>提交記錄與批改</h4>`;
        if(recs.length===0) html += `<p>暫無提交。</p>`;
        recs.forEach(r => {
            let stu = db.students.find(s=>s.studentId===r.studentId) || {name:r.studentId};
            let ex = db.exercises.find(e=>e.id===r.exerciseId) || {title:"未知"};
            let audioHtml = r.audioUrl ? `<br><audio controls src="${escapeHtml(normalizeDriveAudioUrl(r.audioUrl))}" style="width:100%;max-width:520px;"></audio><br><a class="file-link" target="_blank" href="${escapeHtml(r.audioUrl)}">🔗 開啟 Google Drive 錄音</a>` : '';
            html += `<div class="record-item"><b>${escapeHtml(stu.name)}</b> - ${escapeHtml(ex.title)} ${r.reviewed ? '<span style="color:#16a34a;">（已批改）</span>' : '<span style="color:#ea580c;">（待批改）</span>'}<br>
                答案/提交內容：${escapeHtml((r.answers||'').substring(0,220))}<br>
                目前分數：${r.score??'待批閱'}<br><small>${r.submitDate ? new Date(r.submitDate).toLocaleString() : ''}</small>${audioHtml}
                <div style="margin-top:10px;background:white;border-radius:14px;padding:10px;">
                    <label>分數：<input id="score_${r.id}" value="${escapeHtml(r.score ?? '')}" placeholder="例如 85/100 或 A" style="max-width:180px;"></label>
                    <label>老師評語：<textarea id="feedback_${r.id}" rows="2" placeholder="整體表現、優點等">${escapeHtml(r.feedback || '')}</textarea></label>
                    <label>需要改正：<textarea id="correction_${r.id}" rows="2" placeholder="需要重做、改正或補交的地方">${escapeHtml(r.correction || '')}</textarea></label>
                    <button class="btn btn-sm reviewBtn" data-rid="${r.id}">儲存批改並顯示給學生</button>
                </div>
            </div>`;
        });
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.querySelectorAll('.reviewBtn').forEach(btn => {
            btn.addEventListener('click',()=>{
                let rid = parseInt(btn.getAttribute('data-rid'));
                let score = document.getElementById(`score_${rid}`).value.trim();
                let feedback = document.getElementById(`feedback_${rid}`).value.trim();
                let correction = document.getElementById(`correction_${rid}`).value.trim();
                updateSubmissionReview(rid, score, feedback, correction);
                alert('已儲存批改，學生端會顯示分數／評語／需要改正。');
                showSubmissions();
            });
        });
    }

    function uploadChoiceFile() {
        let html = `<div><h4>上傳選擇題CSV</h4>
        <input id="choiceSubject" placeholder="學科 (例如 中文/英文/數學)" value="中文">
        ${studentPickerHtml('choice')}
        <input type="file" id="choiceCsvFile" accept=".csv,.txt"><button id="parseChoiceBtn" class="btn">解析生成練習</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        bindTargetSelectAll('choice');
        document.getElementById("parseChoiceBtn")?.addEventListener('click',()=>{
            let file = document.getElementById("choiceCsvFile").files[0];
            let subject = document.getElementById("choiceSubject").value.trim() || '通用';
            let targets = getSelectedTargetStudentIds('choice');
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(e){
                let lines = e.target.result.split("\n");
                let questions=[], answers=[];
                for(let line of lines){
                    let parts = line.split(",");
                    if(parts.length>=6){
                        questions.push({text:parts[0], options:parts.slice(1,5)});
                        answers.push(parts[5].trim());
                    }
                }
                addExercise({ subject, title:"批量選擇題-"+Date.now(), type:"choice", config:{questions, answers}, targetStudentIds: targets });
                alert("已生成選擇題練習並按指定學生發布");
            };
            reader.readAsText(file);
        });
    }

    function uploadRichExercise() {
        let html = `<div><h4>上傳練習 (Google Drive 共用連結)</h4>
        <p style="font-size:13px; color:#555;">📌 請將練習檔案上傳至 Google Drive，取得共用連結後貼上。</p>
        <input id="richSubject" placeholder="學科">
        <input id="richTitle" placeholder="練習名稱">
        <input id="richDriveLink" placeholder="Google Drive 共用連結">
        <textarea id="richDescription" rows="2" placeholder="練習說明 (選填)"></textarea>
        ${studentPickerHtml('rich')}
        <button id="createRichBtn" class="btn">建立練習</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        bindTargetSelectAll('rich');
        document.getElementById("createRichBtn")?.addEventListener('click', () => {
            let subject = document.getElementById("richSubject").value.trim();
            let title = document.getElementById("richTitle").value.trim();
            let link = document.getElementById("richDriveLink").value.trim();
            let desc = document.getElementById("richDescription").value.trim();
            let targets = getSelectedTargetStudentIds('rich');
            if(!subject || !title || !link) { alert("請填寫學科、標題與 Google Drive 連結"); return; }
            addExerciseFromDrive(subject, title, link, desc, targets);
            alert("練習已建立並按指定學生發布！");
        });
    }

    function uploadListeningUI() {
        let html = `<div><h4>上傳聽力（Google Drive 音檔連結）</h4>
        <p style="font-size:13px;color:#555;">流程：老師把音檔上傳到 Google Drive → 權限設為「知道連結的人可檢視」→ 在這裡貼上分享連結。學生端會直接顯示播放器，跨裝置可用。</p>
        <select id="listenLang"><option value="listening_cn">中文聆聽</option><option value="listening_en">英文聆聽</option></select>
        <input id="listenSubject" placeholder="學科 (中文/英文)" value="中文">
        <input id="listenTitle" placeholder="標題">
        <input id="audioDriveLink" placeholder="Google Drive 音檔分享連結">
        <textarea id="listenQuestions" rows="5" placeholder='題目JSON，例如 [{"text":"問題1"},{"text":"問題2"}]'></textarea>
        ${studentPickerHtml('listen')}
        <button id="createListenBtn" class="btn">建立聽力練習</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        bindTargetSelectAll('listen');
        document.getElementById("createListenBtn")?.addEventListener('click',()=>{
            let type = document.getElementById("listenLang").value, title = document.getElementById("listenTitle").value.trim(), subject = document.getElementById("listenSubject").value.trim();
            if(subject!=="中文" && subject!=="英文") { alert("學科須為中文或英文"); return; }
            let audioLink = document.getElementById("audioDriveLink").value.trim();
            let qJson = document.getElementById("listenQuestions").value.trim() || "[]";
            let targets = getSelectedTargetStudentIds('listen');
            if(audioLink && title){
                try {
                    let questionsList = JSON.parse(qJson);
                    addExercise({ subject, title, type, config:{audioUrl:audioLink, driveAudioLink:audioLink, questionsList}, targetStudentIds: targets });
                    alert("聽力練習已建立並按指定學生發布");
                } catch(e) { alert("題目JSON格式不正確"); }
            } else alert("請填寫標題與 Google Drive 音檔連結");
        });
    }

    function showDriveSettingsUI() {
        let html = `<div><h4>Google Drive 上傳設定</h4>
        <p style="font-size:13px;color:#555;">朗讀錄音要真正保存到老師 Google Drive，必須先部署 Google Apps Script Web App，然後把 Web App URL 貼在這裡。</p>
        <input id="gasUploadUrl" placeholder="Apps Script Web App URL" value="${escapeHtml(db.settings.gasUploadUrl || '')}">
        <button id="saveGasUrlBtn" class="btn">儲存上傳網址</button>
        <p style="font-size:13px;color:#64748b;margin-top:10px;">未設定時，學生仍可錄音，但錄音只會暫存在該裝置瀏覽器，老師換裝置後不能收聽。</p></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        document.getElementById("saveGasUrlBtn")?.addEventListener('click',()=>{
            db.settings.gasUploadUrl = document.getElementById("gasUploadUrl").value.trim();
            syncStorage();
            alert("已儲存 Apps Script 上傳網址");
        });
    }

    function createAloudMaterial() {
        let html = `<div><h4>朗讀材料</h4><select id="aloudLang"><option value="中文">中文朗讀</option><option value="英文">英文朗讀</option></select>
        <input id="aloudTitle" placeholder="標題"><textarea id="aloudText" placeholder="朗讀原文"></textarea>
        ${studentPickerHtml('aloud')}
        <button id="saveAloudBtn" class="btn">儲存</button></div>`;
        document.getElementById("adminDynamicArea").innerHTML = html;
        bindTargetSelectAll('aloud');
        document.getElementById("saveAloudBtn")?.addEventListener('click',()=>{
            let sub = document.getElementById("aloudLang").value, title = document.getElementById("aloudTitle").value.trim(), text = document.getElementById("aloudText").value.trim();
            let targets = getSelectedTargetStudentIds('aloud');
            if(sub && title && text) {
                addExercise({ subject:sub, title, type:"reading_aloud", config:{readingText:text}, targetStudentIds: targets });
                alert("朗讀練習已建立並按指定學生發布");
            } else alert("請填寫標題與朗讀原文");

    }

    function init() {
        loadDB();
        document.getElementById("loginBtn").onclick = function() {
            let sid = document.getElementById("studentIdInput").value.trim();
            let stu = db.students.find(s => s.studentId === sid);
            if(stu) {
                currentStudent = stu;
                document.getElementById("studentDashboard").style.display = "block";
                document.getElementById("studentNameSpan").innerText = stu.name;
                renderStudentSubjects();
            } else alert("學號不存在，請使用 S001 ~ S010");
        };
        const toggleBtn = document.getElementById("toggleAdminBtn");
        const adminPanel = document.getElementById("adminPanel");
        toggleBtn.onclick = function() {
            if(adminPanel.style.display === "none") {
                requireAdmin(() => {
                    adminPanel.style.display = "block";
                    renderAdminStudents();
                });
            } else {
                adminPanel.style.display = "none";
                adminAuthenticated = false;
            }
        };
        document.querySelectorAll('.admin-action').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                requireAdmin(() => {
                    const action = btn.getAttribute('data-action');
                    if(action === 'manageStudent') renderAdminStudents();
                    else if(action === 'uploadNote') showUploadNoteUI();
                    else if(action === 'manageNotes') manageNotesTitle();
                    else if(action === 'viewSubmissions') showSubmissions();
                    else if(action === 'uploadChoice') uploadChoiceFile();
                    else if(action === 'uploadRich') uploadRichExercise();
                    else if(action === 'uploadListening') uploadListeningUI();
                    else if(action === 'createReading') createAloudMaterial();
                    else if(action === 'driveSettings') showDriveSettingsUI();
                });
            });
        });
    }
    init();
</script>
